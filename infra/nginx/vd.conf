# Video Digestor — nginx reverse proxy
# Place this file at: /etc/nginx/sites-available/vd.conf
# Symlink: sudo ln -s /etc/nginx/sites-available/vd.conf /etc/nginx/sites-enabled/
#
# Replace YOUR_DOMAIN with your actual domain (or GCE external IP for plain HTTP).
# For HTTPS: run `sudo certbot --nginx -d YOUR_DOMAIN` after enabling HTTP first.

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # ---- API backend ----
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 32m;
    }

    # ---- API docs (Swagger / Redoc) ----
    location ~ ^/(docs|redoc|openapi.json)$ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ---- Next.js Web frontend ----
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ---- Static assets cache ----
    location /_next/static/ {
        proxy_pass         http://127.0.0.1:3001;
        add_header         Cache-Control "public, max-age=31536000, immutable";
    }
}

