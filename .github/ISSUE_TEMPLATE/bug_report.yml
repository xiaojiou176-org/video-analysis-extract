name: Bug report
description: Report a reproducible repo-side or source-first public issue.
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke in one short paragraph?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Exact commands, environment, and observed result.
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: dropdown
    id: lane
    attributes:
      label: Affected lane
      options:
        - repo-side
        - external/provider
        - public/source-first onboarding
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification attempted
      description: Which documented commands did you run?
