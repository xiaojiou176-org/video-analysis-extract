name: build-ci-standard-image

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: [self-hosted, video-analysis-extract]
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push strict CI standard image
        run: ./scripts/build_ci_standard_image.sh --push --tag "${{ github.sha }}"

      - name: Resolve published image digest
        id: digest
        run: |
          repo="$(python3 scripts/ci_contract.py get standard_image.repository)"
          manifest="$(docker buildx imagetools inspect "${repo}:${{ github.sha }}" --format '{{json .Manifest}}')"
          digest="$(python3 - <<'PY' "$manifest"
import json
import sys
print(json.loads(sys.argv[1])["digest"])
PY
)"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Update strict CI contract digest
        run: |
          python3 - <<'PY' "${{ steps.digest.outputs.digest }}" "${{ github.sha }}"
import json
import sys
from pathlib import Path

contract_path = Path("infra/config/strict_ci_contract.json")
contract = json.loads(contract_path.read_text(encoding="utf-8"))
contract["standard_image"]["tag"] = sys.argv[2]
contract["standard_image"]["digest"] = sys.argv[1]
contract_path.write_text(json.dumps(contract, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
PY

      - name: Commit strict CI contract digest
        run: |
          if git diff --quiet -- infra/config/strict_ci_contract.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/config/strict_ci_contract.json
          git commit -m "ci: update strict ci image digest"
          git push
