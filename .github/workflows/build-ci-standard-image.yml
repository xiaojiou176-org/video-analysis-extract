name: build-ci-standard-image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".devcontainer/**"
      - ".github/workflows/build-ci-standard-image.yml"
      - "scripts/ci/build_standard_image.sh"

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write
  artifact-metadata: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Install hosted runner prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Enforce runner disk budget
        run: |
          bash scripts/governance/runner_workspace_maintenance.sh --workspace "$GITHUB_WORKSPACE" --include-runner-diag 1
          python3 scripts/governance/check_runner_baseline.py --profile ci-heavy --workspace "$GITHUB_WORKSPACE"

      - name: Login to GHCR
        env:
          GHCR_WRITE_USERNAME: ${{ secrets.GHCR_WRITE_USERNAME }}
          GHCR_WRITE_TOKEN: ${{ secrets.GHCR_WRITE_TOKEN }}
        run: |
          username="${GHCR_WRITE_USERNAME:-${{ github.actor }}}"
          token="${GHCR_WRITE_TOKEN:-${{ secrets.GITHUB_TOKEN }}}"
          echo "$token" | docker login ghcr.io -u "$username" --password-stdin

      - name: Standard image publish preflight
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GHCR_WRITE_TOKEN }}
          GITHUB_ACTIONS: "true"
        run: ./scripts/ci/check_standard_image_publish_readiness.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build and push strict CI standard image
        run: ./scripts/ci/build_standard_image.sh --push --tag "${{ github.sha }}" --metadata-file .runtime-cache/reports/build-ci-standard-image/metadata.json

      - name: Resolve published image digest
        id: digest
        run: |
          digest="$(python3 - <<'PY'
          import json
          from pathlib import Path

          metadata = json.loads(Path(".runtime-cache/reports/build-ci-standard-image/metadata.json").read_text(encoding="utf-8"))
          print(metadata["containerimage.digest"])
          PY
          )"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Generate strict CI image SBOM
        uses: anchore/sbom-action@da167eac915b4e86f08b264dbdbc867b61be6f0c # v0.20.5
        with:
          image: ghcr.io/xiaojiou176-org/video-analysis-extract-ci-standard:${{ github.sha }}
          format: spdx-json
          output-file: .runtime-cache/reports/attestations/strict-ci-image.spdx.json
          upload-artifact: false
          registry-username: ${{ secrets.GHCR_WRITE_USERNAME || github.actor }}
          registry-password: ${{ secrets.GHCR_WRITE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Upload strict CI supply-chain artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: strict-ci-image-supply-chain-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: error
          path: |
            .runtime-cache/reports/governance/standard-image-publish-readiness.json
            .runtime-cache/reports/build-ci-standard-image/metadata.json
            .runtime-cache/reports/attestations/strict-ci-image.spdx.json

      - name: Attest strict CI image provenance
        uses: actions/attest-build-provenance@b3e506e8c389afc651c5bacf2b8f2a1ea0557215 # v4
        with:
          subject-name: ghcr.io/xiaojiou176-org/video-analysis-extract-ci-standard
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

      - name: Attest strict CI image SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ghcr.io/xiaojiou176-org/video-analysis-extract-ci-standard
          subject-digest: ${{ steps.digest.outputs.digest }}
          sbom-path: .runtime-cache/reports/attestations/strict-ci-image.spdx.json
          push-to-registry: true

      - name: Update strict CI contract digest
        run: |
          python3 - <<'PY' "${{ steps.digest.outputs.digest }}" "${{ github.sha }}"
          import json
          import sys
          from pathlib import Path

          contract_path = Path("infra/config/strict_ci_contract.json")
          contract = json.loads(contract_path.read_text(encoding="utf-8"))
          contract["standard_image"]["tag"] = sys.argv[2]
          contract["standard_image"]["digest"] = sys.argv[1]
          contract_path.write_text(json.dumps(contract, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Commit strict CI contract digest
        run: |
          if git diff --quiet -- infra/config/strict_ci_contract.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/config/strict_ci_contract.json
          git commit -m "ci: update strict ci image digest"
          git push
