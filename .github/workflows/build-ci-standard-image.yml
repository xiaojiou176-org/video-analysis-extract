name: build-ci-standard-image

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: [self-hosted, video-analysis-extract]
    timeout-minutes: 90
    steps:
      - name: Normalize self-hosted workspace (pre-checkout)
        shell: bash
        run: |
          set -euo pipefail
          workspace="${GITHUB_WORKSPACE:?}"
          uid="$(id -u)"
          gid="$(id -g)"
          stale_paths=(
            "$workspace/.runtime-cache"
            "$workspace/.venv"
            "$workspace/apps/web/node_modules"
          )
          if command -v sudo >/dev/null 2>&1; then
            if sudo find "$workspace" -mindepth 1 -uid 0 -print -quit | grep -q .; then
              echo "Detected root-owned residue under $workspace; normalizing ownership"
              sudo chown -R "$uid:$gid" "$workspace"
            fi
            for path in "${stale_paths[@]}"; do
              if sudo test -e "$path"; then
                echo "Removing stale workspace path: $path"
                sudo rm -rf "$path"
              fi
            done
          else
            for path in "${stale_paths[@]}"; do
              rm -rf "$path" || true
            done
          fi

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push strict CI standard image
        run: ./scripts/build_ci_standard_image.sh --push --tag "${{ github.sha }}"

      - name: Resolve published image digest
        id: digest
        run: |
          repo="$(python3 scripts/ci_contract.py get standard_image.repository)"
          manifest="$(docker buildx imagetools inspect "${repo}:${{ github.sha }}" --format '{{json .Manifest}}')"
          digest="$(python3 - <<'PY' "$manifest"
import json
import sys
print(json.loads(sys.argv[1])["digest"])
PY
)"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Update strict CI contract digest
        run: |
          python3 - <<'PY' "${{ steps.digest.outputs.digest }}" "${{ github.sha }}"
import json
import sys
from pathlib import Path

contract_path = Path("infra/config/strict_ci_contract.json")
contract = json.loads(contract_path.read_text(encoding="utf-8"))
contract["standard_image"]["tag"] = sys.argv[2]
contract["standard_image"]["digest"] = sys.argv[1]
contract_path.write_text(json.dumps(contract, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
PY

      - name: Commit strict CI contract digest
        run: |
          if git diff --quiet -- infra/config/strict_ci_contract.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/config/strict_ci_contract.json
          git commit -m "ci: update strict ci image digest"
          git push
