name: mutation-weekly

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  CI_CACHE_ROOT: /tmp/ci-cache
  UV_PIP_VERSION: "0.10.7"
  UV_CACHE_DIR: /tmp/ci-cache/uv

concurrency:
  group: mutation-weekly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-mutmut:
    runs-on: [self-hosted, video-analysis-extract]
    timeout-minutes: 120
    steps:
      - name: Normalize self-hosted workspace (pre-checkout)
        uses: ./.github/actions/normalize-self-hosted-workspace

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - uses: ./.github/actions/setup-python-uv
        with:
          uv-version: ${{ env.UV_PIP_VERSION }}
          uv-cache-dir: ${{ env.UV_CACHE_DIR }}
          sync-command: uv sync --frozen --extra dev --extra e2e

      - name: Print mutation target set by module
        run: |
          mkdir -p mutants
          python3 - <<'PY'
          import tomllib
          from collections import defaultdict
          from pathlib import Path

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          targets = pyproject.get("tool", {}).get("mutmut", {}).get("paths_to_mutate", [])
          if not targets:
              raise SystemExit("mutation-weekly failed: paths_to_mutate is empty")

          groups = defaultdict(list)
          for item in targets:
              if "/worker/pipeline/" in item:
                  groups["worker-pipeline"].append(item)
              elif "/api/app/services/" in item:
                  groups["api-services"].append(item)
              elif "/api/app/routers/" in item:
                  groups["api-routes"].append(item)
              else:
                  groups["other"].append(item)

          lines = [f"mutation target set count={len(targets)}"]
          for key in ("worker-pipeline", "api-services", "api-routes", "other"):
              values = groups.get(key, [])
              if not values:
                  continue
              lines.append(f"[{key}] count={len(values)}")
              lines.extend(f"  - {value}" for value in values)

          text = "\n".join(lines)
          print(text)
          Path(".runtime-cache/reports/mutation").mkdir(parents=True, exist_ok=True)
          Path(".runtime-cache/reports/mutation/mutation-targets.txt").write_text(text + "\n", encoding="utf-8")
          PY

      - name: Run mutmut and export stats
        env:
          DATABASE_URL: "sqlite+pysqlite:///:memory:"
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/apps/worker
        run: |
          mkdir -p .runtime-cache/reports/mutation
          bash scripts/ci/run_mutmut.sh

      - name: Enforce weekly mutation quality gates
        env:
          MUTATION_MIN_SCORE: "0.64"
          MUTATION_MIN_EFFECTIVE_RATIO: "0.27"
          MUTATION_MAX_NO_TESTS_RATIO: "0.72"
        run: |
          python3 scripts/governance/check_mutation_stats.py \
            .runtime-cache/reports/mutation/mutmut-cicd-stats.json \
            "$MUTATION_MIN_SCORE" \
            "$MUTATION_MIN_EFFECTIVE_RATIO" \
            "$MUTATION_MAX_NO_TESTS_RATIO"

      - name: Upload mutation stats artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mutmut-cicd-stats
          path: |
            .runtime-cache/reports/mutation/mutmut-cicd-stats.json
            .runtime-cache/reports/mutation/mutation-targets.txt
          if-no-files-found: warn
