name: mutation-weekly

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  CI_CACHE_ROOT: ${{ runner.temp }}/ci-cache
  UV_PIP_VERSION: "0.10.7"
  UV_CACHE_DIR: ${{ runner.temp }}/ci-cache/uv

concurrency:
  group: mutation-weekly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  required-ci-secrets:
    runs-on: [self-hosted, shared-pool]
    timeout-minutes: 5
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true
      - name: Enforce required CI secrets/env vars
        run: |
          python3 scripts/check_required_ci_secrets.py \
            --required GEMINI_API_KEY

  python-mutmut:
    runs-on: [self-hosted, shared-pool]
    timeout-minutes: 120
    needs: [required-ci-secrets]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install "uv==${UV_PIP_VERSION}"

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Print mutation target set by module
        run: |
          mkdir -p mutants
          python3 - <<'PY'
          import tomllib
          from collections import defaultdict
          from pathlib import Path

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          targets = pyproject.get("tool", {}).get("mutmut", {}).get("paths_to_mutate", [])
          if not targets:
              raise SystemExit("mutation-weekly failed: paths_to_mutate is empty")

          groups = defaultdict(list)
          for item in targets:
              if "/worker/pipeline/" in item:
                  groups["worker-pipeline"].append(item)
              elif "/api/app/services/" in item:
                  groups["api-services"].append(item)
              elif "/api/app/routers/" in item:
                  groups["api-routes"].append(item)
              else:
                  groups["other"].append(item)

          lines = [f"mutation target set count={len(targets)}"]
          for key in ("worker-pipeline", "api-services", "api-routes", "other"):
              values = groups.get(key, [])
              if not values:
                  continue
              lines.append(f"[{key}] count={len(values)}")
              lines.extend(f"  - {value}" for value in values)

          text = "\n".join(lines)
          print(text)
          Path("mutants/mutation-targets.txt").write_text(text + "\n", encoding="utf-8")
          PY

      - name: Run mutmut and export stats
        env:
          DATABASE_URL: "sqlite+pysqlite:///:memory:"
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/apps/worker
        run: |
          rm -rf mutants
          uv run --extra dev --with mutmut mutmut run
          uv run --extra dev --with mutmut mutmut export-cicd-stats

      - name: Enforce weekly mutation quality gates
        env:
          MUTATION_MIN_SCORE: "0.62"
          MUTATION_MIN_EFFECTIVE_RATIO: "0.25"
          MUTATION_MAX_NO_TESTS_RATIO: "0.75"
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          stats_path = Path('mutants/mutmut-cicd-stats.json')
          if not stats_path.exists():
              raise SystemExit('mutation-weekly failed: mutants/mutmut-cicd-stats.json not found')

          stats = json.loads(stats_path.read_text(encoding='utf-8'))
          killed = int(stats.get('killed', 0))
          survived = int(stats.get('survived', 0))
          skipped = int(stats.get('skipped', stats.get('no_tests', 0)))
          total = int(stats.get('total', killed + survived))
          effective = killed + survived
          threshold = float(os.environ.get('MUTATION_MIN_SCORE', '0.62'))
          min_effective_ratio = float(os.environ.get('MUTATION_MIN_EFFECTIVE_RATIO', '0.25'))
          max_no_tests_ratio = float(os.environ.get('MUTATION_MAX_NO_TESTS_RATIO', '0.75'))
          score = killed / effective if effective > 0 else 0.0
          effective_ratio = effective / total if total > 0 else 0.0
          no_tests_ratio = skipped / total if total > 0 else 1.0

          print(
              f'mutation stats: killed={killed}, survived={survived}, '
              f'effective={effective}, total={total}, skipped={skipped}, '
              f'score={score:.4f}, threshold={threshold:.4f}, '
              f'effective_ratio={effective_ratio:.4f}, min_effective_ratio={min_effective_ratio:.4f}, '
              f'no_tests_ratio={no_tests_ratio:.4f}, max_no_tests_ratio={max_no_tests_ratio:.4f}'
          )

          if effective <= 0:
              raise SystemExit('mutation-weekly failed: no effective mutants (killed+survived=0)')
          if score < threshold:
              raise SystemExit(
                  f'mutation-weekly failed: score {score:.4f} < threshold {threshold:.4f}'
              )
          if effective_ratio < min_effective_ratio:
              raise SystemExit(
                  f'mutation-weekly failed: effective_ratio {effective_ratio:.4f} < threshold {min_effective_ratio:.4f}'
              )
          if no_tests_ratio > max_no_tests_ratio:
              raise SystemExit(
                  f'mutation-weekly failed: no_tests_ratio {no_tests_ratio:.4f} > ceiling {max_no_tests_ratio:.4f}'
              )
          PY

      - name: Upload mutation stats artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mutmut-cicd-stats
          path: |
            mutants/mutmut-cicd-stats.json
            mutants/mutation-targets.txt
          if-no-files-found: warn
