name: mutation-weekly

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mutation-weekly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  python-mutmut:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Run mutmut and export stats
        env:
          DATABASE_URL: "sqlite+pysqlite:///:memory:"
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/apps/worker
        run: |
          rm -rf mutants
          uv run --extra dev --with mutmut mutmut run
          uv run --extra dev --with mutmut mutmut export-cicd-stats

      - name: Fail if surviving mutants exist
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          stats_path = Path('mutants/mutmut-cicd-stats.json')
          if not stats_path.exists():
              raise SystemExit('mutation-weekly failed: mutants/mutmut-cicd-stats.json not found')

          stats = json.loads(stats_path.read_text(encoding='utf-8'))
          killed = int(stats.get('killed', 0))
          survived = int(stats.get('survived', 0))
          total = int(stats.get('total', killed + survived))
          effective = killed + survived

          print(f'mutation stats: killed={killed}, survived={survived}, effective={effective}, total={total}')

          if effective <= 0:
              raise SystemExit('mutation-weekly failed: no effective mutants (killed+survived=0)')
          if survived > 0:
              raise SystemExit(f'mutation-weekly failed: survived mutants must be 0, got {survived}')
          PY

      - name: Upload mutation stats artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutmut-cicd-stats
          path: mutants/mutmut-cicd-stats.json
          if-no-files-found: warn
