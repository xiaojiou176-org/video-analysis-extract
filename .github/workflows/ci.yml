  dependency-vuln-scan:
    runs-on: [self-hosted, video-analysis-extract]
    timeout-minutes: 25
    needs: [preflight-fast, changes, ci-contract]
    if: ${{ always() && needs.preflight-fast.result == 'success' && needs.changes.result == 'success' && needs.ci-contract.result == 'success' && (github.event_name != 'pull_request' || needs.changes.outputs.deps_changed == 'true') }}
    container:
      image: ${{ needs.ci-contract.outputs.standard_image_ref }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      CI_CACHE_ROOT: ${{ needs.ci-contract.outputs.cache_root }}
      UV_CACHE_DIR: ${{ needs.ci-contract.outputs.uv_cache_dir }}
    steps:
      - name: Normalize self-hosted workspace (pre-checkout)
        shell: bash
        run: |
          set -euo pipefail
          workspace="${GITHUB_WORKSPACE:?}"
          uid="$(id -u)"
          gid="$(id -g)"
          stale_paths=(
            "$workspace/.runtime-cache"
            "$workspace/.venv"
            "$workspace/apps/web/node_modules"
          )
          if command -v sudo >/dev/null 2>&1; then
            if sudo find "$workspace" -mindepth 1 -uid 0 -print -quit | grep -q .; then
              echo "Detected root-owned residue under $workspace; normalizing ownership"
              sudo chown -R "$uid:$gid" "$workspace"
            fi
            for path in "${stale_paths[@]}"; do
              if sudo test -e "$path"; then
                echo "Removing stale workspace path: $path"
                sudo chmod -R u+w "$path" 2>/dev/null || true
                sudo rm -rf "$path" || true
              fi
            done
            generated_web_files=(
              "$workspace/apps/web/next-env.d.ts"
              "$workspace/apps/web/tsconfig.json"
            )
            for path in "${generated_web_files[@]}"; do
              if sudo test -e "$path"; then
                echo "Restoring generated workspace file: $path"
                sudo git -C "$workspace" checkout -- "$path" || sudo rm -f "$path" || true
              fi
            done
          else
            for path in "${stale_paths[@]}"; do
              rm -rf "$path" || true
            done
            rm -f "$workspace/apps/web/next-env.d.ts" || true
            git -C "$workspace" checkout -- apps/web/tsconfig.json >/dev/null 2>&1 || true
          fi

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Python dependency audit (pip-audit)
        run: uv run --with pip-audit pip-audit --progress-spinner off

      - name: Install web deps
        run: npm --prefix apps/web ci

      - name: Web dependency policy gate (no floating versions)
        run: |
          node - <<'JS'
          const fs = require("fs");
          const path = "apps/web/package.json";
          const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
          const sections = ["dependencies", "devDependencies", "peerDependencies", "optionalDependencies"];
          const violations = [];

          for (const section of sections) {
            const deps = pkg[section] || {};
            for (const [name, version] of Object.entries(deps)) {
              const v = String(version).trim();
              if (v === "latest" || v === "*" || /^https?:/i.test(v) || /^git\+/i.test(v)) {
                violations.push(`${section}.${name}=${v}`);
              }
            }
          }

          if (violations.length) {
            console.error("Floating dependency versions are not allowed:");
            for (const item of violations) console.error(`- ${item}`);
            process.exit(1);
          }
          console.log("Web dependency policy gate passed");
          JS

      - name: Web runtime dependency audit (npm audit high+)
        run: npm --prefix apps/web audit --omit=dev --audit-level=high

  aggregate-gate:
    runs-on: [self-hosted, video-analysis-extract]
    timeout-minutes: 10
    if: ${{ always() && needs.trusted-pr-boundary.result == 'success' }}
    needs:
      - trusted-pr-boundary
      - required-ci-secrets
      - changes
      - preflight-fast
      - preflight-heavy
      - profile-governance
      - quality-gate-pre-push
      - db-migration-smoke
      - mutation-testing
      - python-tests
      - api-real-smoke
      - pr-llm-real-smoke
      - backend-lint
      - frontend-lint
      - web-test-build
      - web-e2e
      - web-e2e-perceived
      - external-playwright-smoke
      - dependency-vuln-scan
    steps:
      - name: Enforce aggregate gate
        run: |
          event_name="${{ github.event_name }}"
          ref="${{ github.ref }}"
          is_pr=0
          if [[ "$event_name" == "pull_request" ]]; then
            is_pr=1
          fi

          backend_changed="${{ needs.changes.outputs.backend_changed }}"
          web_changed="${{ needs.changes.outputs.web_changed }}"
          deps_changed="${{ needs.changes.outputs.deps_changed }}"
          migrations_changed="${{ needs.changes.outputs.migrations_changed }}"

          declare -A results
          results[required_ci_secrets]="${{ needs.required-ci-secrets.result }}"
          results[changes]="${{ needs.changes.result }}"
          results[preflight_fast]="${{ needs.preflight-fast.result }}"
          results[preflight_heavy]="${{ needs.preflight-heavy.result }}"
          results[profile_governance]="${{ needs.profile-governance.result }}"
          results[quality_gate_pre_push]="${{ needs.quality-gate-pre-push.result }}"
          results[db_migration_smoke]="${{ needs.db-migration-smoke.result }}"
          results[mutation_testing]="${{ needs.mutation-testing.result }}"
          results[python_tests]="${{ needs.python-tests.result }}"
          results[api_real_smoke]="${{ needs.api-real-smoke.result }}"
          results[pr_llm_real_smoke]="${{ needs.pr-llm-real-smoke.result }}"
          results[backend_lint]="${{ needs.backend-lint.result }}"
          results[frontend_lint]="${{ needs.frontend-lint.result }}"
          results[web_test_build]="${{ needs.web-test-build.result }}"
          results[web_e2e]="${{ needs.web-e2e.result }}"
          results[web_e2e_perceived]="${{ needs.web-e2e-perceived.result }}"
          results[external_playwright_smoke]="${{ needs.external-playwright-smoke.result }}"
          results[dependency_vuln_scan]="${{ needs.dependency-vuln-scan.result }}"

          failed=0
          require_main_schedule_release_only=0
          if [[ "$event_name" == "schedule" || ( "$event_name" == "push" && ( "$ref" == "refs/heads/main" || "$ref" == refs/heads/release/* ) ) ]]; then
            require_main_schedule_release_only=1
          fi
          echo "event=$event_name ref=$ref is_pr=$is_pr require_main_schedule_release_only=$require_main_schedule_release_only"
          echo "changes: backend=$backend_changed web=$web_changed deps=$deps_changed migrations=$migrations_changed"

          for job in required_ci_secrets changes preflight_fast preflight_heavy; do
            result="${results[$job]}"
            echo "$job=$result"
            if [[ "$result" != "success" ]]; then
              failed=1
            fi
          done

          check_required_job() {
            local job="$1"
            local required="$2"
            local result="${results[$job]}"
            echo "$job=$result required=$required"
            if [[ "$required" == "1" ]]; then
              if [[ "$result" != "success" ]]; then
                failed=1
              fi
            else
              if [[ "$result" != "success" && "$result" != "skipped" ]]; then
                failed=1
              fi
            fi
          }

          required_db_migration=1
          required_backend_group=1
          required_web_group=1
          required_api_real_smoke=1
          required_web_test_build=1
          required_web_e2e=1
          required_web_e2e_perceived=1
          required_deps_scan=1
          required_profile_governance="$require_main_schedule_release_only"
          if [[ "$is_pr" -eq 1 ]]; then
            [[ "$migrations_changed" == "true" ]] && required_db_migration=1 || required_db_migration=0
            [[ "$backend_changed" == "true" ]] && required_backend_group=1 || required_backend_group=0
            [[ "$web_changed" == "true" ]] && required_web_group=1 || required_web_group=0
            [[ "$backend_changed" == "true" ]] && required_api_real_smoke=1 || required_api_real_smoke=0
            required_web_test_build=1
            if [[ "$backend_changed" == "true" || "$web_changed" == "true" || "$deps_changed" == "true" ]]; then
              required_web_e2e=1
              required_web_e2e_perceived=1
            else
              required_web_e2e=0
              required_web_e2e_perceived=0
            fi
            [[ "$deps_changed" == "true" ]] && required_deps_scan=1 || required_deps_scan=0
          fi

          check_required_job db_migration_smoke "$required_db_migration"
          check_required_job mutation_testing "$required_backend_group"
          check_required_job python_tests "$required_backend_group"
          check_required_job api_real_smoke "$required_api_real_smoke"
          check_required_job backend_lint "$required_backend_group"
          check_required_job frontend_lint "$required_web_group"
          check_required_job web_test_build "$required_web_test_build"
          check_required_job web_e2e "$required_web_e2e"
          check_required_job web_e2e_perceived "$required_web_e2e_perceived"
          check_required_job dependency_vuln_scan "$required_deps_scan"

          profile_governance_result="${results[profile_governance]}"
          quality_gate_result="${results[quality_gate_pre_push]}"
          external_playwright_result="${results[external_playwright_smoke]}"
          echo "profile_governance=$profile_governance_result required=$required_profile_governance"
          echo "quality_gate_pre_push=$quality_gate_result"
          echo "external_playwright_smoke=$external_playwright_result"

          if [[ "$required_profile_governance" == "1" ]]; then
            if [[ "$profile_governance_result" != "success" ]]; then
              failed=1
            fi
          elif [[ "$profile_governance_result" != "success" && "$profile_governance_result" != "skipped" ]]; then
            failed=1
          fi
          if [[ "$quality_gate_result" != "success" && "$quality_gate_result" != "skipped" ]]; then
            failed=1
          fi
          if [[ "$external_playwright_result" != "success" && "$external_playwright_result" != "skipped" ]]; then
            failed=1
          fi

          pr_llm_result="${results[pr_llm_real_smoke]}"
          echo "pr_llm_real_smoke=$pr_llm_result"
          if [[ "$pr_llm_result" != "success" && "$pr_llm_result" != "skipped" ]]; then
            failed=1
          fi

          if [[ "$failed" -ne 0 ]]; then
            echo "aggregate gate failed"
            exit 1
          fi
          echo "aggregate gate passed"

      - name: Write aggregate summary
        if: always()
        run: |
          {
            echo "## Aggregate Gate"
            echo
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| required-ci-secrets | \`${{ needs.required-ci-secrets.result }}\` |"
            echo "| changes | \`${{ needs.changes.result }}\` |"
            echo "| preflight-fast | \`${{ needs.preflight-fast.result }}\` |"
            echo "| preflight-heavy | \`${{ needs.preflight-heavy.result }}\` |"
            echo "| quality-gate-pre-push | \`${{ needs.quality-gate-pre-push.result }}\` |"
            echo "| db-migration-smoke | \`${{ needs.db-migration-smoke.result }}\` |"
            echo "| mutation-testing | \`${{ needs.mutation-testing.result }}\` |"
            echo "| python-tests | \`${{ needs.python-tests.result }}\` |"
            echo "| api-real-smoke | \`${{ needs.api-real-smoke.result }}\` |"
            echo "| pr-llm-real-smoke | \`${{ needs.pr-llm-real-smoke.result }}\` |"
            echo "| backend-lint | \`${{ needs.backend-lint.result }}\` |"
            echo "| frontend-lint | \`${{ needs.frontend-lint.result }}\` |"
            echo "| web-test-build | \`${{ needs.web-test-build.result }}\` |"
            echo "| web-e2e | \`${{ needs.web-e2e.result }}\` |"
            echo "| web-e2e-perceived | \`${{ needs.web-e2e-perceived.result }}\` |"
            echo "| external-playwright-smoke | \`${{ needs.external-playwright-smoke.result }}\` |"
            echo "| dependency-vuln-scan | \`${{ needs.dependency-vuln-scan.result }}\` |"
            echo
            echo "Common artifact families:"
            echo "- \`ci-failure-diagnostics-*\`"
            echo "- \`live-smoke-diagnostics-*\`"
            echo "- \`autofix-dry-run-report-*\`"
          } >> "$GITHUB_STEP_SUMMARY"

