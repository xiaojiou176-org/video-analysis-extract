          [[ "$HAS_RESEND_FROM_EMAIL" != "true" ]] && missing+=("RESEND_FROM_EMAIL")
          [[ "$HAS_YOUTUBE_API_KEY" != "true" ]] && missing+=("YOUTUBE_API_KEY")
          [[ "$HAS_LIVE_SMOKE_API_BASE_URL" != "true" ]] && missing+=("LIVE_SMOKE_API_BASE_URL")
          if [[ "${#missing[@]}" -gt 0 ]]; then
            echo "live smoke is required on main/schedule but missing secrets: ${missing[*]}"
            exit 1
          fi

      - name: Run live smoke
        run: |
          scripts/e2e_live_smoke.sh \
            --api-base-url "${{ secrets.LIVE_SMOKE_API_BASE_URL }}" \
            --require-api "1" \
            --require-secrets "1" \
            --computer-use-strict "1" \
            --computer-use-skip "0" \
            --heartbeat-seconds "30" \
            --diagnostics-json ".runtime-cache/e2e-live-smoke-result.json"

      - name: Upload live smoke diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: live-smoke-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            .runtime-cache/e2e-live-smoke-result.json

  ci-final-gate:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - aggregate-gate
      - live-smoke
      - nightly-flaky-python
      - nightly-flaky-web-e2e
    steps:
      - name: Enforce final gate (with required live smoke on main/nightly)
        run: |
          aggregate_result="${{ needs.aggregate-gate.result }}"
          live_smoke_result="${{ needs.live-smoke.result }}"
          nightly_flaky_result="${{ needs.nightly-flaky-python.result }}"
          nightly_flaky_web_e2e_result="${{ needs.nightly-flaky-web-e2e.result }}"
          event_name="${{ github.event_name }}"
          ref="${{ github.ref }}"

          require_live_smoke=0
          if [[ "$event_name" == "schedule" ]]; then
            require_live_smoke=1
          elif [[ "$event_name" == "push" && "$ref" == "refs/heads/main" ]]; then
            require_live_smoke=1
          fi

          echo "aggregate-gate=$aggregate_result"
          echo "live-smoke=$live_smoke_result"
          echo "nightly-flaky-python=$nightly_flaky_result"
          echo "nightly-flaky-web-e2e=$nightly_flaky_web_e2e_result"
          echo "event=$event_name ref=$ref require_live_smoke=$require_live_smoke"

          if [[ "$aggregate_result" != "success" ]]; then
            echo "final gate failed: aggregate gate is not successful"
            exit 1
          fi

          if [[ "$event_name" == "schedule" && "$nightly_flaky_result" != "success" ]]; then
            echo "final gate failed: nightly flaky subset must pass on schedule runs (result='$nightly_flaky_result')"
            exit 1
          fi

          if [[ "$event_name" == "schedule" && "$nightly_flaky_web_e2e_result" != "success" ]]; then
            echo "final gate failed: nightly flaky web e2e subset must pass on schedule runs (result='$nightly_flaky_web_e2e_result')"
            exit 1
          fi

          if [[ "$require_live_smoke" -eq 1 ]]; then
            if [[ "$live_smoke_result" != "success" ]]; then
              echo "final gate failed: live smoke required on main/nightly but result is '$live_smoke_result'"
              exit 1
            fi
          fi

          if [[ "$require_live_smoke" -eq 0 && "$live_smoke_result" != "success" && "$live_smoke_result" != "skipped" ]]; then
            echo "final gate failed: live smoke is optional in this context, but ran and did not succeed (result='$live_smoke_result')"
            exit 1
          fi

          echo "final gate passed"
  backend-lint:
    runs-on: ubuntu-latest
    needs: [preflight-fast, changes]
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.backend_changed == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Placebo assertion guard (all tests)
        run: python3 scripts/check_test_assertions.py

      - name: Backend lint (ruff critical rules)
        run: uv run --with ruff ruff check apps scripts --select E9,F63,F7,F82

  frontend-lint:
    runs-on: ubuntu-latest
    needs: [preflight-fast, changes]
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.web_changed == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web deps
        run: npm --prefix apps/web ci

      - name: Frontend lint
        run: npm --prefix apps/web run lint

      - name: Placebo assertion guard (web tests)
        run: python3 scripts/check_test_assertions.py --path apps/web
