        run: npm --prefix apps/web run lint

      - name: Placebo assertion guard (web tests)
        run: python3 scripts/check_test_assertions.py --path apps/web

  frontend-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: [frontend-lint-hosted, frontend-lint-fallback]
    if: ${{ always() && (needs['frontend-lint-hosted'].result == 'success' || needs['frontend-lint-fallback'].result == 'success' || (needs['frontend-lint-hosted'].result == 'skipped' && needs['frontend-lint-fallback'].result == 'skipped')) }}
