      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install "uv==${UV_PIP_VERSION}"

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ matrix.browser }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ matrix.browser }}-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Install web deps
        run: npm --prefix apps/web ci

      - name: Install PostgreSQL client
        run: |
          for attempt in $(seq 1 20); do
            if sudo apt-get update && sudo apt-get install -y postgresql-client; then
              exit 0
            fi
            echo "apt install attempt ${attempt}/20 failed, retrying..."
            sleep 5
          done
          echo "apt install failed after retries"
          exit 1

      - name: Install Temporal CLI
        run: |
          arch="$(uname -m)"
          case "$arch" in
            x86_64|amd64)
              temporal_arch="amd64"
              expected_sha="${TEMPORAL_CLI_SHA256_LINUX_AMD64}"
              ;;
            aarch64|arm64)
              temporal_arch="arm64"
              expected_sha="${TEMPORAL_CLI_SHA256_LINUX_ARM64}"
              ;;
            *)
              echo "Unsupported architecture for Temporal CLI: ${arch}" >&2
              exit 1
              ;;
          esac
          archive="temporal_cli_${TEMPORAL_CLI_VERSION}_linux_${temporal_arch}.tar.gz"
          url="https://github.com/temporalio/cli/releases/download/v${TEMPORAL_CLI_VERSION}/${archive}"
          curl -fsSL "$url" -o "/tmp/${archive}"
          echo "${expected_sha}  /tmp/${archive}" | sha256sum -c -
          tar -xzf "/tmp/${archive}" -C /tmp temporal
          mkdir -p "$HOME/.local/bin"
          install -m 0755 /tmp/temporal "$HOME/.local/bin/temporal"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Allocate isolated web e2e runtime resources
        run: |
          python - <<'PY'
          import os
          import socket
          import uuid

          browser = "${{ matrix.browser }}"
          run_id = "${{ github.run_id }}"
          attempt = "${{ github.run_attempt }}"
          suffix = f"{browser}-{run_id}-{attempt}-{uuid.uuid4().hex[:8]}"

          def pick_port() -> int:
              with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as sock:
                  sock.bind(("127.0.0.1", 0))
                  return int(sock.getsockname()[1])

          api_port = pick_port()
          temporal_port = pick_port()

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as fh:
              fh.write(f"WEB_E2E_API_PORT={api_port}\n")
              fh.write(f"WEB_E2E_TEMPORAL_PORT={temporal_port}\n")
              fh.write(f"WEB_E2E_SQLITE_STATE_PATH=/tmp/video-digestor-api-web-e2e-{suffix}.db\n")
              fh.write(f"WEB_E2E_SQLITE_PATH=/tmp/video-digestor-worker-web-e2e-{suffix}.db\n")
              fh.write(f"WEB_E2E_WORKSPACE_DIR=/tmp/video-digestor-worker-web-e2e-workspace-{suffix}\n")
              fh.write(f"WEB_E2E_ARTIFACT_ROOT=/tmp/video-digestor-worker-web-e2e-artifacts-{suffix}\n")

          print(f"allocated web-e2e ports: api={api_port}, temporal={temporal_port}")
          PY

      - name: Run migrations for web e2e DB
        env:
          PGPASSWORD: postgres
          PGPORT: ${{ job.services.postgres.ports['5432'] }}
        run: |
          for _ in $(seq 1 30); do
            if pg_isready -h 127.0.0.1 -p "$PGPORT" -U postgres -d video_analysis_web_e2e >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          for migration in $(find infra/migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            psql "postgresql://postgres:postgres@127.0.0.1:${PGPORT}/video_analysis_web_e2e" -v ON_ERROR_STOP=1 -f "$migration"
          done

      - name: Start Temporal dev server for web e2e (127.0.0.1:${{ env.WEB_E2E_TEMPORAL_PORT }})
        run: |
          mkdir -p .runtime-cache
          temporal server start-dev --ip 127.0.0.1 --port "${WEB_E2E_TEMPORAL_PORT}" > .runtime-cache/web-e2e-temporal.log 2>&1 &
          echo "WEB_E2E_TEMPORAL_PID=$!" >> "$GITHUB_ENV"

          python - <<'PY'
          import os
          import socket
          import sys
          import time

          port = int(os.environ["WEB_E2E_TEMPORAL_PORT"])
          for _ in range(60):
              sock = socket.socket()
              sock.settimeout(1)
              try:
                  sock.connect(("127.0.0.1", port))
                  sock.close()
                  print(f"temporal web-e2e ready on 127.0.0.1:{port}")
                  sys.exit(0)
              except OSError:
                  time.sleep(1)
              finally:
                  sock.close()

          print(f"temporal web-e2e failed to become ready on 127.0.0.1:{port}", file=sys.stderr)
          sys.exit(1)
          PY

      - name: Start real API for web e2e (127.0.0.1:${{ env.WEB_E2E_API_PORT }})
        env:
          DATABASE_URL: "postgresql+psycopg://postgres:postgres@127.0.0.1:${{ job.services.postgres.ports['5432'] }}/video_analysis_web_e2e"
          TEMPORAL_TARGET_HOST: 127.0.0.1:${{ env.WEB_E2E_TEMPORAL_PORT }}
          TEMPORAL_NAMESPACE: default
          TEMPORAL_TASK_QUEUE: video-analysis-worker
          SQLITE_STATE_PATH: ${{ env.WEB_E2E_SQLITE_STATE_PATH }}
          UI_AUDIT_GEMINI_ENABLED: "false"
          NOTIFICATION_ENABLED: "0"
          VD_ALLOW_UNAUTH_WRITE: "1"
          VD_CI_ALLOW_UNAUTH_WRITE: "1"
        run: |
          mkdir -p .runtime-cache
          start_web_e2e_api() {
            local port="$1"
            : > .runtime-cache/web-e2e-api.log
            uv run --with uvicorn uvicorn apps.api.app.main:app --host 127.0.0.1 --port "${port}" > .runtime-cache/web-e2e-api.log 2>&1 &
            echo "$!"
          }

          api_port="${WEB_E2E_API_PORT}"
          for attempt in $(seq 1 5); do
            api_pid="$(start_web_e2e_api "${api_port}")"
            echo "WEB_E2E_API_PID=${api_pid}" >> "$GITHUB_ENV"
            echo "WEB_E2E_API_PORT=${api_port}" >> "$GITHUB_ENV"

            for _ in $(seq 1 120); do
              if curl -fsS "http://127.0.0.1:${api_port}/healthz" >/dev/null; then
                echo "web-e2e api ready on port ${api_port} (attempt ${attempt})"
                exit 0
              fi
              if ! kill -0 "${api_pid}" >/dev/null 2>&1; then
                echo "web-e2e api exited early on attempt ${attempt} (port ${api_port})"
                break
              fi
              sleep 1
            done

            if kill -0 "${api_pid}" >/dev/null 2>&1; then
              kill "${api_pid}" || true
            fi
            tail -n 120 .runtime-cache/web-e2e-api.log || true

            if [[ "${attempt}" -lt 5 ]]; then
              api_port="$(python3 -c "import socket; sock=socket.socket(socket.AF_INET, socket.SOCK_STREAM); sock.bind(('127.0.0.1', 0)); print(sock.getsockname()[1]); sock.close()")"
              echo "retrying web-e2e api startup with new port ${api_port}"
            fi
          done

          echo "web-e2e api failed to start after 5 attempts"
          exit 1

      - name: Start worker for web e2e (same DB/Temporal/queue)
        env:
          DATABASE_URL: "postgresql+psycopg://postgres:postgres@127.0.0.1:${{ job.services.postgres.ports['5432'] }}/video_analysis_web_e2e"
          TEMPORAL_TARGET_HOST: 127.0.0.1:${{ env.WEB_E2E_TEMPORAL_PORT }}
          TEMPORAL_NAMESPACE: default
          TEMPORAL_TASK_QUEUE: video-analysis-worker
          SQLITE_PATH: ${{ env.WEB_E2E_SQLITE_PATH }}
          PIPELINE_WORKSPACE_DIR: ${{ env.WEB_E2E_WORKSPACE_DIR }}
          PIPELINE_ARTIFACT_ROOT: ${{ env.WEB_E2E_ARTIFACT_ROOT }}
          UI_AUDIT_GEMINI_ENABLED: "false"
          NOTIFICATION_ENABLED: "0"
        run: |
          mkdir -p .runtime-cache
          ./scripts/dev_worker.sh --no-show-hints > .runtime-cache/web-e2e-worker.log 2>&1 &
          echo "WEB_E2E_WORKER_PID=$!" >> "$GITHUB_ENV"
          for _ in $(seq 1 30); do
            if ! kill -0 "${WEB_E2E_WORKER_PID:-$!}" >/dev/null 2>&1; then
              echo "web-e2e worker exited unexpectedly"
              tail -n 80 .runtime-cache/web-e2e-worker.log || true
              exit 1
            fi
            if [[ -s .runtime-cache/web-e2e-worker.log ]]; then
              echo "web-e2e worker process is up and producing logs"
              exit 0
            fi
            sleep 1
          done
          echo "web-e2e worker failed readiness probe (no log output within 30s)"
          exit 1

      - name: Install Playwright browser (${{ matrix.browser }})
        run: |
          for attempt in $(seq 1 8); do
            if uv run --with playwright python -m playwright install --with-deps ${{ matrix.browser }}; then
              exit 0
            fi
            if sudo fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 || sudo fuser /var/lib/apt/lists/lock >/dev/null 2>&1 || sudo fuser /var/cache/apt/archives/lock >/dev/null 2>&1; then
              echo "playwright dependency install hit apt/dpkg lock, retrying (${attempt}/8)..."
              sleep 8
              continue
            fi
            echo "playwright install failed without apt lock contention"
            exit 1
          done
          echo "playwright install failed after retries"
          exit 1

      - name: Web E2E gate (no silent skip)
        run: |
          mkdir -p .runtime-cache
          BROWSER="${{ matrix.browser }}"

          set -o pipefail
          # 专项用例由 web-e2e-perceived 独立执行
          uv run --with pytest --with playwright \
            pytest apps/web/tests/e2e \
            --ignore=apps/web/tests/e2e/test_mobile_breakpoints.py \
            --ignore=apps/web/tests/e2e/test_perceived_latency.py \
            --ignore=apps/web/tests/e2e/test_reduced_motion.py \
            --ignore=apps/web/tests/e2e/test_subscriptions.py \
            -q --junitxml=".runtime-cache/web-e2e-junit-${BROWSER}.xml" -rA \
            --web-e2e-browser "$BROWSER" \
            --web-e2e-api-base-url "http://127.0.0.1:${WEB_E2E_API_PORT}" \
            2>&1 | tee ".runtime-cache/web-e2e-${BROWSER}.log"

          python - <<'PY'
          import xml.etree.ElementTree as ET
          from pathlib import Path

          browser = "${{ matrix.browser }}"
          report = Path(f".runtime-cache/web-e2e-junit-{browser}.xml")
          if not report.is_file():
              raise SystemExit("web e2e gate failed: junit report missing")

          root = ET.parse(report).getroot()
          suites = [root] if root.tag == "testsuite" else root.findall("testsuite")
          tests = sum(int(suite.attrib.get("tests", "0")) for suite in suites)
          skipped = sum(int(suite.attrib.get("skipped", "0")) for suite in suites)

          if tests == 0:
              raise SystemExit("web e2e gate failed: collected 0 tests")
          if skipped > 0:
              raise SystemExit(f"web e2e gate failed: skipped={skipped} (no silent skip allowed)")
          print(f"web e2e gate passed ({browser}): tests={tests}, skipped={skipped}")
          PY

      - name: Upload web e2e artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: web-e2e-artifacts-${{ matrix.browser }}
          path: |
            .runtime-cache/web-e2e-artifacts
            .runtime-cache/web-e2e-junit-${{ matrix.browser }}.xml
          if-no-files-found: warn

      - name: Upload CI failure diagnostics (web)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ci-failure-diagnostics-web-e2e-${{ matrix.browser }}-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          path: |
            .runtime-cache/web-e2e-junit-${{ matrix.browser }}.xml
            .runtime-cache/web-e2e-${{ matrix.browser }}.log
            .runtime-cache/web-e2e-api.log
            .runtime-cache/web-e2e-temporal.log
            .runtime-cache/web-e2e-worker.log

      - name: Upload web e2e worker logs (always)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: web-e2e-worker-log-${{ matrix.browser }}-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          path: |
            .runtime-cache/web-e2e-worker.log

      - name: Stop web e2e API
        if: always()
        run: |
          if [[ -n "${WEB_E2E_API_PID:-}" ]]; then
            kill "${WEB_E2E_API_PID}" >/dev/null 2>&1 || true
          fi

      - name: Stop web e2e worker
        if: always()
        run: |
          if [[ -n "${WEB_E2E_WORKER_PID:-}" ]]; then
            kill "${WEB_E2E_WORKER_PID}" >/dev/null 2>&1 || true
          fi

      - name: Stop web e2e Temporal dev server
        if: always()
        run: |
          if [[ -n "${WEB_E2E_TEMPORAL_PID:-}" ]]; then
            kill "${WEB_E2E_TEMPORAL_PID}" >/dev/null 2>&1 || true
          fi

  external-playwright-smoke:
    runs-on: [self-hosted, shared-pool]
    timeout-minutes: 20
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    needs: preflight-fast
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install "uv==${UV_PIP_VERSION}"

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-external-smoke-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-external-smoke-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Install Playwright browser (chromium)
        run: |
          for attempt in $(seq 1 8); do
            if uv run --with playwright python -m playwright install --with-deps chromium; then
              exit 0
            fi
            if sudo fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 || sudo fuser /var/lib/apt/lists/lock >/dev/null 2>&1 || sudo fuser /var/cache/apt/archives/lock >/dev/null 2>&1; then
              echo "playwright dependency install hit apt/dpkg lock, retrying (${attempt}/8)..."
              sleep 8
              continue
            fi
            echo "playwright install failed without apt lock contention"
            exit 1
          done
          echo "playwright install failed after retries"
          exit 1

      - name: Real external site Playwright smoke
        run: |
          uv run --with playwright bash scripts/external_playwright_smoke.sh \
            --browser "chromium" \
            --url "${{ vars.EXTERNAL_SMOKE_URL || 'https://example.com' }}" \
            --expect-text "${{ vars.EXTERNAL_SMOKE_EXPECT_TEXT || 'Example Domain' }}" \
            --timeout-ms "${{ vars.EXTERNAL_SMOKE_TIMEOUT_MS || '45000' }}" \
            --retries "${{ vars.EXTERNAL_SMOKE_RETRIES || '2' }}" \
            --heartbeat-seconds "30" \
            --diagnostics-json ".runtime-cache/external-playwright-smoke-result.json" \
            --output-dir ".runtime-cache/external-playwright-smoke"

      - name: Upload external smoke artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: external-playwright-smoke-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            .runtime-cache/external-playwright-smoke
            .runtime-cache/external-playwright-smoke-result.json

  web-e2e-perceived:
    runs-on: [self-hosted, shared-pool]
    timeout-minutes: 40
    needs: [preflight-fast, changes]
    if: ${{ always() && needs.preflight-fast.result == 'success' && needs.changes.result == 'success' && (github.event_name != 'pull_request' || needs.changes.outputs.backend_changed == 'true' || needs.changes.outputs.web_changed == 'true' || needs.changes.outputs.deps_changed == 'true') }}
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: video_analysis_web_e2e_perceived
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432/tcp
        options: >-
          --health-cmd "pg_isready -U postgres -d video_analysis_web_e2e_perceived"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install "uv==${UV_PIP_VERSION}"

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-perceived-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-perceived-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Install web deps
        run: npm --prefix apps/web ci

      - name: Install PostgreSQL client
        run: |
          for attempt in $(seq 1 20); do
            if sudo apt-get update && sudo apt-get install -y postgresql-client; then
              exit 0
            fi
            echo "apt install attempt ${attempt}/20 failed, retrying..."
            sleep 5
          done
          echo "apt install failed after retries"
          exit 1

      - name: Install Temporal CLI
        run: |
          arch="$(uname -m)"
          case "$arch" in
            x86_64|amd64)
              temporal_arch="amd64"
              expected_sha="${TEMPORAL_CLI_SHA256_LINUX_AMD64}"
              ;;
            aarch64|arm64)
              temporal_arch="arm64"
              expected_sha="${TEMPORAL_CLI_SHA256_LINUX_ARM64}"
              ;;
            *)
              echo "Unsupported architecture for Temporal CLI: ${arch}" >&2
              exit 1
              ;;
          esac
          archive="temporal_cli_${TEMPORAL_CLI_VERSION}_linux_${temporal_arch}.tar.gz"
          url="https://github.com/temporalio/cli/releases/download/v${TEMPORAL_CLI_VERSION}/${archive}"
          curl -fsSL "$url" -o "/tmp/${archive}"
          echo "${expected_sha}  /tmp/${archive}" | sha256sum -c -
          tar -xzf "/tmp/${archive}" -C /tmp temporal
          mkdir -p "$HOME/.local/bin"
          install -m 0755 /tmp/temporal "$HOME/.local/bin/temporal"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Allocate isolated perceived e2e runtime resources
        run: |
          python - <<'PY'
          import os
          import socket
          import uuid

          run_id = "${{ github.run_id }}"
          attempt = "${{ github.run_attempt }}"
          suffix = f"perceived-{run_id}-{attempt}-{uuid.uuid4().hex[:8]}"

          def pick_port() -> int:
              with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as sock:
                  sock.bind(("127.0.0.1", 0))
                  return int(sock.getsockname()[1])

          api_port = pick_port()
          temporal_port = pick_port()

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as fh:
              fh.write(f"WEB_E2E_PERCEIVED_API_PORT={api_port}\n")
              fh.write(f"WEB_E2E_PERCEIVED_TEMPORAL_PORT={temporal_port}\n")
              fh.write(f"WEB_E2E_PERCEIVED_SQLITE_STATE_PATH=/tmp/video-digestor-api-web-e2e-{suffix}.db\n")
              fh.write(f"WEB_E2E_PERCEIVED_SQLITE_PATH=/tmp/video-digestor-worker-web-e2e-{suffix}.db\n")
              fh.write(f"WEB_E2E_PERCEIVED_WORKSPACE_DIR=/tmp/video-digestor-worker-web-e2e-workspace-{suffix}\n")
              fh.write(f"WEB_E2E_PERCEIVED_ARTIFACT_ROOT=/tmp/video-digestor-worker-web-e2e-artifacts-{suffix}\n")

          print(f"allocated web-e2e-perceived ports: api={api_port}, temporal={temporal_port}")
          PY

      - name: Run migrations for perceived e2e DB
        env:
          PGPASSWORD: postgres
          PGPORT: ${{ job.services.postgres.ports['5432'] }}
        run: |
          for _ in $(seq 1 30); do
            if pg_isready -h 127.0.0.1 -p "$PGPORT" -U postgres -d video_analysis_web_e2e_perceived >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          for migration in $(find infra/migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            psql "postgresql://postgres:postgres@127.0.0.1:${PGPORT}/video_analysis_web_e2e_perceived" -v ON_ERROR_STOP=1 -f "$migration"
          done

      - name: Start Temporal dev server for perceived e2e
        run: |
          mkdir -p .runtime-cache
          temporal server start-dev --ip 127.0.0.1 --port "${WEB_E2E_PERCEIVED_TEMPORAL_PORT}" > .runtime-cache/web-e2e-perceived-temporal.log 2>&1 &
          echo "WEB_E2E_PERCEIVED_TEMPORAL_PID=$!" >> "$GITHUB_ENV"
          python - <<'PY'
          import os
          import socket
          import sys
          import time

          port = int(os.environ["WEB_E2E_PERCEIVED_TEMPORAL_PORT"])
          for _ in range(60):
              sock = socket.socket()
              sock.settimeout(1)
              try:
                  sock.connect(("127.0.0.1", port))
                  sock.close()
                  print(f"temporal web-e2e-perceived ready on 127.0.0.1:{port}")
                  sys.exit(0)
              except OSError:
                  time.sleep(1)
              finally:
                  sock.close()

          print(f"temporal web-e2e-perceived failed to become ready on 127.0.0.1:{port}", file=sys.stderr)
          sys.exit(1)
          PY

      - name: Start real API for perceived e2e
        env:
          DATABASE_URL: "postgresql+psycopg://postgres:postgres@127.0.0.1:${{ job.services.postgres.ports['5432'] }}/video_analysis_web_e2e_perceived"
          TEMPORAL_TARGET_HOST: 127.0.0.1:${{ env.WEB_E2E_PERCEIVED_TEMPORAL_PORT }}
          TEMPORAL_NAMESPACE: default
          TEMPORAL_TASK_QUEUE: video-analysis-worker
          SQLITE_STATE_PATH: ${{ env.WEB_E2E_PERCEIVED_SQLITE_STATE_PATH }}
          UI_AUDIT_GEMINI_ENABLED: "false"
          NOTIFICATION_ENABLED: "0"
          VD_ALLOW_UNAUTH_WRITE: "1"
          VD_CI_ALLOW_UNAUTH_WRITE: "1"
        run: |
          mkdir -p .runtime-cache
          uv run --with uvicorn uvicorn apps.api.app.main:app --host 127.0.0.1 --port "${WEB_E2E_PERCEIVED_API_PORT}" > .runtime-cache/web-e2e-perceived-api.log 2>&1 &
          echo "WEB_E2E_PERCEIVED_API_PID=$!" >> "$GITHUB_ENV"
          for _ in $(seq 1 45); do
            if curl -fsS "http://127.0.0.1:${WEB_E2E_PERCEIVED_API_PORT}/healthz" >/dev/null; then
              echo "web-e2e-perceived api ready on port ${WEB_E2E_PERCEIVED_API_PORT}"
              exit 0
            fi
            sleep 1
          done
          echo "web-e2e-perceived api failed readiness probe"
          tail -n 120 .runtime-cache/web-e2e-perceived-api.log || true
          exit 1

      - name: Start worker for perceived e2e
        env:
          DATABASE_URL: "postgresql+psycopg://postgres:postgres@127.0.0.1:${{ job.services.postgres.ports['5432'] }}/video_analysis_web_e2e_perceived"
          TEMPORAL_TARGET_HOST: 127.0.0.1:${{ env.WEB_E2E_PERCEIVED_TEMPORAL_PORT }}
          TEMPORAL_NAMESPACE: default
          TEMPORAL_TASK_QUEUE: video-analysis-worker
          SQLITE_PATH: ${{ env.WEB_E2E_PERCEIVED_SQLITE_PATH }}
          PIPELINE_WORKSPACE_DIR: ${{ env.WEB_E2E_PERCEIVED_WORKSPACE_DIR }}
          PIPELINE_ARTIFACT_ROOT: ${{ env.WEB_E2E_PERCEIVED_ARTIFACT_ROOT }}
          UI_AUDIT_GEMINI_ENABLED: "false"
          NOTIFICATION_ENABLED: "0"
        run: |
          mkdir -p .runtime-cache
          ./scripts/dev_worker.sh --no-show-hints > .runtime-cache/web-e2e-perceived-worker.log 2>&1 &
          echo "WEB_E2E_PERCEIVED_WORKER_PID=$!" >> "$GITHUB_ENV"
          for _ in $(seq 1 30); do
            if ! kill -0 "${WEB_E2E_PERCEIVED_WORKER_PID:-$!}" >/dev/null 2>&1; then
              echo "web-e2e-perceived worker exited unexpectedly"
              tail -n 80 .runtime-cache/web-e2e-perceived-worker.log || true
              exit 1
            fi
            if [[ -s .runtime-cache/web-e2e-perceived-worker.log ]]; then
              echo "web-e2e-perceived worker process is up and producing logs"
              exit 0
            fi
            sleep 1
          done
          echo "web-e2e-perceived worker failed readiness probe (no log output within 30s)"
          exit 1

      - name: Install Playwright browser (chromium)
        run: |
          for attempt in $(seq 1 8); do
            if uv run --with playwright python -m playwright install --with-deps chromium; then
              exit 0
            fi
            if sudo fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 || sudo fuser /var/lib/apt/lists/lock >/dev/null 2>&1 || sudo fuser /var/cache/apt/archives/lock >/dev/null 2>&1; then
              echo "playwright dependency install hit apt/dpkg lock, retrying (${attempt}/8)..."
              sleep 8
              continue
            fi
            echo "playwright install failed without apt lock contention"
            exit 1
          done
          echo "playwright install failed after retries"
          exit 1

      - name: Perceived UX E2E gate (mobile + reduced-motion + perceived-latency)
        env:
          WEB_E2E_API_BASE_URL: http://127.0.0.1:${{ env.WEB_E2E_PERCEIVED_API_PORT }}
        run: |
          # Keep this as a dedicated long-term perceptual regression gate in CI.
          npm --prefix apps/web run test:e2e:perceived 2>&1 | tee .runtime-cache/web-e2e-perceived.log

      - name: Upload CI failure diagnostics (web-e2e-perceived)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ci-failure-diagnostics-web-e2e-perceived-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          path: |
            .runtime-cache/web-e2e-perceived.log
            .runtime-cache/web-e2e-perceived-api.log
            .runtime-cache/web-e2e-perceived-temporal.log
            .runtime-cache/web-e2e-perceived-worker.log

      - name: Stop perceived e2e API
        if: always()
        run: |
          if [[ -n "${WEB_E2E_PERCEIVED_API_PID:-}" ]]; then
            kill "${WEB_E2E_PERCEIVED_API_PID}" >/dev/null 2>&1 || true
          fi

      - name: Stop perceived e2e worker
        if: always()
        run: |
          if [[ -n "${WEB_E2E_PERCEIVED_WORKER_PID:-}" ]]; then
            kill "${WEB_E2E_PERCEIVED_WORKER_PID}" >/dev/null 2>&1 || true
          fi

      - name: Stop perceived e2e Temporal dev server
        if: always()
        run: |
          if [[ -n "${WEB_E2E_PERCEIVED_TEMPORAL_PID:-}" ]]; then
            kill "${WEB_E2E_PERCEIVED_TEMPORAL_PID}" >/dev/null 2>&1 || true
          fi

  dependency-vuln-scan:
    runs-on: [self-hosted, shared-pool]
    timeout-minutes: 25
    needs: [preflight-fast, changes]
    if: ${{ always() && needs.preflight-fast.result == 'success' && needs.changes.result == 'success' && (github.event_name != 'pull_request' || needs.changes.outputs.deps_changed == 'true') }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install "uv==${UV_PIP_VERSION}"

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Python dependency audit (pip-audit)
        run: uv run --with pip-audit pip-audit --progress-spinner off

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web deps
        run: npm --prefix apps/web ci

      - name: Web dependency policy gate (no floating versions)
        run: |
          node - <<'JS'
          const fs = require("fs");
          const path = "apps/web/package.json";
          const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
          const sections = ["dependencies", "devDependencies", "peerDependencies", "optionalDependencies"];
          const violations = [];

          for (const section of sections) {
            const deps = pkg[section] || {};
            for (const [name, version] of Object.entries(deps)) {
              const v = String(version).trim();
              if (v === "latest" || v === "*" || /^https?:/i.test(v) || /^git\+/i.test(v)) {
                violations.push(`${section}.${name}=${v}`);
              }
            }
          }

          if (violations.length) {
            console.error("Floating dependency versions are not allowed:");
            for (const item of violations) console.error(`- ${item}`);
            process.exit(1);
          }
          console.log("Web dependency policy gate passed");
          JS

      - name: Web runtime dependency audit (npm audit high+)
        run: npm --prefix apps/web audit --omit=dev --audit-level=high

  aggregate-gate:
    runs-on: [self-hosted, shared-pool]
    timeout-minutes: 10
    if: always()
    needs:
      - required-ci-secrets
      - changes
      - preflight-fast
      - preflight-heavy
      - profile-governance
      - quality-gate-pre-push
      - db-migration-smoke
      - mutation-testing
      - python-tests
      - api-real-smoke
      - pr-llm-real-smoke
      - backend-lint
      - frontend-lint
      - web-test-build
      - web-e2e
      - web-e2e-perceived
      - external-playwright-smoke
      - dependency-vuln-scan
    steps:
      - name: Enforce aggregate gate
        run: |
          event_name="${{ github.event_name }}"
          ref="${{ github.ref }}"
          is_pr=0
          if [[ "$event_name" == "pull_request" ]]; then
            is_pr=1
          fi

          backend_changed="${{ needs.changes.outputs.backend_changed }}"
          web_changed="${{ needs.changes.outputs.web_changed }}"
          deps_changed="${{ needs.changes.outputs.deps_changed }}"
          migrations_changed="${{ needs.changes.outputs.migrations_changed }}"

          declare -A results
          results[required_ci_secrets]="${{ needs.required-ci-secrets.result }}"
          results[changes]="${{ needs.changes.result }}"
          results[preflight_fast]="${{ needs.preflight-fast.result }}"
          results[preflight_heavy]="${{ needs.preflight-heavy.result }}"
          results[profile_governance]="${{ needs.profile-governance.result }}"
          results[quality_gate_pre_push]="${{ needs.quality-gate-pre-push.result }}"
          results[db_migration_smoke]="${{ needs.db-migration-smoke.result }}"
          results[mutation_testing]="${{ needs.mutation-testing.result }}"
          results[python_tests]="${{ needs.python-tests.result }}"
          results[api_real_smoke]="${{ needs.api-real-smoke.result }}"
          results[pr_llm_real_smoke]="${{ needs.pr-llm-real-smoke.result }}"
          results[backend_lint]="${{ needs.backend-lint.result }}"
          results[frontend_lint]="${{ needs.frontend-lint.result }}"
          results[web_test_build]="${{ needs.web-test-build.result }}"
          results[web_e2e]="${{ needs.web-e2e.result }}"
          results[web_e2e_perceived]="${{ needs.web-e2e-perceived.result }}"
          results[external_playwright_smoke]="${{ needs.external-playwright-smoke.result }}"
          results[dependency_vuln_scan]="${{ needs.dependency-vuln-scan.result }}"

          failed=0
          require_main_schedule_release_only=0
          if [[ "$event_name" == "schedule" || ( "$event_name" == "push" && ( "$ref" == "refs/heads/main" || "$ref" == refs/heads/release/* ) ) ]]; then
            require_main_schedule_release_only=1
          fi
          echo "event=$event_name ref=$ref is_pr=$is_pr require_main_schedule_release_only=$require_main_schedule_release_only"
          echo "changes: backend=$backend_changed web=$web_changed deps=$deps_changed migrations=$migrations_changed"

          for job in required_ci_secrets changes preflight_fast preflight_heavy; do
            result="${results[$job]}"
            echo "$job=$result"
            if [[ "$result" != "success" ]]; then
              failed=1
            fi
          done

          check_required_job() {
            local job="$1"
            local required="$2"
            local result="${results[$job]}"
            echo "$job=$result required=$required"
            if [[ "$required" == "1" ]]; then
              if [[ "$result" != "success" ]]; then
                failed=1
              fi
            else
              if [[ "$result" != "success" && "$result" != "skipped" ]]; then
                failed=1
              fi
            fi
          }

          required_db_migration=1
          required_backend_group=1
          required_web_group=1
          required_api_real_smoke=1
          required_web_test_build=1
          required_web_e2e=1
          required_web_e2e_perceived=1
          required_deps_scan=1
          required_profile_governance="$require_main_schedule_release_only"
          if [[ "$is_pr" -eq 1 ]]; then
            [[ "$migrations_changed" == "true" ]] && required_db_migration=1 || required_db_migration=0
            [[ "$backend_changed" == "true" ]] && required_backend_group=1 || required_backend_group=0
            [[ "$web_changed" == "true" ]] && required_web_group=1 || required_web_group=0
            [[ "$backend_changed" == "true" ]] && required_api_real_smoke=1 || required_api_real_smoke=0
            if [[ "$web_changed" == "true" || "$deps_changed" == "true" ]]; then
              required_web_test_build=1
            else
              required_web_test_build=0
            fi
            if [[ "$backend_changed" == "true" || "$web_changed" == "true" || "$deps_changed" == "true" ]]; then
              required_web_e2e=1
              required_web_e2e_perceived=1
            else
              required_web_e2e=0
              required_web_e2e_perceived=0
            fi
            [[ "$deps_changed" == "true" ]] && required_deps_scan=1 || required_deps_scan=0
          fi

          check_required_job db_migration_smoke "$required_db_migration"
          check_required_job mutation_testing "$required_backend_group"
          check_required_job python_tests "$required_backend_group"
          check_required_job api_real_smoke "$required_api_real_smoke"
          check_required_job backend_lint "$required_backend_group"
          check_required_job frontend_lint "$required_web_group"
          check_required_job web_test_build "$required_web_test_build"
          check_required_job web_e2e "$required_web_e2e"
          check_required_job web_e2e_perceived "$required_web_e2e_perceived"
          check_required_job dependency_vuln_scan "$required_deps_scan"

          profile_governance_result="${results[profile_governance]}"
          quality_gate_result="${results[quality_gate_pre_push]}"
          external_playwright_result="${results[external_playwright_smoke]}"
          echo "profile_governance=$profile_governance_result required=$required_profile_governance"
          echo "quality_gate_pre_push=$quality_gate_result"
          echo "external_playwright_smoke=$external_playwright_result"

          if [[ "$required_profile_governance" == "1" ]]; then
            if [[ "$profile_governance_result" != "success" ]]; then
              failed=1
            fi
          elif [[ "$profile_governance_result" != "success" && "$profile_governance_result" != "skipped" ]]; then
            failed=1
          fi
          if [[ "$quality_gate_result" != "success" && "$quality_gate_result" != "skipped" ]]; then
            failed=1
          fi
          if [[ "$external_playwright_result" != "success" && "$external_playwright_result" != "skipped" ]]; then
            failed=1
          fi

          pr_llm_result="${results[pr_llm_real_smoke]}"
          echo "pr_llm_real_smoke=$pr_llm_result"
          if [[ "$pr_llm_result" != "success" && "$pr_llm_result" != "skipped" ]]; then
            failed=1
          fi

          if [[ "$failed" -ne 0 ]]; then
            echo "aggregate gate failed"
            exit 1
          fi
          echo "aggregate gate passed"

  nightly-flaky-python:
    runs-on: [self-hosted, shared-pool]
    timeout-minutes: 40
    if: ${{ github.event_name == 'schedule' }}
    needs: preflight-fast
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install "uv==${UV_PIP_VERSION}"

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Nightly flaky subset (repeat x3)
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/apps/worker
          DATABASE_URL: "sqlite+pysqlite:///:memory:"
          TEMPORAL_TARGET_HOST: 127.0.0.1:7233
          TEMPORAL_NAMESPACE: default
          TEMPORAL_TASK_QUEUE: video-analysis-worker
          SQLITE_STATE_PATH: /tmp/video-digestor-api-tests-nightly.db
          SQLITE_PATH: /tmp/video-digestor-worker-tests-nightly.db
          PIPELINE_WORKSPACE_DIR: /tmp/video-digestor-workspace-nightly
          PIPELINE_ARTIFACT_ROOT: /tmp/video-digestor-artifacts-nightly
        run: |
          for i in 1 2 3; do
            echo "nightly flaky run #${i}"
            uv run pytest \
              apps/worker/tests/test_runner_modes.py::test_run_pipeline_text_only_mode_skips_media_steps \
              apps/worker/tests/test_runner_modes.py::test_run_pipeline_refresh_llm_forces_only_llm_steps \
              apps/api/tests/test_api_routes.py::test_healthz_returns_ok_status \
              apps/api/tests/test_api_routes.py::test_video_process_returns_mode_field \
              apps/mcp/tests/test_tool_normalizers.py::test_health_system_tool_returns_status \
              -q -rA
          done

  nightly-flaky-web-e2e:
    runs-on: [self-hosted, shared-pool]
    timeout-minutes: 60
    if: ${{ github.event_name == 'schedule' }}
    needs: preflight-fast
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install "uv==${UV_PIP_VERSION}"

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ matrix.browser }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ matrix.browser }}-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Install web deps
        run: npm --prefix apps/web ci

      - name: Install Playwright browser (${{ matrix.browser }})
        run: |
          for attempt in $(seq 1 8); do
            if uv run --with playwright python -m playwright install --with-deps ${{ matrix.browser }}; then
              exit 0
            fi
            if sudo fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 || sudo fuser /var/lib/apt/lists/lock >/dev/null 2>&1 || sudo fuser /var/cache/apt/archives/lock >/dev/null 2>&1; then
              echo "playwright dependency install hit apt/dpkg lock, retrying (${attempt}/8)..."
              sleep 8
              continue
            fi
            echo "playwright install failed without apt lock contention"
            exit 1
          done
          echo "playwright install failed after retries"
          exit 1

      - name: Nightly flaky web E2E subset (repeat x2)
        run: |
          BROWSER="${{ matrix.browser }}"
          for i in 1 2; do
            echo "nightly web flaky run #${i} (${BROWSER})"
            uv run --with pytest --with playwright \
              pytest apps/web/tests/e2e/test_dashboard.py apps/web/tests/e2e/test_subscriptions.py -q -rA \
                --web-e2e-browser "$BROWSER"
          done

  autofix-dry-run:
    name: autofix-dry-run
    runs-on: [self-hosted, shared-pool]
    timeout-minutes: 15
    needs: [python-tests, web-e2e]
    if: ${{ always() && (needs.python-tests.result == 'failure' || needs.web-e2e.result == 'failure') }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Download CI diagnostics artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: ci-failure-diagnostics-*
          merge-multiple: true
          path: .runtime-cache

      - name: Generate autofix dry-run report
        run: |
          python3 scripts/ci_autofix.py \
            --junit-glob ".runtime-cache/**/*.xml" \
            --log-glob ".runtime-cache/**/*.log" \
            --output .runtime-cache/autofix-report.json

      - name: Upload autofix report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: autofix-dry-run-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: .runtime-cache/autofix-report.json

  live-smoke:
    needs: aggregate-gate
    runs-on: [self-hosted, shared-pool]
    timeout-minutes: 40
    if: >-
      always() &&
      needs['aggregate-gate'].result == 'success' &&
      (github.event_name == 'schedule' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))))
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: video_analysis_live_smoke
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432/tcp
        options: >-
          --health-cmd "pg_isready -U postgres -d video_analysis_live_smoke"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Setup Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          version: ${{ env.UV_PIP_VERSION }}

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-uv-live-smoke-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-live-smoke-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Install PostgreSQL client
        run: |
          for attempt in $(seq 1 20); do
            if sudo apt-get update && sudo apt-get install -y postgresql-client; then
              exit 0
            fi
            echo "apt install attempt ${attempt}/20 failed, retrying..."
            sleep 5
          done
          echo "apt install failed after retries"
          exit 1

      - name: Install Temporal CLI
        run: |
          arch="$(uname -m)"
          case "$arch" in
            x86_64|amd64)
              temporal_arch="amd64"
              expected_sha="${TEMPORAL_CLI_SHA256_LINUX_AMD64}"
              ;;
            aarch64|arm64)
              temporal_arch="arm64"
              expected_sha="${TEMPORAL_CLI_SHA256_LINUX_ARM64}"
              ;;
            *)
              echo "Unsupported architecture for Temporal CLI: ${arch}" >&2
              exit 1
              ;;
          esac
          archive="temporal_cli_${TEMPORAL_CLI_VERSION}_linux_${temporal_arch}.tar.gz"
          url="https://github.com/temporalio/cli/releases/download/v${TEMPORAL_CLI_VERSION}/${archive}"
          curl -fsSL "$url" -o "/tmp/${archive}"
          echo "${expected_sha}  /tmp/${archive}" | sha256sum -c -
          tar -xzf "/tmp/${archive}" -C /tmp temporal
          mkdir -p "$HOME/.local/bin"
          install -m 0755 /tmp/temporal "$HOME/.local/bin/temporal"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run migrations for live smoke DB
        env:
          PGPASSWORD: postgres
          PGPORT: ${{ job.services.postgres.ports['5432'] }}
        run: |
          for _ in $(seq 1 30); do
            if pg_isready -h 127.0.0.1 -p "$PGPORT" -U postgres -d video_analysis_live_smoke >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          for migration in $(find infra/migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            psql "postgresql://postgres:postgres@127.0.0.1:${PGPORT}/video_analysis_live_smoke" -v ON_ERROR_STOP=1 -f "$migration"
          done

      - name: Start Temporal dev server for live smoke (127.0.0.1:7233)
        run: |
          mkdir -p .runtime-cache
          temporal server start-dev --ip 127.0.0.1 --port 7233 > .runtime-cache/live-smoke-temporal.log 2>&1 &
          echo "LIVE_SMOKE_TEMPORAL_PID=$!" >> "$GITHUB_ENV"

          python - <<'PY'
          import socket
          import sys
          import time

          port = 7233
          for _ in range(60):
              sock = socket.socket()
              sock.settimeout(1)
              try:
                  sock.connect(("127.0.0.1", port))
                  sock.close()
                  print(f"temporal live-smoke ready on 127.0.0.1:{port}")
                  sys.exit(0)
              except OSError:
                  time.sleep(1)
              finally:
                  sock.close()

          print(f"temporal live-smoke failed to become ready on 127.0.0.1:{port}", file=sys.stderr)
          sys.exit(1)
          PY

      - name: Validate required live smoke secrets
        env:
          HAS_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY != '' }}
          HAS_RESEND_API_KEY: ${{ secrets.RESEND_API_KEY != '' }}
          HAS_RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL != '' }}
          HAS_YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY != '' }}
        run: |
          missing=()
          [[ "$HAS_GEMINI_API_KEY" != "true" ]] && missing+=("GEMINI_API_KEY")
          [[ "$HAS_RESEND_API_KEY" != "true" ]] && missing+=("RESEND_API_KEY")
          [[ "$HAS_RESEND_FROM_EMAIL" != "true" ]] && missing+=("RESEND_FROM_EMAIL")
          [[ "$HAS_YOUTUBE_API_KEY" != "true" ]] && missing+=("YOUTUBE_API_KEY")
          if [[ "${#missing[@]}" -gt 0 ]]; then
            echo "live smoke is required on main/release/schedule but missing secrets: ${missing[*]}"
            exit 1
          fi

      - name: Start local API and Worker for live smoke target
        env:
          DATABASE_URL: "postgresql+psycopg://postgres:postgres@127.0.0.1:${{ job.services.postgres.ports['5432'] }}/video_analysis_live_smoke"
          TEMPORAL_TARGET_HOST: 127.0.0.1:7233
          TEMPORAL_NAMESPACE: default
          TEMPORAL_TASK_QUEUE: video-analysis-worker
          SQLITE_STATE_PATH: /tmp/video-digestor-api-live-smoke-${{ github.run_id }}-${{ github.run_attempt }}.db
          SQLITE_PATH: /tmp/video-digestor-live-smoke-${{ github.run_id }}-${{ github.run_attempt }}.db
          PIPELINE_WORKSPACE_DIR: /tmp/video-digestor-live-smoke-workspace-${{ github.run_id }}-${{ github.run_attempt }}
          PIPELINE_ARTIFACT_ROOT: /tmp/video-digestor-live-smoke-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          VD_ALLOW_UNAUTH_WRITE: "true"
          VD_CI_ALLOW_UNAUTH_WRITE: "true"
        run: |
          mkdir -p .runtime-cache
          scripts/dev_api.sh --host 127.0.0.1 --port 18080 --no-reload > .runtime-cache/live-smoke-api.log 2>&1 &
          LIVE_SMOKE_API_PID="$!"
          echo "LIVE_SMOKE_API_PID=${LIVE_SMOKE_API_PID}" >> "$GITHUB_ENV"
          scripts/dev_worker.sh --no-show-hints > .runtime-cache/live-smoke-worker.log 2>&1 &
          LIVE_SMOKE_WORKER_PID="$!"
          echo "LIVE_SMOKE_WORKER_PID=${LIVE_SMOKE_WORKER_PID}" >> "$GITHUB_ENV"

          api_ready=0
          for _ in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:18080/healthz" >/dev/null 2>&1; then
              api_ready=1
              break
            fi
            sleep 1
          done

          if [[ "$api_ready" != "1" ]]; then
            echo "local live smoke API failed to become ready"
            tail -n 120 .runtime-cache/live-smoke-api.log || true
            tail -n 120 .runtime-cache/live-smoke-worker.log || true
            exit 1
          fi
          echo "local live smoke API is ready"

          if ! kill -0 "${LIVE_SMOKE_WORKER_PID}" >/dev/null 2>&1; then
            echo "live smoke worker process exited unexpectedly"
            tail -n 120 .runtime-cache/live-smoke-worker.log || true
            exit 1
          fi

          if ! kill -0 "${LIVE_SMOKE_TEMPORAL_PID}" >/dev/null 2>&1; then
            echo "live smoke temporal process exited unexpectedly"
            tail -n 120 .runtime-cache/live-smoke-temporal.log || true
            exit 1
          fi

      - name: Run live smoke
        env:
          DATABASE_URL: "postgresql+psycopg://postgres:postgres@127.0.0.1:${{ job.services.postgres.ports['5432'] }}/video_analysis_live_smoke"
          TEMPORAL_TARGET_HOST: 127.0.0.1:7233
          TEMPORAL_NAMESPACE: default
          TEMPORAL_TASK_QUEUE: video-analysis-worker
          SQLITE_PATH: /tmp/video-digestor-live-smoke-${{ github.run_id }}-${{ github.run_attempt }}.db
          PIPELINE_WORKSPACE_DIR: /tmp/video-digestor-live-smoke-workspace-${{ github.run_id }}-${{ github.run_attempt }}
          PIPELINE_ARTIFACT_ROOT: /tmp/video-digestor-live-smoke-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          scripts/e2e_live_smoke.sh \
            --api-base-url "http://127.0.0.1:18080" \
            --require-api "1" \
            --require-secrets "1" \
            --computer-use-strict "1" \
            --computer-use-skip "0" \
            --timeout-seconds "600" \
            --heartbeat-seconds "30" \
            --diagnostics-json ".runtime-cache/e2e-live-smoke-result.json"

      - name: Upload live smoke diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: live-smoke-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            .runtime-cache/e2e-live-smoke-result.json
            .runtime-cache/live-smoke-temporal.log
            .runtime-cache/live-smoke-api.log
            .runtime-cache/live-smoke-worker.log

      - name: Stop live smoke services
        if: always()
        run: |
          if [[ -n "${LIVE_SMOKE_API_PID:-}" ]]; then
            kill "${LIVE_SMOKE_API_PID}" >/dev/null 2>&1 || true
          fi
          if [[ -n "${LIVE_SMOKE_WORKER_PID:-}" ]]; then
            kill "${LIVE_SMOKE_WORKER_PID}" >/dev/null 2>&1 || true
          fi
          if [[ -n "${LIVE_SMOKE_TEMPORAL_PID:-}" ]]; then
            kill "${LIVE_SMOKE_TEMPORAL_PID}" >/dev/null 2>&1 || true
          fi

  ci-final-gate:
    runs-on: [self-hosted, shared-pool]
    timeout-minutes: 10
    if: always()
    needs:
      - aggregate-gate
      - live-smoke
      - nightly-flaky-python
      - nightly-flaky-web-e2e
    steps:
      - name: Enforce final gate (with required live smoke on main/release/nightly)
        run: |
          aggregate_result="${{ needs.aggregate-gate.result }}"
          live_smoke_result="${{ needs.live-smoke.result }}"
          nightly_flaky_result="${{ needs.nightly-flaky-python.result }}"
          nightly_flaky_web_e2e_result="${{ needs.nightly-flaky-web-e2e.result }}"
          event_name="${{ github.event_name }}"
          ref="${{ github.ref }}"

          require_live_smoke=0
          if [[ "$event_name" == "schedule" ]]; then
            require_live_smoke=1
          elif [[ "$event_name" == "push" && "$ref" == "refs/heads/main" ]]; then
            require_live_smoke=1
          elif [[ "$event_name" == "push" && "$ref" == refs/heads/release/* ]]; then
            require_live_smoke=1
          fi

          echo "aggregate-gate=$aggregate_result"
          echo "live-smoke=$live_smoke_result"
          echo "nightly-flaky-python=$nightly_flaky_result"
          echo "nightly-flaky-web-e2e=$nightly_flaky_web_e2e_result"
          echo "event=$event_name ref=$ref require_live_smoke=$require_live_smoke"

          if [[ "$aggregate_result" != "success" ]]; then
            echo "final gate failed: aggregate gate is not successful"
            exit 1
          fi

          if [[ "$event_name" == "schedule" && "$nightly_flaky_result" != "success" ]]; then
            echo "final gate failed: nightly flaky subset must pass on schedule runs (result='$nightly_flaky_result')"
            exit 1
          fi

          if [[ "$event_name" == "schedule" && "$nightly_flaky_web_e2e_result" != "success" ]]; then
            echo "final gate failed: nightly flaky web e2e subset must pass on schedule runs (result='$nightly_flaky_web_e2e_result')"
            exit 1
          fi

          if [[ "$require_live_smoke" -eq 1 ]]; then
            if [[ "$live_smoke_result" != "success" ]]; then
              echo "final gate failed: live smoke required on main/release/nightly but result is '$live_smoke_result'"
              exit 1
            fi
          fi

          if [[ "$require_live_smoke" -eq 0 && "$live_smoke_result" != "success" && "$live_smoke_result" != "skipped" ]]; then
            echo "final gate failed: live smoke is optional in this context, but ran and did not succeed (result='$live_smoke_result')"
            exit 1
          fi

          echo "final gate passed"
  backend-lint-hosted:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 20
    needs: [preflight-fast, changes]
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.backend_changed == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install "uv==${UV_PIP_VERSION}"

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Placebo assertion guard (all tests)
        run: python3 scripts/check_test_assertions.py

      - name: Backend lint (ruff critical rules)
        run: uv run --with ruff ruff check apps scripts --select E9,F63,F7,F82

      - name: Backend lint (ruff full rules)
        run: uv run --with ruff ruff check apps scripts

  backend-lint-fallback:
    runs-on: [self-hosted, shared-pool]
    timeout-minutes: 25
    needs: [preflight-fast, changes, backend-lint-hosted]
    if: ${{ (github.event_name != 'pull_request' || needs.changes.outputs.backend_changed == 'true') && always() && needs['backend-lint-hosted'].result != 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install "uv==${UV_PIP_VERSION}"

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Placebo assertion guard (all tests)
        run: python3 scripts/check_test_assertions.py

      - name: Backend lint (ruff critical rules)
        run: uv run --with ruff ruff check apps scripts --select E9,F63,F7,F82

      - name: Backend lint (ruff full rules)
        run: uv run --with ruff ruff check apps scripts

  backend-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: [backend-lint-hosted, backend-lint-fallback]
    if: ${{ always() && (needs['backend-lint-hosted'].result == 'success' || needs['backend-lint-fallback'].result == 'success' || (needs['backend-lint-hosted'].result == 'skipped' && needs['backend-lint-fallback'].result == 'skipped')) }}
    steps:
      - name: Select backend-lint source
        run: |
          if [[ "${{ needs['backend-lint-hosted'].result }}" == "success" ]]; then
            echo "backend-lint source: hosted"
          elif [[ "${{ needs['backend-lint-fallback'].result }}" == "success" ]]; then
            echo "backend-lint source: shared-pool fallback"
          else
            echo "backend-lint source: skipped"
          fi

  frontend-lint-hosted:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 20
    needs: [preflight-fast, changes]
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.web_changed == 'true' }}
    steps:
      - name: Checkout
