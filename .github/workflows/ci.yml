name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - release/**
      - codex/**
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && format('ci-{0}-{1}-{2}', github.workflow, github.ref, github.run_id) || format('ci-{0}-{1}-{2}', github.workflow, github.event_name, github.ref) }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  id-token: write
  packages: read

env:
  CI_CACHE_ROOT: /tmp/ci-cache
  UV_PIP_VERSION: "0.10.7"
  UV_CACHE_DIR: /tmp/ci-cache/uv
  PLAYWRIGHT_BROWSERS_PATH: /tmp/ci-cache/ms-playwright
  TEMPORAL_CLI_VERSION: "1.5.1"
  TEMPORAL_CLI_SHA256_LINUX_AMD64: "ddc95e08b0b076efd4ea9733a3f488eb7d2be875f8834e616cd2a37358b4852d"
  TEMPORAL_CLI_SHA256_LINUX_ARM64: "bd1b0db9f18b051026de8bf6cc1505f2510f14bbb7a8b9a4a91fff46c77454f5"

jobs:
  trusted-pr-boundary:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Enforce trusted internal PR boundary
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]]; then
            echo "::error::trusted internal PR boundary violated: fork or untrusted PRs must not enter the privileged self-hosted CI path."
            exit 1
          fi
          echo "trusted PR boundary passed"

  required-ci-secrets:
    runs-on: [self-hosted, video-analysis-extract]
    timeout-minutes: 5
    needs: [trusted-pr-boundary]
    if: ${{ always() && needs.trusted-pr-boundary.result == 'success' }}
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
    steps:
      - name: Normalize self-hosted workspace (pre-checkout)
        shell: bash
        run: |
          set -euo pipefail
          workspace="${GITHUB_WORKSPACE:?}"
          uid="$(id -u)"
          gid="$(id -g)"
          stale_paths=(
            "$workspace/.runtime-cache"
            "$workspace/.venv"
            "$workspace/apps/web/node_modules"
          )
          if command -v sudo >/dev/null 2>&1; then
            if sudo find "$workspace" -mindepth 1 -uid 0 -print -quit | grep -q .; then
              echo "Detected root-owned residue under $workspace; normalizing ownership"
              sudo chown -R "$uid:$gid" "$workspace"
            fi
            for path in "${stale_paths[@]}"; do
              if sudo test -e "$path"; then
                echo "Removing stale workspace path: $path"
                sudo chmod -R u+w "$path" 2>/dev/null || true
                sudo rm -rf "$path" || true
              fi
            done
            generated_web_files=(
              "$workspace/apps/web/next-env.d.ts"
              "$workspace/apps/web/tsconfig.json"
            )
            for path in "${generated_web_files[@]}"; do
              if sudo test -e "$path"; then
                echo "Restoring generated workspace file: $path"
                sudo git -C "$workspace" checkout -- "$path" || sudo rm -f "$path" || true
              fi
            done
          else
            for path in "${stale_paths[@]}"; do
              rm -rf "$path" || true
            done
            rm -f "$workspace/apps/web/next-env.d.ts" || true
            git -C "$workspace" checkout -- apps/web/tsconfig.json >/dev/null 2>&1 || true
          fi

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true
      - name: Enforce required CI secrets/env vars
        run: |
          python3 scripts/check_required_ci_secrets.py \
            --required GEMINI_API_KEY \
            --required RESEND_API_KEY \
            --required RESEND_FROM_EMAIL \
            --required YOUTUBE_API_KEY

  ci-contract:
    runs-on: [self-hosted, video-analysis-extract]
    timeout-minutes: 5
    needs: [trusted-pr-boundary]
    if: ${{ always() && needs.trusted-pr-boundary.result == 'success' }}
    outputs:
      standard_image_ref: ${{ steps.contract.outputs.standard_image_ref }}
      service_image_pgvector_pg16: ${{ steps.contract.outputs.service_image_pgvector_pg16 }}
      mutation_min_score: ${{ steps.contract.outputs.mutation_min_score }}
      mutation_min_effective_ratio: ${{ steps.contract.outputs.mutation_min_effective_ratio }}
      mutation_max_no_tests_ratio: ${{ steps.contract.outputs.mutation_max_no_tests_ratio }}
      cache_root: ${{ steps.contract.outputs.cache_root }}
      uv_cache_dir: ${{ steps.contract.outputs.uv_cache_dir }}
      playwright_browsers_path: ${{ steps.contract.outputs.playwright_browsers_path }}
      pre_commit_home: ${{ steps.contract.outputs.pre_commit_home }}
      profile_governance_push_release: ${{ steps.contract.outputs.profile_governance_push_release }}
      live_smoke_push_release: ${{ steps.contract.outputs.live_smoke_push_release }}
    steps:
      - name: Normalize self-hosted workspace (pre-checkout)
        shell: bash
        run: |
          set -euo pipefail
          workspace="${GITHUB_WORKSPACE:?}"
          uid="$(id -u)"
          gid="$(id -g)"
          stale_paths=(
            "$workspace/.runtime-cache"
            "$workspace/.venv"
            "$workspace/apps/web/node_modules"
          )
          if command -v sudo >/dev/null 2>&1; then
            if sudo find "$workspace" -mindepth 1 -uid 0 -print -quit | grep -q .; then
              echo "Detected root-owned residue under $workspace; normalizing ownership"
              sudo chown -R "$uid:$gid" "$workspace"
            fi
            for path in "${stale_paths[@]}"; do
              if sudo test -e "$path"; then
                echo "Removing stale workspace path: $path"
                sudo chmod -R u+w "$path" 2>/dev/null || true
                sudo rm -rf "$path" || true
              fi
            done
            generated_web_files=(
              "$workspace/apps/web/next-env.d.ts"
              "$workspace/apps/web/tsconfig.json"
            )
            for path in "${generated_web_files[@]}"; do
              if sudo test -e "$path"; then
                echo "Restoring generated workspace file: $path"
                sudo git -C "$workspace" checkout -- "$path" || sudo rm -f "$path" || true
              fi
            done
          else
            for path in "${stale_paths[@]}"; do
              rm -rf "$path" || true
            done
            rm -f "$workspace/apps/web/next-env.d.ts" || true
            git -C "$workspace" checkout -- apps/web/tsconfig.json >/dev/null 2>&1 || true
          fi

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Read strict CI contract
        id: contract
        run: |
          python3 scripts/ci_contract.py github-outputs >> "$GITHUB_OUTPUT"


  changes:
    runs-on: [self-hosted, video-analysis-extract]
    timeout-minutes: 3
    needs: [trusted-pr-boundary]
    if: ${{ always() && needs.trusted-pr-boundary.result == 'success' }}
    outputs:
      backend_changed: ${{ github.event_name == 'pull_request' && steps.filter.outputs.backend_changed || steps.non_pr_defaults.outputs.backend_changed }}
      web_changed: ${{ github.event_name == 'pull_request' && steps.filter.outputs.web_changed || steps.non_pr_defaults.outputs.web_changed }}
      deps_changed: ${{ github.event_name == 'pull_request' && steps.filter.outputs.deps_changed || steps.non_pr_defaults.outputs.deps_changed }}
      migrations_changed: ${{ github.event_name == 'pull_request' && steps.filter.outputs.migrations_changed || steps.non_pr_defaults.outputs.migrations_changed }}
    steps:
      - name: Normalize self-hosted workspace (pre-checkout)
        shell: bash
        run: |
          set -euo pipefail
          workspace="${GITHUB_WORKSPACE:?}"
          uid="$(id -u)"
          gid="$(id -g)"
          stale_paths=(
            "$workspace/.runtime-cache"
            "$workspace/.venv"
            "$workspace/apps/web/node_modules"
          )
          if command -v sudo >/dev/null 2>&1; then
            if sudo find "$workspace" -mindepth 1 -uid 0 -print -quit | grep -q .; then
              echo "Detected root-owned residue under $workspace; normalizing ownership"
              sudo chown -R "$uid:$gid" "$workspace"
            fi
            for path in "${stale_paths[@]}"; do
              if sudo test -e "$path"; then
                echo "Removing stale workspace path: $path"
                sudo chmod -R u+w "$path" 2>/dev/null || true
                sudo rm -rf "$path" || true
              fi
            done
            generated_web_files=(
              "$workspace/apps/web/next-env.d.ts"
              "$workspace/apps/web/tsconfig.json"
            )
            for path in "${generated_web_files[@]}"; do
              if sudo test -e "$path"; then
                echo "Restoring generated workspace file: $path"
                sudo git -C "$workspace" checkout -- "$path" || sudo rm -f "$path" || true
              fi
            done
          else
            for path in "${stale_paths[@]}"; do
              rm -rf "$path" || true
            done
            rm -f "$workspace/apps/web/next-env.d.ts" || true
            git -C "$workspace" checkout -- apps/web/tsconfig.json >/dev/null 2>&1 || true
          fi

      - name: Checkout
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true
          fetch-depth: 0

      - name: Detect changed paths (PR only)
        if: ${{ github.event_name == 'pull_request' }}
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          filters: |
            backend_changed:
              - 'apps/api/**'
              - 'apps/worker/**'
              - 'apps/mcp/**'
              - 'packages/shared-contracts/**'
              - 'scripts/**'
              - 'infra/config/**'
              - 'infra/compose/**'
              - 'infra/sql/**'
              - 'pyproject.toml'
              - 'uv.lock'
            web_changed:
              - 'apps/web/**'
            deps_changed:
              - 'pyproject.toml'
              - 'uv.lock'
              - 'apps/web/package.json'
              - 'apps/web/package-lock.json'
            migrations_changed:
              - 'infra/migrations/**'

      - name: Default full-run flags (non-PR)
        if: ${{ github.event_name != 'pull_request' }}
        id: non_pr_defaults
        run: |
          {
            echo "backend_changed=true"
            echo "web_changed=true"
            echo "deps_changed=true"
            echo "migrations_changed=true"
          } >> "$GITHUB_OUTPUT"

  preflight-fast:
    needs: [trusted-pr-boundary]
    if: ${{ always() && needs.trusted-pr-boundary.result == 'success' }}
    uses: ./.github/workflows/_preflight-fast-steps.yml
    with:
      runs-on: '["self-hosted","video-analysis-extract"]'

  preflight-heavy:
    runs-on: [self-hosted, video-analysis-extract]
    timeout-minutes: 20
    needs: [preflight-fast, ci-contract]
    if: ${{ always() && needs.preflight-fast.result == 'success' && needs.ci-contract.result == 'success' }}
    container:
      image: ${{ needs.ci-contract.outputs.standard_image_ref }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      CI_CACHE_ROOT: ${{ needs.ci-contract.outputs.cache_root }}
      UV_CACHE_DIR: ${{ needs.ci-contract.outputs.uv_cache_dir }}
    steps:
      - name: Normalize self-hosted workspace (pre-checkout)
        shell: bash
        run: |
          set -euo pipefail
          workspace="${GITHUB_WORKSPACE:?}"
          uid="$(id -u)"
          gid="$(id -g)"
          stale_paths=(
            "$workspace/.runtime-cache"
            "$workspace/.venv"
            "$workspace/apps/web/node_modules"
          )
          if command -v sudo >/dev/null 2>&1; then
            if sudo find "$workspace" -mindepth 1 -uid 0 -print -quit | grep -q .; then
              echo "Detected root-owned residue under $workspace; normalizing ownership"
              sudo chown -R "$uid:$gid" "$workspace"
            fi
            for path in "${stale_paths[@]}"; do
              if sudo test -e "$path"; then
                echo "Removing stale workspace path: $path"
                sudo chmod -R u+w "$path" 2>/dev/null || true
                sudo rm -rf "$path" || true
              fi
            done
            generated_web_files=(
              "$workspace/apps/web/next-env.d.ts"
              "$workspace/apps/web/tsconfig.json"
            )
            for path in "${generated_web_files[@]}"; do
              if sudo test -e "$path"; then
                echo "Restoring generated workspace file: $path"
                sudo git -C "$workspace" checkout -- "$path" || sudo rm -f "$path" || true
              fi
            done
          else
            for path in "${stale_paths[@]}"; do
              rm -rf "$path" || true
            done
            rm -f "$workspace/apps/web/next-env.d.ts" || true
            git -C "$workspace" checkout -- apps/web/tsconfig.json >/dev/null 2>&1 || true
          fi

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Enforce runner disk budget
        run: |
          bash scripts/runner_workspace_maintenance.sh --workspace "$GITHUB_WORKSPACE"
          python3 scripts/check_runner_baseline.py --profile ci-heavy --workspace "$GITHUB_WORKSPACE"

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Structured log critical-path guard
        run: python3 scripts/check_structured_logs.py

  profile-governance:
    runs-on: [self-hosted, video-analysis-extract]
    timeout-minutes: 20
    if: ${{ always() && needs.preflight-heavy.result == 'success' && (github.event_name == 'schedule' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')))) }}
    needs: preflight-heavy
    strategy:
      fail-fast: false
      matrix:
        gate_profile: [local, ci-live-smoke]
    steps:
      - name: Normalize self-hosted workspace (pre-checkout)
        shell: bash
        run: |
          set -euo pipefail
          workspace="${GITHUB_WORKSPACE:?}"
          uid="$(id -u)"
          gid="$(id -g)"
          stale_paths=(
            "$workspace/.runtime-cache"
            "$workspace/.venv"
            "$workspace/apps/web/node_modules"
          )
          if command -v sudo >/dev/null 2>&1; then
            if sudo find "$workspace" -mindepth 1 -uid 0 -print -quit | grep -q .; then
              echo "Detected root-owned residue under $workspace; normalizing ownership"
              sudo chown -R "$uid:$gid" "$workspace"
            fi
            for path in "${stale_paths[@]}"; do
              if sudo test -e "$path"; then
                echo "Removing stale workspace path: $path"
                sudo chmod -R u+w "$path" 2>/dev/null || true
                sudo rm -rf "$path" || true
              fi
            done
            generated_web_files=(
              "$workspace/apps/web/next-env.d.ts"
              "$workspace/apps/web/tsconfig.json"
            )
            for path in "${generated_web_files[@]}"; do
              if sudo test -e "$path"; then
                echo "Restoring generated workspace file: $path"
                sudo git -C "$workspace" checkout -- "$path" || sudo rm -f "$path" || true
              fi
            done
          else
            for path in "${stale_paths[@]}"; do
              rm -rf "$path" || true
            done
            rm -f "$workspace/apps/web/next-env.d.ts" || true
            git -C "$workspace" checkout -- apps/web/tsconfig.json >/dev/null 2>&1 || true
          fi

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Enforce runner disk budget
        run: |
          bash scripts/runner_workspace_maintenance.sh --workspace "$GITHUB_WORKSPACE" --include-runner-diag 1
          python3 scripts/check_runner_baseline.py --profile ci-heavy --workspace "$GITHUB_WORKSPACE"

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Profile governance gate (${{ matrix.gate_profile }})
        run: |
          if [[ "${{ matrix.gate_profile }}" == "local" ]]; then
            ./scripts/quality_gate.sh --mode pre-commit --profile local --profile-only
          else
            ./scripts/quality_gate.sh \
              --mode pre-push \
              --profile ci \
              --profile live-smoke \
              --profile-only \
              --heartbeat-seconds 20 \
              --mutation-min-score 0.64
          fi

  quality-gate-pre-push:
    runs-on: [self-hosted, video-analysis-extract, core02]
    timeout-minutes: 90
    needs: [preflight-heavy, changes, ci-contract]
    container:
      image: ${{ needs.ci-contract.outputs.standard_image_ref }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      CI_CACHE_ROOT: ${{ needs.ci-contract.outputs.cache_root }}
      UV_CACHE_DIR: ${{ needs.ci-contract.outputs.uv_cache_dir }}
      PLAYWRIGHT_BROWSERS_PATH: ${{ needs.ci-contract.outputs.playwright_browsers_path }}
    steps:
      - name: Normalize self-hosted workspace (pre-checkout)
        shell: bash
        run: |
          set -euo pipefail
          workspace="${GITHUB_WORKSPACE:?}"
          uid="$(id -u)"
          gid="$(id -g)"
          stale_paths=(
            "$workspace/.runtime-cache"
            "$workspace/.venv"
            "$workspace/apps/web/node_modules"
          )
          if command -v sudo >/dev/null 2>&1; then
            if sudo find "$workspace" -mindepth 1 -uid 0 -print -quit | grep -q .; then
              echo "Detected root-owned residue under $workspace; normalizing ownership"
              sudo chown -R "$uid:$gid" "$workspace"
            fi
            for path in "${stale_paths[@]}"; do
              if sudo test -e "$path"; then
                echo "Removing stale workspace path: $path"
                sudo chmod -R u+w "$path" 2>/dev/null || true
                sudo rm -rf "$path" || true
              fi
            done
            generated_web_files=(
              "$workspace/apps/web/next-env.d.ts"
              "$workspace/apps/web/tsconfig.json"
            )
            for path in "${generated_web_files[@]}"; do
              if sudo test -e "$path"; then
                echo "Restoring generated workspace file: $path"
                sudo git -C "$workspace" checkout -- "$path" || sudo rm -f "$path" || true
              fi
            done
          else
            for path in "${stale_paths[@]}"; do
              rm -rf "$path" || true
            done
            rm -f "$workspace/apps/web/next-env.d.ts" || true
            git -C "$workspace" checkout -- apps/web/tsconfig.json >/dev/null 2>&1 || true
          fi

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Enforce runner disk budget
        run: |
          bash scripts/runner_workspace_maintenance.sh --workspace "$GITHUB_WORKSPACE"
          python3 scripts/check_runner_baseline.py --profile ci-heavy --workspace "$GITHUB_WORKSPACE"

      - name: Gemini UI/UX audit (blocking)
        id: gemini_ui_ux_audit
        if: ${{ needs.changes.outputs.web_changed == 'true' || needs.changes.outputs.deps_changed == 'true' }}
        continue-on-error: true
        shell: bash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_UI_UX_AUDIT_REPORT_PATH: .runtime-cache/ui-audit/gemini-ui-ux-audit-report.json
        run: |
          set -euo pipefail
          mkdir -p .runtime-cache/ui-audit

          base_ref=""
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_ref="${{ github.event.pull_request.base.sha }}"
          else
            base_ref="${{ github.event.before }}"
            if [[ -z "$base_ref" || "$base_ref" == "0000000000000000000000000000000000000000" ]]; then
              base_ref="$(git rev-list --max-count=1 HEAD^ 2>/dev/null || true)"
            fi
          fi

          changed_files=""
          if [[ -n "$base_ref" ]]; then
            changed_files="$(git diff --name-only "$base_ref" "${{ github.sha }}" | rg '^apps/web/(app|components|lib)/.*\.(ts|tsx|js|jsx|css|scss|sass|html)$' || true)"
          fi
          if [[ -z "$changed_files" ]]; then
            changed_files="$(git ls-files apps/web/app apps/web/components apps/web/lib | rg '\.(ts|tsx|js|jsx|css|scss|sass|html)$' || true)"
          fi

          audit_args=()
          if [[ -n "$changed_files" ]]; then
            while IFS= read -r file; do
              [[ -z "$file" ]] && continue
              audit_args+=("$file")
            done <<< "$changed_files"
          fi

          uv run --with google-genai python3 scripts/gemini_ui_ux_audit.py "${audit_args[@]}" \
            2>&1 | tee .runtime-cache/ui-audit/gemini-ui-ux-audit.log

      - name: Gemini UI/UX audit summary (strict)
        if: ${{ always() && (needs.changes.outputs.web_changed == 'true' || needs.changes.outputs.deps_changed == 'true') }}
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          report = Path(".runtime-cache/ui-audit/gemini-ui-ux-audit-report.json")
          if not report.is_file():
              print("::error::gemini-ui-ux-audit report missing")
              raise SystemExit(1)

          payload = json.loads(report.read_text(encoding="utf-8"))
          status = str(payload.get("status", "unknown"))
          reason_code = str(payload.get("reason_code", payload.get("reason", "unknown")))
          provider_status = payload.get("provider_status")
          model_attempts = payload.get("model_attempts", [])
          batch_count = int(payload.get("batch_count", 0))
          successful_batches = int(payload.get("successful_batches", 0))
          issue_count = int(payload.get("issue_count", 0))
          blocking_count = int(payload.get("blocking_count", 0))
          warning_count = int(payload.get("warning_count", 0))
          line = (
              "gemini-ui-ux-audit summary: "
              f"status={status} reason_code={reason_code} provider_status={provider_status} "
              f"blocking_count={blocking_count} issue_count={issue_count} "
              f"batches={successful_batches}/{batch_count} model_attempts={len(model_attempts)}"
          )
          print(line)

          availability_only_reason_codes = {"provider_blocked", "provider_error", "sdk_unavailable"}
          advisory_only = status == "failed" and reason_code in availability_only_reason_codes

          if advisory_only:
              print(f"::warning::gemini-ui-ux-audit advisory-only availability issue: {line}")
          elif status == "failed":
              print(f"::warning::{line}")
          elif batch_count > 0 and successful_batches != batch_count:
              print(f"::warning::gemini-ui-ux-audit incomplete batch coverage: {line}")
          elif status == "passed" and not model_attempts:
              print(f"::warning::gemini-ui-ux-audit passed without model attempts: {line}")

          summary_path = os.getenv("GITHUB_STEP_SUMMARY", "")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as fh:
                  fh.write("\n### Gemini UI/UX Audit\n")
                  fh.write(f"- status: `{status}`\n")
                  fh.write(f"- reason_code: `{reason_code}`\n")
                  fh.write(f"- provider_status: `{provider_status}`\n")
                  fh.write(f"- successful_batches: `{successful_batches}/{batch_count}`\n")
                  fh.write(f"- blocking_count: `{blocking_count}`\n")
                  fh.write(f"- warning_count: `{warning_count}`\n")
                  fh.write(f"- issue_count: `{issue_count}`\n")
                  fh.write(f"- model_attempts: `{len(model_attempts)}`\n")

          failures = []
          if status != "passed" and not advisory_only:
              failures.append(f"status must be passed, got {status}")
          if reason_code != "ok" and not advisory_only:
              failures.append(f"reason_code must be ok, got {reason_code}")
          if batch_count > 0 and successful_batches != batch_count and not advisory_only:
              failures.append(
                  f"incomplete batch coverage: successful_batches={successful_batches} batch_count={batch_count}"
              )
          if batch_count > 0 and not model_attempts and not advisory_only:
              failures.append("passed result without model_attempts is invalid")
          if failures:
              for item in failures:
                  print(f"::error::gemini-ui-ux-audit strict gate: {item}")
              raise SystemExit(1)
          PY

