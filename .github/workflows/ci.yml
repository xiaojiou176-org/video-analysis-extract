          DATABASE_URL: "postgresql+psycopg://postgres:postgres@127.0.0.1:${{ job.services.postgres.ports['5432'] }}/video_analysis_pytests"
          TEMPORAL_TARGET_HOST: 127.0.0.1:7233
          TEMPORAL_NAMESPACE: default
          TEMPORAL_TASK_QUEUE: video-analysis-worker
          SQLITE_STATE_PATH: /tmp/video-digestor-api-tests.db
          SQLITE_PATH: /tmp/video-digestor-worker-tests.db
          PIPELINE_WORKSPACE_DIR: /tmp/video-digestor-workspace-tests
          PIPELINE_ARTIFACT_ROOT: /tmp/video-digestor-artifacts-tests
        run: |
          mkdir -p .runtime-cache
          set -o pipefail
          (
            uv run pytest apps/worker/tests apps/api/tests apps/mcp/tests -q -rA -n 2 \
              --cov=apps/worker/worker \
              --cov=apps/api \
              --cov=apps/mcp \
              --cov-report=term-missing:skip-covered \
              --cov-report=xml:.runtime-cache/python-coverage.xml \
              --cov-fail-under=85 \
              --junitxml=.runtime-cache/python-tests-junit.xml \
              2>&1 | tee .runtime-cache/python-tests.log
          ) &
          test_pid=$!

          while kill -0 "${test_pid}" >/dev/null 2>&1; do
            echo "[heartbeat] python tests still running ($(date -u +'%Y-%m-%dT%H:%M:%SZ'))"
            sleep 25
          done

          wait "${test_pid}"

      - name: Worker core pipeline coverage gate (>=95%)
        run: |
          set -o pipefail
          uv run coverage report \
            --include="*/apps/worker/worker/pipeline/orchestrator.py,*/apps/worker/worker/pipeline/policies.py,*/apps/worker/worker/pipeline/runner.py,*/apps/worker/worker/pipeline/types.py" \
            --show-missing \
            --fail-under=95 \
            2>&1 | tee .runtime-cache/python-coverage-worker-core.log

      - name: API core route + service coverage gate (>=95%)
        run: |
          set -o pipefail
          uv run coverage report \
            --include="*/apps/api/app/routers/ingest.py,*/apps/api/app/routers/jobs.py,*/apps/api/app/routers/subscriptions.py,*/apps/api/app/routers/videos.py,*/apps/api/app/services/jobs.py,*/apps/api/app/services/subscriptions.py,*/apps/api/app/services/videos.py" \
            --show-missing \
            --fail-under=95 \
            2>&1 | tee .runtime-cache/python-coverage-api-core.log

      - name: Python tests skip guard (no silent skip)
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET
          from pathlib import Path

          report = Path(".runtime-cache/python-tests-junit.xml")
          if not report.is_file():
              raise SystemExit("python skip guard failed: junit report missing")

          root = ET.parse(report).getroot()
          suites = [root] if root.tag == "testsuite" else root.findall("testsuite")
          tests = sum(int(suite.attrib.get("tests", "0")) for suite in suites)
          skipped = sum(int(suite.attrib.get("skipped", "0")) for suite in suites)

          if tests == 0:
              raise SystemExit("python skip guard failed: collected 0 tests")
          if skipped > 0:
              raise SystemExit(f"python skip guard failed: skipped={skipped} (no silent skip allowed)")
          print(f"python skip guard passed: tests={tests}, skipped={skipped}")
          PY

      - name: Upload CI failure diagnostics (python)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ci-failure-diagnostics-python-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          path: |
            .runtime-cache/python-tests-junit.xml
            .runtime-cache/python-tests.log
            .runtime-cache/python-coverage.xml

  api-real-smoke:
    runs-on: [self-hosted, shared-pool]
    timeout-minutes: 25
    needs: [preflight-fast, changes]
    if: ${{ always() && needs.preflight-fast.result == 'success' && needs.changes.result == 'success' && (github.event_name != 'pull_request' || needs.changes.outputs.backend_changed == 'true') }}
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: video_analysis_api_smoke
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432/tcp
        options: >-
          --health-cmd "pg_isready -U postgres -d video_analysis_api_smoke"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install "uv==${UV_PIP_VERSION}"

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Install PostgreSQL client
        run: |
          for attempt in $(seq 1 20); do
            if sudo apt-get update && sudo apt-get install -y postgresql-client; then
              exit 0
            fi
            echo "apt install attempt ${attempt}/20 failed, retrying..."
            sleep 5
          done
          echo "apt install failed after retries"
          exit 1

      - name: Run migrations for API smoke DB
        env:
          PGPASSWORD: postgres
          PGPORT: ${{ job.services.postgres.ports['5432'] }}
        run: |
          for _ in $(seq 1 30); do
            if pg_isready -h 127.0.0.1 -p "$PGPORT" -U postgres -d video_analysis_api_smoke >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          for migration in $(find infra/migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            psql "postgresql://postgres:postgres@127.0.0.1:${PGPORT}/video_analysis_api_smoke" -v ON_ERROR_STOP=1 -f "$migration"
          done

      - name: Real API smoke (HTTP + DB path, no provider secret)
        env:
          DATABASE_URL: "postgresql+psycopg://postgres:postgres@127.0.0.1:${{ job.services.postgres.ports['5432'] }}/video_analysis_api_smoke"
          TEMPORAL_TARGET_HOST: 127.0.0.1:7233
          TEMPORAL_NAMESPACE: default
          TEMPORAL_TASK_QUEUE: video-analysis-worker
          SQLITE_STATE_PATH: /tmp/video-digestor-api-smoke.db
          UI_AUDIT_GEMINI_ENABLED: "false"
          NOTIFICATION_ENABLED: "0"
          VD_API_KEY: "ci-smoke-write-token"
        run: |
          mkdir -p .runtime-cache
          uv run python - <<'PY'
          import os
          token = (os.getenv("VD_API_KEY") or "").strip()
          assert token, "VD_API_KEY must be non-empty for api-real-smoke"
          PY
          uv run --with uvicorn uvicorn apps.api.app.main:app --host 127.0.0.1 --port 18080 > .runtime-cache/api-real-smoke.log 2>&1 &
          api_pid=$!
          trap 'kill ${api_pid} >/dev/null 2>&1 || true' EXIT

          for _ in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:18080/healthz" >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS "http://127.0.0.1:18080/healthz" >/dev/null

          python - <<'PY'
          import json
          import urllib.error
          import urllib.request

          base = "http://127.0.0.1:18080"
          valid_headers = {
              "Authorization": "Bearer ci-smoke-write-token",
              "X-API-Key": "ci-smoke-write-token",
          }
          wrong_headers = {
              "Authorization": "Bearer wrong-token",
              "X-API-Key": "wrong-token",
          }

          def request_json(
              path: str,
              method: str = "GET",
              payload: dict | None = None,
              extra_headers: dict[str, str] | None = None,
          ):
              data = None
              headers = {"Content-Type": "application/json"}
              if extra_headers:
                  headers.update(extra_headers)
              if payload is not None:
                  data = json.dumps(payload).encode("utf-8")
              req = urllib.request.Request(f"{base}{path}", data=data, method=method, headers=headers)
              with urllib.request.urlopen(req, timeout=20) as resp:
                  body = resp.read().decode("utf-8")
                  if body:
                      return json.loads(body)
                  return None

          def assert_http_error(path: str, code: int, payload: dict | None = None):
              try:
                  request_json(path, method="POST", payload=payload)
                  raise AssertionError(f"{path} expected HTTP {code} but request succeeded")
              except urllib.error.HTTPError as exc:
                  assert exc.code == code, f"{path} expected HTTP {code}, got {exc.code}"

          health = request_json("/healthz")
          assert health.get("status") == "ok", f"healthz unexpected payload: {health}"

          source_value = "ci-smoke-channel"
          payload = {
              "platform": "youtube",
              "source_type": "youtube_channel_id",
              "source_value": source_value,
              "enabled": True,
          }
          assert_http_error("/api/v1/subscriptions", 401, payload=payload)

          try:
              request_json(
                  "/api/v1/subscriptions",
                  method="POST",
                  payload=payload,
                  extra_headers=wrong_headers,
              )
              raise AssertionError("expected HTTP 403 with wrong token")
          except urllib.error.HTTPError as exc:
              assert exc.code == 403, f"expected 403 with wrong token, got {exc.code}"

          created = request_json(
              "/api/v1/subscriptions",
              method="POST",
              payload=payload,
              extra_headers=valid_headers,
          )
          assert created.get("created") is True, f"subscription create failed: {created}"
          created_id = created["subscription"]["id"]

          rows = request_json(
              "/api/v1/subscriptions?platform=youtube&enabled_only=true",
              extra_headers=valid_headers,
          )
          assert isinstance(rows, list) and rows, f"subscription list is empty: {rows}"
          assert any(row.get("source_value") == source_value for row in rows), rows

          assert_http_error("/api/v1/ingest/poll", 401, payload={"platform": "youtube", "max_new_videos": 1})
          try:
              request_json(
                  "/api/v1/ingest/poll",
                  method="POST",
                  payload={"platform": "youtube", "max_new_videos": 1},
                  extra_headers=wrong_headers,
              )
              raise AssertionError("expected HTTP 403 on ingest with wrong token")
          except urllib.error.HTTPError as exc:
              assert exc.code == 403, f"expected 403 on ingest with wrong token, got {exc.code}"

          request_json(
              f"/api/v1/subscriptions/{created_id}",
              method="DELETE",
              extra_headers=valid_headers,
          )
          rows_after_delete = request_json(
              "/api/v1/subscriptions?platform=youtube&enabled_only=true",
              extra_headers=valid_headers,
          )
          assert all(row.get("id") != created_id for row in rows_after_delete), rows_after_delete

          print("api-real-smoke passed: auth + subscriptions CRUD + ingest auth contract")
          PY

      - name: Upload CI failure diagnostics (api-real-smoke)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ci-failure-diagnostics-api-real-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          path: |
            .runtime-cache/api-real-smoke.log

