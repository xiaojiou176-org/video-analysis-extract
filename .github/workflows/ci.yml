  ci-final-gate:
    runs-on: [self-hosted, video-analysis-extract]
    timeout-minutes: 10
    if: ${{ always() && needs.trusted-pr-boundary.result == 'success' }}
    needs:
      - trusted-pr-boundary
      - aggregate-gate
      - live-smoke
      - nightly-flaky-python
      - nightly-flaky-web-e2e
      - nightly-flaky-report
    steps:
      - name: Enforce final gate (with required live smoke on main/release/nightly)
        run: |
          aggregate_result="${{ needs.aggregate-gate.result }}"
          live_smoke_result="${{ needs.live-smoke.result }}"
          nightly_flaky_result="${{ needs.nightly-flaky-python.result }}"
          nightly_flaky_web_e2e_result="${{ needs.nightly-flaky-web-e2e.result }}"
          nightly_flaky_report_result="${{ needs.nightly-flaky-report.result }}"
          event_name="${{ github.event_name }}"
          ref="${{ github.ref }}"

          require_live_smoke=0
          if [[ "$event_name" == "schedule" ]]; then
            require_live_smoke=1
          elif [[ "$event_name" == "push" && "$ref" == "refs/heads/main" ]]; then
            require_live_smoke=1
          elif [[ "$event_name" == "push" && "$ref" == refs/heads/release/* ]]; then
            require_live_smoke=1
          fi

          echo "aggregate-gate=$aggregate_result"
          echo "live-smoke=$live_smoke_result"
          echo "nightly-flaky-python=$nightly_flaky_result"
          echo "nightly-flaky-web-e2e=$nightly_flaky_web_e2e_result"
          echo "nightly-flaky-report=$nightly_flaky_report_result"
          echo "event=$event_name ref=$ref require_live_smoke=$require_live_smoke"

          if [[ "$aggregate_result" != "success" ]]; then
            echo "final gate failed: aggregate gate is not successful"
            exit 1
          fi

          if [[ "$event_name" == "schedule" && "$nightly_flaky_result" != "success" ]]; then
            echo "final gate failed: nightly flaky subset must pass on schedule runs (result='$nightly_flaky_result')"
            exit 1
          fi

          if [[ "$event_name" == "schedule" && "$nightly_flaky_web_e2e_result" != "success" ]]; then
            echo "final gate failed: nightly flaky web e2e subset must pass on schedule runs (result='$nightly_flaky_web_e2e_result')"
            exit 1
          fi
          if [[ "$event_name" == "schedule" && "$nightly_flaky_report_result" != "success" ]]; then
            echo "final gate failed: nightly flaky trend report must pass on schedule runs (result='$nightly_flaky_report_result')"
            exit 1
          fi

          if [[ "$require_live_smoke" -eq 1 ]]; then
            if [[ "$live_smoke_result" != "success" ]]; then
              echo "final gate failed: live smoke required on main/release/nightly but result is '$live_smoke_result'"
              exit 1
            fi
          fi

          if [[ "$require_live_smoke" -eq 0 && "$live_smoke_result" != "success" && "$live_smoke_result" != "skipped" ]]; then
            echo "final gate failed: live smoke is optional in this context, but ran and did not succeed (result='$live_smoke_result')"
            exit 1
          fi

          echo "final gate passed"

      - name: Write final summary
        if: always()
        run: |
          {
            echo "## Final Gate"
            echo
            echo "- aggregate-gate: \`${{ needs.aggregate-gate.result }}\`"
            echo "- live-smoke: \`${{ needs.live-smoke.result }}\`"
            echo "- nightly-flaky-python: \`${{ needs.nightly-flaky-python.result }}\`"
            echo "- nightly-flaky-web-e2e: \`${{ needs.nightly-flaky-web-e2e.result }}\`"
            echo "- nightly-flaky-report: \`${{ needs.nightly-flaky-report.result }}\`"
            echo
            echo "If final gate is red, inspect aggregate summary above first, then corresponding diagnostics artifacts."
          } >> "$GITHUB_STEP_SUMMARY"

