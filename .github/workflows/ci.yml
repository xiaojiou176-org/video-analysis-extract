name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - release/**
      - codex/**
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  id-token: write

env:
  CI_CACHE_ROOT: /tmp/ci-cache
  UV_PIP_VERSION: "0.10.7"
  UV_CACHE_DIR: /tmp/ci-cache/uv
  PLAYWRIGHT_BROWSERS_PATH: /tmp/ci-cache/ms-playwright
  TEMPORAL_CLI_VERSION: "1.5.1"
  TEMPORAL_CLI_SHA256_LINUX_AMD64: "ddc95e08b0b076efd4ea9733a3f488eb7d2be875f8834e616cd2a37358b4852d"
  TEMPORAL_CLI_SHA256_LINUX_ARM64: "bd1b0db9f18b051026de8bf6cc1505f2510f14bbb7a8b9a4a91fff46c77454f5"

jobs:
  runner-bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_ORG: xiaojiou176-org
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_ZONE: ${{ vars.GCP_ZONE }}
      GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
      GCP_WIF_SERVICE_ACCOUNT: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}
      GH_TOKEN: ${{ secrets.ORG_RUNNER_TOKEN }}
    steps:
      - name: Validate bootstrap secrets and vars
        run: |
          set -euo pipefail
          [[ -n "${GH_TOKEN:-}" ]] || { echo "Missing secret ORG_RUNNER_TOKEN"; exit 1; }
          [[ -n "${GCP_PROJECT_ID:-}" ]] || { echo "Missing repo var GCP_PROJECT_ID"; exit 1; }
          [[ -n "${GCP_WIF_PROVIDER:-}" ]] || { echo "Missing repo var GCP_WIF_PROVIDER"; exit 1; }
          [[ -n "${GCP_WIF_SERVICE_ACCOUNT:-}" ]] || { echo "Missing repo var GCP_WIF_SERVICE_ACCOUNT"; exit 1; }

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Ensure GitHub CLI is available
        run: |
          set -euo pipefail
          if command -v gh >/dev/null 2>&1; then
            gh --version
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y gh
          gh --version

      - name: Start offline runner instances and wait for online
        run: |
          set -euo pipefail

          GCP_ZONE="${GCP_ZONE:-us-central1-a}"
          INSTANCES=("github-runner-core-01" "github-runner-core-02" "github-runner-core-03")
          EXPECTED_RUNNERS_JSON='["pool-core01-01","pool-core01-02","pool-core01-03","pool-core02-01","pool-core02-02","pool-core02-03","pool-core03-01","pool-core03-02","pool-core03-03"]'

          echo "Checking GCE instances in ${GCP_PROJECT_ID}/${GCP_ZONE}..."
          for instance in "${INSTANCES[@]}"; do
            status="$(gcloud compute instances describe "$instance" --project="$GCP_PROJECT_ID" --zone="$GCP_ZONE" --format='value(status)' || true)"
            echo "Instance ${instance}: ${status:-UNKNOWN}"
            if [[ "$status" == "TERMINATED" ]]; then
              echo "Starting ${instance}..."
              gcloud compute instances start "$instance" --project="$GCP_PROJECT_ID" --zone="$GCP_ZONE"
            fi
          done

          echo "Waiting for all 3 instances to reach RUNNING..."
          for attempt in $(seq 1 30); do
            not_running=0
            for instance in "${INSTANCES[@]}"; do
              status="$(gcloud compute instances describe "$instance" --project="$GCP_PROJECT_ID" --zone="$GCP_ZONE" --format='value(status)' || true)"
              [[ "$status" == "RUNNING" ]] || not_running=$((not_running + 1))
              echo "  ${instance}: ${status:-UNKNOWN}"
            done
            if [[ "$not_running" -eq 0 ]]; then
              break
            fi
            if [[ "$attempt" -eq 30 ]]; then
              echo "Timed out waiting for GCE instances to become RUNNING"
              exit 1
            fi
            sleep 10
          done

          echo "Waiting for organization runner set to exactly match expected 9 names and be online..."
          EXPECTED_RUNNERS_SORTED="pool-core01-01,pool-core01-02,pool-core01-03,pool-core02-01,pool-core02-02,pool-core02-03,pool-core03-01,pool-core03-02,pool-core03-03"
          RUNNER_NAME_REGEX='^pool-(core01|core02|core03)-0[1-3]$'
          for attempt in $(seq 1 40); do
            actual_sorted="$(gh api "orgs/${GH_ORG}/actions/runners" --jq '[.runners[].name] | sort | join(",")')"
            online_count="$(gh api "orgs/${GH_ORG}/actions/runners" --jq "[.runners[] | select((.name|test(\"${RUNNER_NAME_REGEX}\")) and .status==\"online\")] | length")"
            check_result="pending"
            if [[ "${actual_sorted}" != "${EXPECTED_RUNNERS_SORTED}" ]]; then
              check_result="mismatch"
            elif [[ "${online_count}" == "9" ]]; then
              check_result="ok"
            fi
            echo "  runner set status: ${check_result} (attempt ${attempt}/40)"
            if [[ "$check_result" == "ok" ]]; then
              echo "Organization runners exactly match expected names and all are online."
              exit 0
            fi
            if [[ "$attempt" -eq 40 ]]; then
              echo "Runner bootstrap failed: org runner list must be exactly the expected 9 names and all online."
              echo "Expected runner names:"
              echo "${EXPECTED_RUNNERS_JSON}" | jq -r '.[]'
              echo "Actual org runner names and status:"
              gh api "orgs/${GH_ORG}/actions/runners" --jq '.runners[] | "\(.name)=\(.status), busy=\(.busy)"'
              exit 1
            fi
            sleep 15
          done

  required-ci-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [runner-bootstrap]
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true
      - name: Enforce required CI secrets/env vars
        run: |
          python3 scripts/check_required_ci_secrets.py \
            --required GEMINI_API_KEY \
            --required RESEND_API_KEY \
            --required RESEND_FROM_EMAIL \
            --required YOUTUBE_API_KEY

  changes-hosted:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 5
    needs: [required-ci-secrets]
    outputs:
      backend_changed: ${{ github.event_name == 'pull_request' && steps.filter.outputs.backend_changed || steps.non_pr_defaults.outputs.backend_changed }}
      web_changed: ${{ github.event_name == 'pull_request' && steps.filter.outputs.web_changed || steps.non_pr_defaults.outputs.web_changed }}
      deps_changed: ${{ github.event_name == 'pull_request' && steps.filter.outputs.deps_changed || steps.non_pr_defaults.outputs.deps_changed }}
      migrations_changed: ${{ github.event_name == 'pull_request' && steps.filter.outputs.migrations_changed || steps.non_pr_defaults.outputs.migrations_changed }}
      hosted_ok: ${{ steps.hosted_status.outputs.hosted_ok }}
    steps:
      - name: Checkout
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true
          fetch-depth: 0

      - name: Detect changed paths (PR only)
        if: ${{ github.event_name == 'pull_request' }}
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          filters: |
            backend_changed:
              - 'apps/api/**'
              - 'apps/worker/**'
              - 'apps/mcp/**'
              - 'packages/shared-contracts/**'
              - 'scripts/**'
              - 'infra/config/**'
              - 'infra/compose/**'
              - 'infra/sql/**'
              - 'pyproject.toml'
              - 'uv.lock'
            web_changed:
              - 'apps/web/**'
            deps_changed:
              - 'pyproject.toml'
              - 'uv.lock'
              - 'apps/web/package.json'
              - 'apps/web/package-lock.json'
            migrations_changed:
              - 'infra/migrations/**'

      - name: Default full-run flags (non-PR)
        if: ${{ github.event_name != 'pull_request' }}
        id: non_pr_defaults
        run: |
          {
            echo "backend_changed=true"
            echo "web_changed=true"
            echo "deps_changed=true"
            echo "migrations_changed=true"
          } >> "$GITHUB_OUTPUT"

      - name: Record hosted changes outcome
        if: ${{ always() }}
        id: hosted_status
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "hosted_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "hosted_ok=false" >> "$GITHUB_OUTPUT"
          fi

  changes-fallback:
    runs-on: [self-hosted, shared-pool]
    timeout-minutes: 8
    needs: [required-ci-secrets, changes-hosted]
    if: ${{ always() && (needs['changes-hosted'].result != 'success' || needs['changes-hosted'].outputs.hosted_ok != 'true') }}
    outputs:
      backend_changed: ${{ github.event_name == 'pull_request' && steps.filter.outputs.backend_changed || steps.non_pr_defaults.outputs.backend_changed }}
      web_changed: ${{ github.event_name == 'pull_request' && steps.filter.outputs.web_changed || steps.non_pr_defaults.outputs.web_changed }}
      deps_changed: ${{ github.event_name == 'pull_request' && steps.filter.outputs.deps_changed || steps.non_pr_defaults.outputs.deps_changed }}
      migrations_changed: ${{ github.event_name == 'pull_request' && steps.filter.outputs.migrations_changed || steps.non_pr_defaults.outputs.migrations_changed }}
    steps:
      - name: Checkout
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true
          fetch-depth: 0

      - name: Detect changed paths (PR only)
        if: ${{ github.event_name == 'pull_request' }}
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          filters: |
            backend_changed:
              - 'apps/api/**'
              - 'apps/worker/**'
              - 'apps/mcp/**'
              - 'packages/shared-contracts/**'
              - 'scripts/**'
              - 'infra/config/**'
              - 'infra/compose/**'
              - 'infra/sql/**'
              - 'pyproject.toml'
              - 'uv.lock'
            web_changed:
              - 'apps/web/**'
            deps_changed:
              - 'pyproject.toml'
              - 'uv.lock'
              - 'apps/web/package.json'
              - 'apps/web/package-lock.json'
            migrations_changed:
              - 'infra/migrations/**'

      - name: Default full-run flags (non-PR)
        if: ${{ github.event_name != 'pull_request' }}
        id: non_pr_defaults
        run: |
          {
            echo "backend_changed=true"
            echo "web_changed=true"
            echo "deps_changed=true"
            echo "migrations_changed=true"
          } >> "$GITHUB_OUTPUT"

  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: [changes-hosted, changes-fallback]
    if: ${{ always() && (needs['changes-hosted'].result == 'success' || needs['changes-fallback'].result == 'success') }}
    outputs:
      backend_changed: ${{ (needs['changes-hosted'].result == 'success' && needs['changes-hosted'].outputs.backend_changed) || needs['changes-fallback'].outputs.backend_changed }}
      web_changed: ${{ (needs['changes-hosted'].result == 'success' && needs['changes-hosted'].outputs.web_changed) || needs['changes-fallback'].outputs.web_changed }}
      deps_changed: ${{ (needs['changes-hosted'].result == 'success' && needs['changes-hosted'].outputs.deps_changed) || needs['changes-fallback'].outputs.deps_changed }}
      migrations_changed: ${{ (needs['changes-hosted'].result == 'success' && needs['changes-hosted'].outputs.migrations_changed) || needs['changes-fallback'].outputs.migrations_changed }}
    steps:
      - name: Select changes source
        run: |
          if [[ "${{ needs['changes-hosted'].result }}" == "success" ]]; then
            echo "changes source: hosted"
          else
            echo "changes source: shared-pool fallback"
          fi

  preflight-fast-hosted:
    uses: ./.github/workflows/_preflight-fast-steps.yml
    needs: [required-ci-secrets]
    with:
      runs-on: '["ubuntu-latest"]'

  preflight-fast-fallback:
    uses: ./.github/workflows/_preflight-fast-steps.yml
    needs: [required-ci-secrets, preflight-fast-hosted]
    if: ${{ always() && needs['preflight-fast-hosted'].result != 'success' }}
    with:
      runs-on: '["self-hosted","shared-pool"]'
  preflight-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: [preflight-fast-hosted, preflight-fast-fallback]
    if: ${{ always() && (needs['preflight-fast-hosted'].result == 'success' || needs['preflight-fast-fallback'].result == 'success') }}
    steps:
      - name: Select preflight-fast source
        run: |
          if [[ "${{ needs['preflight-fast-hosted'].result }}" == "success" ]]; then
            echo "preflight-fast source: hosted"
          else
            echo "preflight-fast source: shared-pool fallback"
          fi

  preflight-heavy:
    runs-on: [self-hosted, shared-pool]
    timeout-minutes: 20
    needs: preflight-fast
    if: ${{ always() && needs.preflight-fast.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install "uv==${UV_PIP_VERSION}"

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Structured log critical-path guard
        run: python3 scripts/check_structured_logs.py

  profile-governance:
    runs-on: [self-hosted, shared-pool]
    timeout-minutes: 20
    if: ${{ always() && needs.preflight-heavy.result == 'success' && (github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) }}
    needs: preflight-heavy
    strategy:
      fail-fast: false
      matrix:
        gate_profile: [local, ci-live-smoke]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Profile governance gate (${{ matrix.gate_profile }})
        run: |
          if [[ "${{ matrix.gate_profile }}" == "local" ]]; then
            ./scripts/quality_gate.sh --mode pre-commit --profile local --profile-only
          else
            ./scripts/quality_gate.sh \
              --mode pre-push \
              --profile ci \
              --profile live-smoke \
              --profile-only \
              --heartbeat-seconds 20 \
              --mutation-min-score 0.62
          fi

  quality-gate-pre-push:
    runs-on: [self-hosted, shared-pool]
    timeout-minutes: 90
    needs: [preflight-heavy, changes]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install "uv==${UV_PIP_VERSION}"

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web deps
        run: npm --prefix apps/web ci

      - name: Full quality gate (pre-push, mutation handled by dedicated job)
        run: |
            ./scripts/quality_gate.sh \
              --mode pre-push \
              --profile ci \
              --profile live-smoke \
              --ci-dedupe 1 \
              --skip-mutation 1 \
              --changed-backend "${{ needs.changes.outputs.backend_changed }}" \
              --changed-web "${{ needs.changes.outputs.web_changed }}" \
              --changed-deps "${{ needs.changes.outputs.deps_changed }}" \
              --changed-migrations "${{ needs.changes.outputs.migrations_changed }}" \
              --heartbeat-seconds 25 \
              --mutation-min-score 0.62 \
              --mutation-min-effective-ratio 0.25 \
              --mutation-max-no-tests-ratio 0.75

  db-migration-smoke:
    runs-on: [self-hosted, shared-pool]
    timeout-minutes: 20
    needs: [preflight-fast, changes]
    if: ${{ always() && needs.preflight-fast.result == 'success' && needs.changes.result == 'success' && (github.event_name != 'pull_request' || needs.changes.outputs.migrations_changed == 'true') }}
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: video_analysis_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432/tcp
        options: >-
          --health-cmd "pg_isready -U postgres -d video_analysis_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Install PostgreSQL client
        run: |
          for attempt in $(seq 1 20); do
            if sudo apt-get update && sudo apt-get install -y postgresql-client; then
              exit 0
            fi
            echo "apt install attempt ${attempt}/20 failed, retrying..."
            sleep 5
          done
          echo "apt install failed after retries"
          exit 1

      - name: Migration smoke
        env:
          PGPASSWORD: postgres
          PGPORT: ${{ job.services.postgres.ports['5432'] }}
        run: |
          for _ in $(seq 1 30); do
            if pg_isready -h 127.0.0.1 -p "$PGPORT" -U postgres -d video_analysis_ci >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          for migration in $(find infra/migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            psql "postgresql://postgres:postgres@127.0.0.1:${PGPORT}/video_analysis_ci" -v ON_ERROR_STOP=1 -f "$migration"
          done

  mutation-testing:
    runs-on: [self-hosted, shared-pool]
    timeout-minutes: 120
    needs: [preflight-fast, changes]
    if: ${{ always() && needs.preflight-fast.result == 'success' && needs.changes.result == 'success' && (github.event_name != 'pull_request' || needs.changes.outputs.backend_changed == 'true') }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install "uv==${UV_PIP_VERSION}"

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Run mutation testing (mutmut)
        env:
          DATABASE_URL: "sqlite+pysqlite:///:memory:"
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/apps/worker
        run: |
          rm -rf mutants
          uv run --extra dev --with mutmut mutmut run
          uv run --extra dev --with mutmut mutmut export-cicd-stats

      - name: Validate mutation score and effective ratio
        env:
          MUTATION_MIN_SCORE: "0.62"
          MUTATION_MIN_EFFECTIVE_RATIO: "0.25"
          MUTATION_MAX_NO_TESTS_RATIO: "0.75"
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          stats_path = Path("mutants/mutmut-cicd-stats.json")
          if not stats_path.exists():
              raise SystemExit("mutation-testing failed: mutants/mutmut-cicd-stats.json not found")

          stats = json.loads(stats_path.read_text(encoding="utf-8"))
          killed = int(stats.get("killed", 0))
          survived = int(stats.get("survived", 0))
          suspicious = int(stats.get("suspicious", 0))
          timeout = int(stats.get("timeout", 0))
          skipped = int(stats.get("skipped", 0))
          total = int(stats.get("total", 0))

          effective = killed + survived
          score = killed / effective if effective > 0 else 0.0
          effective_ratio = effective / total if total > 0 else 0.0
          no_tests_ratio = skipped / total if total > 0 else 0.0

          min_score = float(os.environ.get("MUTATION_MIN_SCORE", "0.62"))
          min_effective_ratio = float(os.environ.get("MUTATION_MIN_EFFECTIVE_RATIO", "0.25"))
          max_no_tests_ratio = float(os.environ.get("MUTATION_MAX_NO_TESTS_RATIO", "0.75"))

          print(
              f"mutation stats: killed={killed}, survived={survived}, suspicious={suspicious}, "
              f"timeout={timeout}, skipped={skipped}, total={total}"
          )
          print(
              f"mutation quality: score={score:.4f} (threshold={min_score:.4f}), "
              f"effective_ratio={effective_ratio:.4f} (threshold={min_effective_ratio:.4f}), "
              f"no_tests_ratio={no_tests_ratio:.4f} (ceiling={max_no_tests_ratio:.4f})"
          )

          if effective <= 0:
              raise SystemExit("mutation-testing failed: no effective mutants (killed+survived=0)")
          if score < min_score:
              raise SystemExit(
                  f"mutation-testing failed: score {score:.4f} < threshold {min_score:.4f}"
              )
          if effective_ratio < min_effective_ratio:
              raise SystemExit(
                  f"mutation-testing failed: effective_ratio {effective_ratio:.4f} < threshold {min_effective_ratio:.4f}"
              )
          if no_tests_ratio > max_no_tests_ratio:
              raise SystemExit(
                  f"mutation-testing failed: no_tests_ratio {no_tests_ratio:.4f} > ceiling {max_no_tests_ratio:.4f}"
              )

          print("mutation-testing: all gates passed")
          PY

      - name: Upload mutation stats artifact
        if: always()
