name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - codex/**
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Env contract strict check
        run: python3 scripts/check_env_contract.py --strict --env-file .env.example

      - name: computer_use smoke contract check
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          contract = json.loads(Path("infra/config/env.contract.json").read_text(encoding="utf-8"))
          variables = {item["name"]: item for item in contract.get("variables", [])}
          required = {
              "GEMINI_COMPUTER_USE_ENABLED",
              "GEMINI_COMPUTER_USE_REQUIRE_CONFIRMATION",
              "GEMINI_COMPUTER_USE_MAX_STEPS",
              "GEMINI_COMPUTER_USE_TIMEOUT_SECONDS",
              "LIVE_SMOKE_COMPUTER_USE_STRICT",
              "LIVE_SMOKE_COMPUTER_USE_SKIP",
              "LIVE_SMOKE_COMPUTER_USE_SKIP_REASON",
              "LIVE_SMOKE_COMPUTER_USE_CMD",
          }
          missing = sorted(name for name in required if name not in variables)
          if missing:
              raise SystemExit(f"missing computer_use smoke env contract vars: {', '.join(missing)}")
          if str(variables["LIVE_SMOKE_COMPUTER_USE_STRICT"].get("default")) != "1":
              raise SystemExit("LIVE_SMOKE_COMPUTER_USE_STRICT default must be '1'")
          print("computer_use smoke contract check passed")
          PY

      - name: Docs env canonical check
        run: |
          ! rg -n 'cp \.env\.local\.example \.env\.local|source \.env\.local|自动加载 `?\.env\.local' README.md docs/runbook-local.md

      - name: Provider residual guard (blocking)
        run: bash scripts/guard_provider_residuals.sh .

      - name: Worker file line limits (pipeline/steps + temporal <= 700)
        run: python3 scripts/check_worker_line_limits.py

      - name: Schema parity check (apps/mcp vs shared-contracts)
        run: |
          python - <<'PY'
          import difflib
          import json
          from pathlib import Path

          source_path = Path("apps/mcp/schemas/tools.json")
          shared_path = Path("packages/shared-contracts/jsonschema/mcp-tools.schema.json")

          source = json.loads(source_path.read_text(encoding="utf-8"))
          shared = json.loads(shared_path.read_text(encoding="utf-8"))

          if source != shared:
              source_pretty = json.dumps(source, ensure_ascii=False, indent=2, sort_keys=True).splitlines()
              shared_pretty = json.dumps(shared, ensure_ascii=False, indent=2, sort_keys=True).splitlines()
              print("Schema parity check failed:")
              for line in difflib.unified_diff(
                  source_pretty,
                  shared_pretty,
                  fromfile=str(source_path),
                  tofile=str(shared_path),
                  lineterm="",
              ):
                  print(line)
              raise SystemExit(1)
          print("Schema parity check passed.")
          PY

  db-migration-smoke:
    runs-on: ubuntu-latest
    needs: preflight
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: video_analysis_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d video_analysis_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Migration smoke
        env:
          PGPASSWORD: postgres
        run: |
          for _ in $(seq 1 30); do
            if pg_isready -h 127.0.0.1 -p 5432 -U postgres -d video_analysis_ci >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          for migration in $(ls infra/migrations/*.sql | sort); do
            psql "postgresql://postgres:postgres@127.0.0.1:5432/video_analysis_ci" -v ON_ERROR_STOP=1 -f "$migration"
          done

  python-tests:
    runs-on: ubuntu-latest
    needs: preflight
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: video_analysis_pytests
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d video_analysis_pytests"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Pipeline smoke
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/apps/worker
          DATABASE_URL: "postgresql+psycopg://postgres:postgres@127.0.0.1:5432/video_analysis_pytests"
          TEMPORAL_TARGET_HOST: 127.0.0.1:7233
          TEMPORAL_NAMESPACE: default
          TEMPORAL_TASK_QUEUE: video-analysis-worker
          SQLITE_PATH: /tmp/video-digestor-worker-smoke.db
          PIPELINE_WORKSPACE_DIR: /tmp/video-digestor-workspace-smoke
          PIPELINE_ARTIFACT_ROOT: /tmp/video-digestor-artifacts-smoke
        run: |
          uv run pytest \
            apps/worker/tests/test_runner_modes.py::test_run_pipeline_text_only_mode_skips_media_steps \
            apps/worker/tests/test_runner_modes.py::test_run_pipeline_refresh_llm_forces_only_llm_steps \
            -q

      - name: Run Python tests
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/apps/worker
          DATABASE_URL: "postgresql+psycopg://postgres:postgres@127.0.0.1:5432/video_analysis_pytests"
          TEMPORAL_TARGET_HOST: 127.0.0.1:7233
          TEMPORAL_NAMESPACE: default
          TEMPORAL_TASK_QUEUE: video-analysis-worker
          SQLITE_STATE_PATH: /tmp/video-digestor-api-tests.db
          SQLITE_PATH: /tmp/video-digestor-worker-tests.db
          PIPELINE_WORKSPACE_DIR: /tmp/video-digestor-workspace-tests
          PIPELINE_ARTIFACT_ROOT: /tmp/video-digestor-artifacts-tests
        run: |
          mkdir -p .runtime-cache
          set -o pipefail
          uv run pytest apps/worker/tests apps/api/tests apps/mcp/tests -q -rA -n 2 \
            --cov=apps/worker/worker \
            --cov=apps/api \
            --cov=apps/mcp \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:.runtime-cache/python-coverage.xml \
            --cov-fail-under=65 \
            --junitxml=.runtime-cache/python-tests-junit.xml \
            2>&1 | tee .runtime-cache/python-tests.log

      - name: Python tests skip guard (no silent skip)
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET
          from pathlib import Path

          report = Path(".runtime-cache/python-tests-junit.xml")
          if not report.is_file():
              raise SystemExit("python skip guard failed: junit report missing")

          root = ET.parse(report).getroot()
          suites = [root] if root.tag == "testsuite" else root.findall("testsuite")
          tests = sum(int(suite.attrib.get("tests", "0")) for suite in suites)
          skipped = sum(int(suite.attrib.get("skipped", "0")) for suite in suites)

          if tests == 0:
              raise SystemExit("python skip guard failed: collected 0 tests")
          if skipped > 0:
              raise SystemExit(f"python skip guard failed: skipped={skipped} (no silent skip allowed)")
          print(f"python skip guard passed: tests={tests}, skipped={skipped}")
          PY

      - name: Upload CI failure diagnostics (python)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-diagnostics-python-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          path: |
            .runtime-cache/python-tests-junit.xml
            .runtime-cache/python-tests.log
            .runtime-cache/python-coverage.xml

  api-real-smoke:
    runs-on: ubuntu-latest
    needs: preflight
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: video_analysis_api_smoke
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d video_analysis_api_smoke"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run migrations for API smoke DB
        env:
          PGPASSWORD: postgres
        run: |
          for _ in $(seq 1 30); do
            if pg_isready -h 127.0.0.1 -p 5432 -U postgres -d video_analysis_api_smoke >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          for migration in $(ls infra/migrations/*.sql | sort); do
            psql "postgresql://postgres:postgres@127.0.0.1:5432/video_analysis_api_smoke" -v ON_ERROR_STOP=1 -f "$migration"
          done

      - name: Real API smoke (HTTP + DB path, no provider secret)
        env:
          DATABASE_URL: "postgresql+psycopg://postgres:postgres@127.0.0.1:5432/video_analysis_api_smoke"
          TEMPORAL_TARGET_HOST: 127.0.0.1:7233
          TEMPORAL_NAMESPACE: default
          TEMPORAL_TASK_QUEUE: video-analysis-worker
          SQLITE_STATE_PATH: /tmp/video-digestor-api-smoke.db
          UI_AUDIT_GEMINI_ENABLED: "false"
          NOTIFICATION_ENABLED: "0"
        run: |
          mkdir -p .runtime-cache
          uv run --with uvicorn uvicorn apps.api.app.main:app --host 127.0.0.1 --port 18080 > .runtime-cache/api-real-smoke.log 2>&1 &
          api_pid=$!
          trap 'kill ${api_pid} >/dev/null 2>&1 || true' EXIT

          for _ in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:18080/healthz" >/dev/null; then
              break
            fi
            sleep 1
          done

          python - <<'PY'
          import json
          import urllib.request

          base = "http://127.0.0.1:18080"

          def request_json(path: str, method: str = "GET", payload: dict | None = None):
              data = None
              headers = {"Content-Type": "application/json"}
              if payload is not None:
                  data = json.dumps(payload).encode("utf-8")
              req = urllib.request.Request(f"{base}{path}", data=data, method=method, headers=headers)
              with urllib.request.urlopen(req, timeout=20) as resp:
                  body = resp.read().decode("utf-8")
                  return json.loads(body)

          health = request_json("/healthz")
          assert health.get("status") == "ok", f"healthz unexpected payload: {health}"

          source_value = "ci-smoke-channel"
          created = request_json(
              "/api/v1/subscriptions",
              method="POST",
              payload={
                  "platform": "youtube",
                  "source_type": "youtube_channel_id",
                  "source_value": source_value,
                  "enabled": True,
              },
          )
          assert created.get("created") is True, f"subscription create failed: {created}"
          assert created["subscription"]["source_value"] == source_value

          rows = request_json("/api/v1/subscriptions?platform=youtube&enabled_only=true")
          assert isinstance(rows, list) and rows, f"subscription list is empty: {rows}"
          assert any(row.get("source_value") == source_value for row in rows), rows

          print("api-real-smoke passed: healthz + subscriptions write/read")
          PY

      - name: Upload CI failure diagnostics (api-real-smoke)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-diagnostics-api-real-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          path: |
            .runtime-cache/api-real-smoke.log

  web-lint-build:
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web deps
        run: npm --prefix apps/web ci

      - name: Web lint
        run: npm --prefix apps/web run lint

      - name: Web unit tests (vitest)
        run: npm --prefix apps/web run test

      - name: Web build
        run: npm --prefix apps/web run build

      - name: Web button coverage check
        run: python3 scripts/check_web_button_coverage.py --threshold 1.0

  web-e2e:
    runs-on: ubuntu-latest
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chromium
            tier: core
          - browser: firefox
            tier: core
          - browser: webkit
            tier: extended
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ matrix.browser }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ matrix.browser }}-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Install web deps
        run: npm --prefix apps/web ci

      - name: Install Playwright browser (${{ matrix.browser }})
        run: uv run --with playwright python -m playwright install --with-deps ${{ matrix.browser }}

      - name: Web E2E gate (no silent skip)
        env:
          WEB_E2E_BROWSER: ${{ matrix.browser }}
        run: |
          mkdir -p .runtime-cache

          set -o pipefail
          uv run --with pytest --with playwright \
            pytest apps/web/tests/e2e -q --junitxml=.runtime-cache/web-e2e-junit-${WEB_E2E_BROWSER}.xml -rA \
            2>&1 | tee .runtime-cache/web-e2e-${WEB_E2E_BROWSER}.log

          python - <<'PY'
          import xml.etree.ElementTree as ET
          import os
          from pathlib import Path

          browser = os.environ.get("WEB_E2E_BROWSER", "unknown")
          report = Path(f".runtime-cache/web-e2e-junit-{browser}.xml")
          if not report.is_file():
              raise SystemExit("web e2e gate failed: junit report missing")

          root = ET.parse(report).getroot()
          suites = [root] if root.tag == "testsuite" else root.findall("testsuite")
          tests = sum(int(suite.attrib.get("tests", "0")) for suite in suites)
          skipped = sum(int(suite.attrib.get("skipped", "0")) for suite in suites)

          if tests == 0:
              raise SystemExit("web e2e gate failed: collected 0 tests")
          if skipped > 0:
              raise SystemExit(f"web e2e gate failed: skipped={skipped} (no silent skip allowed)")
          print(f"web e2e gate passed ({browser}): tests={tests}, skipped={skipped}")
          PY

      - name: Upload web e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-e2e-artifacts-${{ matrix.browser }}
          path: |
            .runtime-cache/web-e2e-artifacts
            .runtime-cache/web-e2e-junit-${{ matrix.browser }}.xml
          if-no-files-found: warn

      - name: Upload CI failure diagnostics (web)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-diagnostics-web-e2e-${{ matrix.browser }}-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          path: |
            .runtime-cache/web-e2e-junit-${{ matrix.browser }}.xml
            .runtime-cache/web-e2e-${{ matrix.browser }}.log

  aggregate-gate:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - preflight
      - db-migration-smoke
      - python-tests
      - api-real-smoke
      - web-lint-build
      - web-e2e
    steps:
      - name: Enforce aggregate gate
        run: |
          declare -A results
          results[preflight]="${{ needs.preflight.result }}"
          results[db_migration_smoke]="${{ needs.db-migration-smoke.result }}"
          results[python_tests]="${{ needs.python-tests.result }}"
          results[api_real_smoke]="${{ needs.api-real-smoke.result }}"
          results[web_lint_build]="${{ needs.web-lint-build.result }}"
          results[web_e2e]="${{ needs.web-e2e.result }}"

          failed=0
          for job in preflight db_migration_smoke python_tests api_real_smoke web_lint_build web_e2e; do
            result="${results[$job]}"
            echo "$job=$result"
            if [[ "$result" != "success" ]]; then
              failed=1
            fi
          done

          if [[ "$failed" -ne 0 ]]; then
            echo "aggregate gate failed"
            exit 1
          fi
          echo "aggregate gate passed"

  nightly-flaky-python:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' }}
    needs: preflight
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Nightly flaky subset (repeat x3)
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/apps/worker
          DATABASE_URL: "sqlite+pysqlite:///:memory:"
          TEMPORAL_TARGET_HOST: 127.0.0.1:7233
          TEMPORAL_NAMESPACE: default
          TEMPORAL_TASK_QUEUE: video-analysis-worker
          SQLITE_STATE_PATH: /tmp/video-digestor-api-tests-nightly.db
          SQLITE_PATH: /tmp/video-digestor-worker-tests-nightly.db
          PIPELINE_WORKSPACE_DIR: /tmp/video-digestor-workspace-nightly
          PIPELINE_ARTIFACT_ROOT: /tmp/video-digestor-artifacts-nightly
        run: |
          for i in 1 2 3; do
            echo "nightly flaky run #${i}"
            uv run pytest \
              apps/worker/tests/test_runner_modes.py::test_run_pipeline_text_only_mode_skips_media_steps \
              apps/worker/tests/test_runner_modes.py::test_run_pipeline_refresh_llm_forces_only_llm_steps \
              apps/api/tests/test_api_routes.py::test_healthz_returns_ok_status \
              apps/api/tests/test_api_routes.py::test_video_process_returns_mode_field \
              apps/mcp/tests/test_tool_normalizers.py::test_health_system_tool_returns_status \
              -q -rA
          done

  nightly-flaky-web-e2e:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' }}
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ matrix.browser }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ matrix.browser }}-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Install web deps
        run: npm --prefix apps/web ci

      - name: Install Playwright browser (${{ matrix.browser }})
        run: uv run --with playwright python -m playwright install --with-deps ${{ matrix.browser }}

      - name: Nightly flaky web E2E subset (repeat x2)
        env:
          WEB_E2E_BROWSER: ${{ matrix.browser }}
        run: |
          for i in 1 2; do
            echo "nightly web flaky run #${i} (${WEB_E2E_BROWSER})"
            uv run --with pytest --with playwright \
              pytest apps/web/tests/e2e/test_dashboard.py apps/web/tests/e2e/test_subscriptions.py -q -rA
          done

  autofix-dry-run:
    name: autofix-dry-run
    runs-on: ubuntu-latest
    needs: [python-tests, web-e2e]
    if: ${{ always() && (needs.python-tests.result == 'failure' || needs.web-e2e.result == 'failure') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download CI diagnostics artifact
        uses: actions/download-artifact@v4
        with:
          pattern: ci-failure-diagnostics-*
          merge-multiple: true
          path: .runtime-cache

      - name: Generate autofix dry-run report
        run: |
          python3 scripts/ci_autofix.py \
            --junit-glob ".runtime-cache/**/*.xml" \
            --log-glob ".runtime-cache/**/*.log" \
            --output .runtime-cache/autofix-report.json

      - name: Upload autofix report
        uses: actions/upload-artifact@v4
        with:
          name: autofix-dry-run-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: .runtime-cache/autofix-report.json

  live-smoke:
    needs: aggregate-gate
    runs-on: ubuntu-latest
    # Only runs when LIVE_SMOKE_API_BASE_URL is configured (i.e., a deployed API exists).
    # Without a deployed env, the job skips — final gate treats skip as acceptable.
    if: >-
      secrets.LIVE_SMOKE_API_BASE_URL != '' &&
      (github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      LIVE_SMOKE_API_BASE_URL: ${{ secrets.LIVE_SMOKE_API_BASE_URL }}
      LIVE_SMOKE_REQUIRE_API: "1"
      LIVE_SMOKE_REQUIRE_SECRETS: "1"
      LIVE_SMOKE_COMPUTER_USE_STRICT: "1"
      LIVE_SMOKE_COMPUTER_USE_SKIP: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run live smoke
        run: scripts/e2e_live_smoke.sh

  ci-final-gate:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - aggregate-gate
      - live-smoke
      - nightly-flaky-python
      - nightly-flaky-web-e2e
    env:
      HAS_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY != '' }}
      HAS_RESEND_API_KEY: ${{ secrets.RESEND_API_KEY != '' }}
      HAS_RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL != '' }}
      HAS_YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY != '' }}
      HAS_LIVE_SMOKE_API_BASE_URL: ${{ secrets.LIVE_SMOKE_API_BASE_URL != '' }}
    steps:
      - name: Enforce final gate (with required live smoke on main/nightly)
        run: |
          aggregate_result="${{ needs.aggregate-gate.result }}"
          live_smoke_result="${{ needs.live-smoke.result }}"
          nightly_flaky_result="${{ needs.nightly-flaky-python.result }}"
          nightly_flaky_web_e2e_result="${{ needs.nightly-flaky-web-e2e.result }}"
          event_name="${{ github.event_name }}"
          ref="${{ github.ref }}"

          require_live_smoke=0
          if [[ "$event_name" == "schedule" ]]; then
            require_live_smoke=1
          elif [[ "$event_name" == "push" && "$ref" == "refs/heads/main" ]]; then
            require_live_smoke=1
          fi

          echo "aggregate-gate=$aggregate_result"
          echo "live-smoke=$live_smoke_result"
          echo "nightly-flaky-python=$nightly_flaky_result"
          echo "nightly-flaky-web-e2e=$nightly_flaky_web_e2e_result"
          echo "event=$event_name ref=$ref require_live_smoke=$require_live_smoke"

          if [[ "$aggregate_result" != "success" ]]; then
            echo "final gate failed: aggregate gate is not successful"
            exit 1
          fi

          if [[ "$event_name" == "schedule" && "$nightly_flaky_result" != "success" ]]; then
            echo "final gate failed: nightly flaky subset must pass on schedule runs (result='$nightly_flaky_result')"
            exit 1
          fi

          if [[ "$event_name" == "schedule" && "$nightly_flaky_web_e2e_result" != "success" ]]; then
            echo "final gate failed: nightly flaky web e2e subset must pass on schedule runs (result='$nightly_flaky_web_e2e_result')"
            exit 1
          fi

          if [[ "$require_live_smoke" -eq 1 ]]; then
            if [[ "${HAS_LIVE_SMOKE_API_BASE_URL}" != "true" ]]; then
              # No deployed API configured — live-smoke was skipped. Warn but do not fail gate.
              echo "WARNING: live smoke skipped on main/nightly because LIVE_SMOKE_API_BASE_URL is not configured."
              echo "Set this secret to a deployed API URL to enable full live smoke on main."
            elif [[ "$live_smoke_result" != "success" ]]; then
              missing=()
              [[ "${HAS_GEMINI_API_KEY}" != "true" ]] && missing+=("GEMINI_API_KEY")
              [[ "${HAS_RESEND_API_KEY}" != "true" ]] && missing+=("RESEND_API_KEY")
              [[ "${HAS_RESEND_FROM_EMAIL}" != "true" ]] && missing+=("RESEND_FROM_EMAIL")
              [[ "${HAS_YOUTUBE_API_KEY}" != "true" ]] && missing+=("YOUTUBE_API_KEY")
              if [[ "${#missing[@]}" -gt 0 ]]; then
                echo "final gate failed: live smoke required but missing secrets: ${missing[*]}"
              else
                echo "final gate failed: live smoke required on main/nightly but result is '$live_smoke_result'"
              fi
              exit 1
            fi
          fi

          if [[ "$require_live_smoke" -eq 0 && "$live_smoke_result" != "success" && "$live_smoke_result" != "skipped" ]]; then
            echo "final gate failed: live smoke is optional in this context, but ran and did not succeed (result='$live_smoke_result')"
            exit 1
          fi

          echo "final gate passed"
