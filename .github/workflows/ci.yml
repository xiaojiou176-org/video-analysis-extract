  web-test-build:
    runs-on: ubuntu-latest
    needs: [preflight-fast, changes]
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.web_changed == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web deps
        run: npm --prefix apps/web ci

      - name: Web design token guard (changed lines)
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            python3 scripts/check_design_tokens.py \
              --from-ref "${{ github.event.pull_request.base.sha }}" \
              --to-ref "${{ github.sha }}" \
              apps/web
          else
            before="${{ github.event.before }}"
            if [[ -z "$before" || "$before" == "0000000000000000000000000000000000000000" ]]; then
              before="$(git rev-list --max-count=1 HEAD^ 2>/dev/null || true)"
            fi
            if [[ -n "$before" ]]; then
              python3 scripts/check_design_tokens.py \
                --from-ref "$before" \
                --to-ref "${{ github.sha }}" \
                apps/web
            else
              python3 scripts/check_design_tokens.py --all-lines apps/web
            fi
          fi

      - name: Install Vitest coverage provider
        run: npm --prefix apps/web install --no-save @vitest/coverage-v8

      - name: Web unit tests (vitest + coverage gate)
        run: npm --prefix apps/web run test -- --coverage

      - name: Web build
        run: npm --prefix apps/web run build

      - name: Web button coverage check
        run: python3 scripts/check_web_button_coverage.py --threshold 1.0

  web-e2e:
    runs-on: ubuntu-latest
    needs: [preflight-fast, changes]
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.web_changed == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        browser: ${{ github.event_name == 'pull_request' && fromJSON('["chromium","firefox"]') || fromJSON('["chromium","firefox","webkit"]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ matrix.browser }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ matrix.browser }}-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Install web deps
        run: npm --prefix apps/web ci

      - name: Install Playwright browser (${{ matrix.browser }})
        run: uv run --with playwright python -m playwright install --with-deps ${{ matrix.browser }}

      - name: Web E2E gate (no silent skip)
        env:
          WEB_E2E_BROWSER: ${{ matrix.browser }}
        run: |
          mkdir -p .runtime-cache

          set -o pipefail
          uv run --with pytest --with playwright \
            pytest apps/web/tests/e2e -q --junitxml=.runtime-cache/web-e2e-junit-${WEB_E2E_BROWSER}.xml -rA \
            2>&1 | tee .runtime-cache/web-e2e-${WEB_E2E_BROWSER}.log

          python - <<'PY'
          import xml.etree.ElementTree as ET
          import os
          from pathlib import Path

          browser = os.environ.get("WEB_E2E_BROWSER", "unknown")
          report = Path(f".runtime-cache/web-e2e-junit-{browser}.xml")
          if not report.is_file():
              raise SystemExit("web e2e gate failed: junit report missing")

          root = ET.parse(report).getroot()
          suites = [root] if root.tag == "testsuite" else root.findall("testsuite")
          tests = sum(int(suite.attrib.get("tests", "0")) for suite in suites)
          skipped = sum(int(suite.attrib.get("skipped", "0")) for suite in suites)

          if tests == 0:
              raise SystemExit("web e2e gate failed: collected 0 tests")
          if skipped > 0:
              raise SystemExit(f"web e2e gate failed: skipped={skipped} (no silent skip allowed)")
          print(f"web e2e gate passed ({browser}): tests={tests}, skipped={skipped}")
          PY

      - name: Upload web e2e artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: web-e2e-artifacts-${{ matrix.browser }}
          path: |
            .runtime-cache/web-e2e-artifacts
            .runtime-cache/web-e2e-junit-${{ matrix.browser }}.xml
          if-no-files-found: warn

      - name: Upload CI failure diagnostics (web)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ci-failure-diagnostics-web-e2e-${{ matrix.browser }}-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          path: |
            .runtime-cache/web-e2e-junit-${{ matrix.browser }}.xml
            .runtime-cache/web-e2e-${{ matrix.browser }}.log

