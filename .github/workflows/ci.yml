  dependency-vuln-scan:
    runs-on: ubuntu-latest
    needs: [preflight-fast, changes]
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.deps_changed == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Python dependency audit (pip-audit)
        run: uv run --with pip-audit pip-audit --progress-spinner off

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web deps
        run: npm --prefix apps/web ci

      - name: Web dependency policy gate (no floating versions)
        run: |
          node - <<'JS'
          const fs = require("fs");
          const path = "apps/web/package.json";
          const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
          const sections = ["dependencies", "devDependencies", "peerDependencies", "optionalDependencies"];
          const violations = [];

          for (const section of sections) {
            const deps = pkg[section] || {};
            for (const [name, version] of Object.entries(deps)) {
              const v = String(version).trim();
              if (v === "latest" || v === "*" || /^https?:/i.test(v) || /^git\+/i.test(v)) {
                violations.push(`${section}.${name}=${v}`);
              }
            }
          }

          if (violations.length) {
            console.error("Floating dependency versions are not allowed:");
            for (const item of violations) console.error(`- ${item}`);
            process.exit(1);
          }
          console.log("Web dependency policy gate passed");
          JS

      - name: Web runtime dependency audit (npm audit high+)
        run: npm --prefix apps/web audit --omit=dev --audit-level=high

  aggregate-gate:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - changes
      - preflight-fast
      - preflight-heavy
      - profile-governance
      - quality-gate-pre-push
      - db-migration-smoke
      - python-tests
      - api-real-smoke
      - pr-llm-real-smoke
      - backend-lint
      - frontend-lint
      - web-test-build
      - web-e2e
      - external-playwright-smoke
      - dependency-vuln-scan
    steps:
      - name: Enforce aggregate gate
        run: |
          event_name="${{ github.event_name }}"
          ref="${{ github.ref }}"
          is_pr=0
          if [[ "$event_name" == "pull_request" ]]; then
            is_pr=1
          fi

          backend_changed="${{ needs.changes.outputs.backend_changed }}"
          web_changed="${{ needs.changes.outputs.web_changed }}"
          deps_changed="${{ needs.changes.outputs.deps_changed }}"
          migrations_changed="${{ needs.changes.outputs.migrations_changed }}"

          declare -A results
          results[changes]="${{ needs.changes.result }}"
          results[preflight_fast]="${{ needs.preflight-fast.result }}"
          results[preflight_heavy]="${{ needs.preflight-heavy.result }}"
          results[profile_governance]="${{ needs.profile-governance.result }}"
          results[quality_gate_pre_push]="${{ needs.quality-gate-pre-push.result }}"
          results[db_migration_smoke]="${{ needs.db-migration-smoke.result }}"
          results[python_tests]="${{ needs.python-tests.result }}"
          results[api_real_smoke]="${{ needs.api-real-smoke.result }}"
          results[pr_llm_real_smoke]="${{ needs.pr-llm-real-smoke.result }}"
          results[backend_lint]="${{ needs.backend-lint.result }}"
          results[frontend_lint]="${{ needs.frontend-lint.result }}"
          results[web_test_build]="${{ needs.web-test-build.result }}"
          results[web_e2e]="${{ needs.web-e2e.result }}"
          results[external_playwright_smoke]="${{ needs.external-playwright-smoke.result }}"
          results[dependency_vuln_scan]="${{ needs.dependency-vuln-scan.result }}"

          failed=0
          require_main_schedule_only=0
          if [[ "$event_name" == "schedule" || ( "$event_name" == "push" && "$ref" == "refs/heads/main" ) ]]; then
            require_main_schedule_only=1
          fi
          echo "event=$event_name ref=$ref is_pr=$is_pr require_main_schedule_only=$require_main_schedule_only"
          echo "changes: backend=$backend_changed web=$web_changed deps=$deps_changed migrations=$migrations_changed"

          for job in changes preflight_fast preflight_heavy; do
            result="${results[$job]}"
            echo "$job=$result"
            if [[ "$result" != "success" ]]; then
              failed=1
            fi
          done

          check_required_job() {
            local job="$1"
            local required="$2"
            local result="${results[$job]}"
            echo "$job=$result required=$required"
            if [[ "$required" == "1" ]]; then
              if [[ "$result" != "success" ]]; then
                failed=1
              fi
            else
              if [[ "$result" != "success" && "$result" != "skipped" ]]; then
                failed=1
              fi
            fi
          }

          required_db_migration=1
          required_backend_group=1
          required_web_group=1
          required_deps_scan=1
          if [[ "$is_pr" -eq 1 ]]; then
            [[ "$migrations_changed" == "true" ]] && required_db_migration=1 || required_db_migration=0
            [[ "$backend_changed" == "true" ]] && required_backend_group=1 || required_backend_group=0
            [[ "$web_changed" == "true" ]] && required_web_group=1 || required_web_group=0
            [[ "$deps_changed" == "true" ]] && required_deps_scan=1 || required_deps_scan=0
          fi

          check_required_job db_migration_smoke "$required_db_migration"
          check_required_job python_tests "$required_backend_group"
          check_required_job api_real_smoke "$required_backend_group"
          check_required_job backend_lint "$required_backend_group"
          check_required_job frontend_lint "$required_web_group"
          check_required_job web_test_build "$required_web_group"
          check_required_job web_e2e "$required_web_group"
          check_required_job dependency_vuln_scan "$required_deps_scan"

          for job in profile_governance quality_gate_pre_push external_playwright_smoke; do
            result="${results[$job]}"
            echo "$job=$result"
            if [[ "$require_main_schedule_only" -eq 1 ]]; then
              if [[ "$result" != "success" ]]; then
                failed=1
              fi
            else
              if [[ "$result" != "success" && "$result" != "skipped" ]]; then
                failed=1
              fi
            fi
          done

          pr_llm_result="${results[pr_llm_real_smoke]}"
          echo "pr_llm_real_smoke=$pr_llm_result"
          if [[ "$pr_llm_result" != "success" && "$pr_llm_result" != "skipped" ]]; then
            failed=1
          fi

          if [[ "$failed" -ne 0 ]]; then
            echo "aggregate gate failed"
            exit 1
          fi
          echo "aggregate gate passed"

