        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install "uv==${UV_PIP_VERSION}"

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ matrix.browser }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ matrix.browser }}-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Install web deps
        run: npm --prefix apps/web ci

      - name: Install Playwright browser (${{ matrix.browser }})
        run: |
          for attempt in $(seq 1 8); do
            if uv run --with playwright python -m playwright install --with-deps ${{ matrix.browser }}; then
              exit 0
            fi
            if sudo fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 || sudo fuser /var/lib/apt/lists/lock >/dev/null 2>&1 || sudo fuser /var/cache/apt/archives/lock >/dev/null 2>&1; then
              echo "playwright dependency install hit apt/dpkg lock, retrying (${attempt}/8)..."
              sleep 8
              continue
            fi
            echo "playwright install failed without apt lock contention"
            exit 1
          done
          echo "playwright install failed after retries"
          exit 1

      - name: Nightly flaky web E2E subset (repeat x2)
        run: |
          BROWSER="${{ matrix.browser }}"
          for i in 1 2; do
            echo "nightly web flaky run #${i} (${BROWSER})"
            uv run --with pytest --with playwright \
              pytest apps/web/tests/e2e/test_dashboard.py apps/web/tests/e2e/test_subscriptions.py -q -rA \
