            done
            rm -f "$workspace/apps/web/next-env.d.ts" || true
            git -C "$workspace" checkout -- apps/web/tsconfig.json >/dev/null 2>&1 || true
          fi

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Enforce runner disk budget
        run: |
          bash scripts/runner_workspace_maintenance.sh --workspace "$GITHUB_WORKSPACE" --include-runner-diag 1
          python3 scripts/check_runner_baseline.py --profile ci-heavy --workspace "$GITHUB_WORKSPACE"

      - name: Download run artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: "*"
          merge-multiple: true
          path: .runtime-cache/ci-kpi-inputs

      - name: Build CI KPI summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/collect_ci_kpi.py \
            --junit-glob ".runtime-cache/ci-kpi-inputs/**/*.xml" \
            --coverage-xml-glob ".runtime-cache/ci-kpi-inputs/**/*coverage*.xml" \
            --coverage-summary-glob ".runtime-cache/ci-kpi-inputs/**/coverage-summary.json" \
            --mutation-glob ".runtime-cache/ci-kpi-inputs/**/*mutmut*.json" \
            --artifact-glob ".runtime-cache/ci-kpi-inputs/**/*" \
            --workflow-glob ".github/workflows/*.yml" \
            --repo "${{ github.repository }}" \
            --run-id "${{ github.run_id }}" \
            --run-attempt "${{ github.run_attempt }}" \
            --json-out reports/release-readiness/ci-kpi-summary.json \
            --md-out reports/release-readiness/ci-kpi-summary.md

      - name: Upload CI KPI summary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ci-kpi-summary-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: error
          path: |
            reports/release-readiness/ci-kpi-summary.json
            reports/release-readiness/ci-kpi-summary.md

      - name: Write KPI summary
        if: always()
        run: |
          if [[ -f reports/release-readiness/ci-kpi-summary.md ]]; then
            cat reports/release-readiness/ci-kpi-summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## CI KPI Summary"
              echo
              echo "- status: degraded"
              echo "- note: summary markdown was not generated; inspect ci-kpi job logs."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
