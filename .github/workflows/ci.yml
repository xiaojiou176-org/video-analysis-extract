    runs-on: [self-hosted, video-analysis-extract]
    timeout-minutes: 20
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    needs: preflight-fast
    steps:
      - name: Normalize self-hosted workspace (pre-checkout)
        shell: bash
        run: |
          set -euo pipefail
          workspace="${GITHUB_WORKSPACE:?}"
          uid="$(id -u)"
          gid="$(id -g)"
          stale_paths=(
            "$workspace/.runtime-cache"
            "$workspace/.venv"
            "$workspace/apps/web/node_modules"
          )
          if command -v sudo >/dev/null 2>&1; then
            if sudo find "$workspace" -mindepth 1 -uid 0 -print -quit | grep -q .; then
              echo "Detected root-owned residue under $workspace; normalizing ownership"
              sudo chown -R "$uid:$gid" "$workspace"
            fi
            for path in "${stale_paths[@]}"; do
              if sudo test -e "$path"; then
                echo "Removing stale workspace path: $path"
                sudo chmod -R u+w "$path" 2>/dev/null || true
                sudo rm -rf "$path" || true
              fi
            done
            generated_web_files=(
              "$workspace/apps/web/next-env.d.ts"
              "$workspace/apps/web/tsconfig.json"
            )
            for path in "${generated_web_files[@]}"; do
              if sudo test -e "$path"; then
                echo "Restoring generated workspace file: $path"
                sudo git -C "$workspace" checkout -- "$path" || sudo rm -f "$path" || true
              fi
            done
          else
            for path in "${stale_paths[@]}"; do
              rm -rf "$path" || true
            done
            rm -f "$workspace/apps/web/next-env.d.ts" || true
            git -C "$workspace" checkout -- apps/web/tsconfig.json >/dev/null 2>&1 || true
          fi

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install "uv==${UV_PIP_VERSION}"

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-external-smoke-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-external-smoke-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Install Playwright browser (chromium)
        run: |
          for attempt in $(seq 1 8); do
            if uv run --with playwright python -m playwright install --with-deps chromium; then
              exit 0
            fi
            if sudo fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 || sudo fuser /var/lib/apt/lists/lock >/dev/null 2>&1 || sudo fuser /var/cache/apt/archives/lock >/dev/null 2>&1; then
              echo "playwright dependency install hit apt/dpkg lock, retrying (${attempt}/8)..."
              sleep 8
              continue
            fi
            echo "playwright install failed without apt lock contention"
            exit 1
          done
          echo "playwright install failed after retries"
          exit 1

      - name: Real external site Playwright smoke
        run: |
          uv run --with playwright bash scripts/external_playwright_smoke.sh \
            --browser "chromium" \
            --url "${{ vars.EXTERNAL_SMOKE_URL || 'https://example.com' }}" \
            --expect-text "${{ vars.EXTERNAL_SMOKE_EXPECT_TEXT || 'Example Domain' }}" \
            --timeout-ms "${{ vars.EXTERNAL_SMOKE_TIMEOUT_MS || '45000' }}" \
            --retries "${{ vars.EXTERNAL_SMOKE_RETRIES || '2' }}" \
            --heartbeat-seconds "30" \
            --diagnostics-json ".runtime-cache/external-playwright-smoke-result.json" \
            --output-dir ".runtime-cache/external-playwright-smoke"

      - name: Upload external smoke artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: external-playwright-smoke-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            .runtime-cache/external-playwright-smoke
            .runtime-cache/external-playwright-smoke-result.json

