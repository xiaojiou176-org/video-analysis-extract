  frontend-lint-fallback:
    runs-on: [self-hosted, shared-pool]
    timeout-minutes: 25
    needs: [preflight-fast, changes, frontend-lint-hosted]
    if: ${{ (github.event_name != 'pull_request' || needs.changes.outputs.web_changed == 'true') && always() && needs['frontend-lint-hosted'].result != 'success' }}
    steps:
