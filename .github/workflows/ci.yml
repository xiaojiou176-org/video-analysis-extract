name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - codex/**
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ github.event_name == 'pull_request' && steps.filter.outputs.backend_changed || steps.non_pr_defaults.outputs.backend_changed }}
      web_changed: ${{ github.event_name == 'pull_request' && steps.filter.outputs.web_changed || steps.non_pr_defaults.outputs.web_changed }}
      deps_changed: ${{ github.event_name == 'pull_request' && steps.filter.outputs.deps_changed || steps.non_pr_defaults.outputs.deps_changed }}
      migrations_changed: ${{ github.event_name == 'pull_request' && steps.filter.outputs.migrations_changed || steps.non_pr_defaults.outputs.migrations_changed }}
    steps:
      - name: Checkout
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Detect changed paths (PR only)
        if: ${{ github.event_name == 'pull_request' }}
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend_changed:
              - 'apps/api/**'
              - 'apps/worker/**'
              - 'apps/mcp/**'
              - 'packages/shared-contracts/**'
              - 'scripts/**'
              - 'pyproject.toml'
              - 'uv.lock'
            web_changed:
              - 'apps/web/**'
            deps_changed:
              - 'pyproject.toml'
              - 'uv.lock'
              - 'apps/web/package.json'
              - 'apps/web/package-lock.json'
            migrations_changed:
              - 'infra/migrations/**'

      - name: Default full-run flags (non-PR)
        if: ${{ github.event_name != 'pull_request' }}
        id: non_pr_defaults
        run: |
          echo "backend_changed=true" >> "$GITHUB_OUTPUT"
          echo "web_changed=true" >> "$GITHUB_OUTPUT"
          echo "deps_changed=true" >> "$GITHUB_OUTPUT"
          echo "migrations_changed=true" >> "$GITHUB_OUTPUT"

  preflight-fast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Env contract strict check
        run: python3 scripts/check_env_contract.py --strict --env-file .env.example

      - name: computer_use smoke CLI contract check
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          script = Path("scripts/e2e_live_smoke.sh").read_text(encoding="utf-8")
          required = [
              "--api-base-url <url>",
              "--require-api <0|1>",
              "--require-secrets <0|1>",
              "--computer-use-strict <0|1>",
              "--computer-use-skip <0|1>",
              "--computer-use-skip-reason <text>",
          ]
          missing = sorted(item for item in required if item not in script)
          if missing:
              raise SystemExit(f"missing computer_use smoke CLI options: {', '.join(missing)}")

          defaults = {
              "LIVE_SMOKE_REQUIRE_API": "1",
              "LIVE_SMOKE_COMPUTER_USE_STRICT": "1",
              "LIVE_SMOKE_COMPUTER_USE_SKIP": "0",
              "LIVE_SMOKE_MAX_RETRIES": "2",
          }
          for name, expected in defaults.items():
              pattern = rf'^{name}="{re.escape(expected)}"$'
              if not re.search(pattern, script, re.MULTILINE):
                  raise SystemExit(f"{name} default must be '{expected}'")
          print("computer_use smoke CLI contract check passed")
          PY

      - name: CI smoke drift check
        run: bash scripts/check_ci_smoke_drift.sh

      - name: Docs env canonical check
        run: |
          ! rg -n 'cp \.env\.local\.example \.env\.local|source \.env\.local|自动加载 `?\.env\.local' README.md docs/runbook-local.md

      - name: IaC entrypoint guard
        run: bash scripts/check_iac_entrypoint.sh .

      - name: IaC compose config validation
        run: |
          docker compose -f infra/compose/core-services.compose.yml config -q
          if [[ -f infra/compose/miniflux-nextflux.compose.yml ]]; then
            docker compose -f infra/compose/miniflux-nextflux.compose.yml config -q
          fi

      - name: Provider residual guard (blocking)
        run: bash scripts/guard_provider_residuals.sh .

      - name: Worker file line limits (pipeline/steps + temporal <= 700)
        run: python3 scripts/check_worker_line_limits.py

      - name: Schema parity check (apps/mcp vs shared-contracts)
        run: |
          python - <<'PY'
          import difflib
          import json
          from pathlib import Path

          source_path = Path("apps/mcp/schemas/tools.json")
          shared_path = Path("packages/shared-contracts/jsonschema/mcp-tools.schema.json")

          source = json.loads(source_path.read_text(encoding="utf-8"))
          shared = json.loads(shared_path.read_text(encoding="utf-8"))

          if source != shared:
              source_pretty = json.dumps(source, ensure_ascii=False, indent=2, sort_keys=True).splitlines()
              shared_pretty = json.dumps(shared, ensure_ascii=False, indent=2, sort_keys=True).splitlines()
              print("Schema parity check failed:")
              for line in difflib.unified_diff(
                  source_pretty,
                  shared_pretty,
                  fromfile=str(source_path),
                  tofile=str(shared_path),
                  lineterm="",
              ):
                  print(line)
              raise SystemExit(1)
          print("Schema parity check passed.")
          PY

  preflight-heavy:
    runs-on: ubuntu-latest
    needs: preflight-fast
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Structured log critical-path guard
        run: python3 scripts/check_structured_logs.py

  profile-governance:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    needs: preflight-heavy
    strategy:
      fail-fast: false
      matrix:
        gate_profile: [local, ci-live-smoke]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Profile governance gate (${{ matrix.gate_profile }})
        run: |
          if [[ "${{ matrix.gate_profile }}" == "local" ]]; then
            ./scripts/quality_gate.sh --mode pre-commit --profile local --profile-only
          else
            ./scripts/quality_gate.sh \
              --mode pre-push \
              --profile ci \
              --profile live-smoke \
              --profile-only \
              --heartbeat-seconds 20 \
              --mutation-min-score 0.60
          fi

  quality-gate-pre-push:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    needs: [preflight-heavy, changes]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Full quality gate (pre-push, includes mutation gate)
        run: |
            ./scripts/quality_gate.sh \
              --mode pre-push \
              --profile ci \
              --profile live-smoke \
              --ci-dedupe 1 \
              --changed-backend "${{ needs.changes.outputs.backend_changed }}" \
              --changed-web "${{ needs.changes.outputs.web_changed }}" \
              --changed-deps "${{ needs.changes.outputs.deps_changed }}" \
              --changed-migrations "${{ needs.changes.outputs.migrations_changed }}" \
              --heartbeat-seconds 25 \
              --mutation-min-score 0.60

  db-migration-smoke:
    runs-on: ubuntu-latest
    needs: [preflight-fast, changes]
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.migrations_changed == 'true' }}
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: video_analysis_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d video_analysis_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Migration smoke
        env:
          PGPASSWORD: postgres
        run: |
          for _ in $(seq 1 30); do
            if pg_isready -h 127.0.0.1 -p 5432 -U postgres -d video_analysis_ci >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          for migration in $(ls infra/migrations/*.sql | sort); do
            psql "postgresql://postgres:postgres@127.0.0.1:5432/video_analysis_ci" -v ON_ERROR_STOP=1 -f "$migration"
          done

  python-tests:
    runs-on: ubuntu-latest
    needs: [preflight-fast, changes]
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.backend_changed == 'true' }}
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: video_analysis_pytests
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d video_analysis_pytests"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Pipeline smoke
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/apps/worker
          DATABASE_URL: "postgresql+psycopg://postgres:postgres@127.0.0.1:5432/video_analysis_pytests"
          TEMPORAL_TARGET_HOST: 127.0.0.1:7233
          TEMPORAL_NAMESPACE: default
          TEMPORAL_TASK_QUEUE: video-analysis-worker
          SQLITE_PATH: /tmp/video-digestor-worker-smoke.db
          PIPELINE_WORKSPACE_DIR: /tmp/video-digestor-workspace-smoke
          PIPELINE_ARTIFACT_ROOT: /tmp/video-digestor-artifacts-smoke
        run: |
          uv run pytest \
            apps/worker/tests/test_runner_modes.py::test_run_pipeline_text_only_mode_skips_media_steps \
            apps/worker/tests/test_runner_modes.py::test_run_pipeline_refresh_llm_forces_only_llm_steps \
            -q

      - name: Run Python tests
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/apps/worker
          DATABASE_URL: "postgresql+psycopg://postgres:postgres@127.0.0.1:5432/video_analysis_pytests"
          TEMPORAL_TARGET_HOST: 127.0.0.1:7233
          TEMPORAL_NAMESPACE: default
          TEMPORAL_TASK_QUEUE: video-analysis-worker
          SQLITE_STATE_PATH: /tmp/video-digestor-api-tests.db
          SQLITE_PATH: /tmp/video-digestor-worker-tests.db
          PIPELINE_WORKSPACE_DIR: /tmp/video-digestor-workspace-tests
          PIPELINE_ARTIFACT_ROOT: /tmp/video-digestor-artifacts-tests
        run: |
          mkdir -p .runtime-cache
          set -o pipefail
          (
            uv run pytest apps/worker/tests apps/api/tests apps/mcp/tests -q -rA -n 2 \
              --cov=apps/worker/worker \
              --cov=apps/api \
              --cov=apps/mcp \
              --cov-report=term-missing:skip-covered \
              --cov-report=xml:.runtime-cache/python-coverage.xml \
              --cov-fail-under=80 \
              --junitxml=.runtime-cache/python-tests-junit.xml \
              2>&1 | tee .runtime-cache/python-tests.log
          ) &
          test_pid=$!

          while kill -0 "${test_pid}" >/dev/null 2>&1; do
            echo "[heartbeat] python tests still running ($(date -u +'%Y-%m-%dT%H:%M:%SZ'))"
            sleep 25
          done

          wait "${test_pid}"

      - name: Worker core pipeline coverage gate (>=95%)
        run: |
          set -o pipefail
          uv run coverage report \
            --include="*/apps/worker/worker/pipeline/orchestrator.py,*/apps/worker/worker/pipeline/policies.py,*/apps/worker/worker/pipeline/runner.py,*/apps/worker/worker/pipeline/types.py" \
            --show-missing \
            --fail-under=95 \
            2>&1 | tee .runtime-cache/python-coverage-worker-core.log

      - name: API core route + service coverage gate (>=95%)
        run: |
          set -o pipefail
          uv run coverage report \
            --include="*/apps/api/app/routers/ingest.py,*/apps/api/app/routers/jobs.py,*/apps/api/app/routers/subscriptions.py,*/apps/api/app/routers/videos.py,*/apps/api/app/services/jobs.py,*/apps/api/app/services/subscriptions.py,*/apps/api/app/services/videos.py" \
            --show-missing \
            --fail-under=95 \
            2>&1 | tee .runtime-cache/python-coverage-api-core.log

      - name: Python tests skip guard (no silent skip)
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET
          from pathlib import Path

          report = Path(".runtime-cache/python-tests-junit.xml")
          if not report.is_file():
              raise SystemExit("python skip guard failed: junit report missing")

          root = ET.parse(report).getroot()
          suites = [root] if root.tag == "testsuite" else root.findall("testsuite")
          tests = sum(int(suite.attrib.get("tests", "0")) for suite in suites)
          skipped = sum(int(suite.attrib.get("skipped", "0")) for suite in suites)

          if tests == 0:
              raise SystemExit("python skip guard failed: collected 0 tests")
          if skipped > 0:
              raise SystemExit(f"python skip guard failed: skipped={skipped} (no silent skip allowed)")
          print(f"python skip guard passed: tests={tests}, skipped={skipped}")
          PY

      - name: Upload CI failure diagnostics (python)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ci-failure-diagnostics-python-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          path: |
            .runtime-cache/python-tests-junit.xml
            .runtime-cache/python-tests.log
            .runtime-cache/python-coverage.xml

  api-real-smoke:
    runs-on: ubuntu-latest
    needs: [preflight-fast, changes]
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.backend_changed == 'true' }}
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: video_analysis_api_smoke
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d video_analysis_api_smoke"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run migrations for API smoke DB
        env:
          PGPASSWORD: postgres
        run: |
          for _ in $(seq 1 30); do
            if pg_isready -h 127.0.0.1 -p 5432 -U postgres -d video_analysis_api_smoke >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          for migration in $(ls infra/migrations/*.sql | sort); do
            psql "postgresql://postgres:postgres@127.0.0.1:5432/video_analysis_api_smoke" -v ON_ERROR_STOP=1 -f "$migration"
          done

      - name: Real API smoke (HTTP + DB path, no provider secret)
        env:
          DATABASE_URL: "postgresql+psycopg://postgres:postgres@127.0.0.1:5432/video_analysis_api_smoke"
          TEMPORAL_TARGET_HOST: 127.0.0.1:7233
          TEMPORAL_NAMESPACE: default
          TEMPORAL_TASK_QUEUE: video-analysis-worker
          SQLITE_STATE_PATH: /tmp/video-digestor-api-smoke.db
          UI_AUDIT_GEMINI_ENABLED: "false"
          NOTIFICATION_ENABLED: "0"
        run: |
          mkdir -p .runtime-cache
          uv run --with uvicorn uvicorn apps.api.app.main:app --host 127.0.0.1 --port 18080 > .runtime-cache/api-real-smoke.log 2>&1 &
          api_pid=$!
          trap 'kill ${api_pid} >/dev/null 2>&1 || true' EXIT

          for _ in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:18080/healthz" >/dev/null; then
              break
            fi
            sleep 1
          done

          python - <<'PY'
          import json
          import urllib.request

          base = "http://127.0.0.1:18080"

          def request_json(path: str, method: str = "GET", payload: dict | None = None):
              data = None
              headers = {"Content-Type": "application/json"}
              if payload is not None:
                  data = json.dumps(payload).encode("utf-8")
              req = urllib.request.Request(f"{base}{path}", data=data, method=method, headers=headers)
              with urllib.request.urlopen(req, timeout=20) as resp:
                  body = resp.read().decode("utf-8")
                  return json.loads(body)

          health = request_json("/healthz")
          assert health.get("status") == "ok", f"healthz unexpected payload: {health}"

          source_value = "ci-smoke-channel"
          created = request_json(
              "/api/v1/subscriptions",
              method="POST",
              payload={
                  "platform": "youtube",
                  "source_type": "youtube_channel_id",
                  "source_value": source_value,
                  "enabled": True,
              },
          )
          assert created.get("created") is True, f"subscription create failed: {created}"
          assert created["subscription"]["source_value"] == source_value

          rows = request_json("/api/v1/subscriptions?platform=youtube&enabled_only=true")
          assert isinstance(rows, list) and rows, f"subscription list is empty: {rows}"
          assert any(row.get("source_value") == source_value for row in rows), rows

          print("api-real-smoke passed: healthz + subscriptions write/read")
          PY

      - name: Upload CI failure diagnostics (api-real-smoke)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ci-failure-diagnostics-api-real-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          path: |
            .runtime-cache/api-real-smoke.log

  pr-llm-real-smoke:
    runs-on: ubuntu-latest
    needs: [preflight-fast, changes]
    if: >-
      github.event_name == 'pull_request' &&
      needs.changes.outputs.backend_changed == 'true' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      secrets.GEMINI_API_KEY != ''
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Run PR real LLM smoke (/api/v1/computer-use/run)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATABASE_URL: "sqlite+pysqlite:////tmp/video-digestor-pr-llm-real-smoke.db"
          TEMPORAL_TARGET_HOST: 127.0.0.1:7233
          TEMPORAL_NAMESPACE: default
          TEMPORAL_TASK_QUEUE: video-analysis-worker
          SQLITE_STATE_PATH: /tmp/video-digestor-pr-llm-real-state.db
          NOTIFICATION_ENABLED: "0"
          UI_AUDIT_GEMINI_ENABLED: "false"
          VD_ALLOW_UNAUTH_WRITE: "1"
          COMPUTER_USE_MODEL_TIMEOUT_SECONDS: "30"
          COMPUTER_USE_MODEL_MAX_RETRIES: "2"
        run: |
          mkdir -p .runtime-cache
          uv run --with uvicorn uvicorn apps.api.app.main:app --host 127.0.0.1 --port 18081 > .runtime-cache/pr-llm-real-smoke.log 2>&1 &
          api_pid=$!
          trap 'kill ${api_pid} >/dev/null 2>&1 || true' EXIT

          for _ in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:18081/healthz" >/dev/null; then
              break
            fi
            sleep 1
          done

          scripts/smoke_llm_real_local.sh \
