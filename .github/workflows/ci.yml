        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate required live smoke secrets
        env:
          HAS_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY != '' }}
          HAS_RESEND_API_KEY: ${{ secrets.RESEND_API_KEY != '' }}
          HAS_RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL != '' }}
