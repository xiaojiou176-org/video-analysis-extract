    needs: [preflight-fast, changes]
    if: ${{ always() && needs.preflight-fast.result == 'success' && needs.changes.result == 'success' && (github.event_name != 'pull_request' || needs.changes.outputs.backend_changed == 'true') }}
    steps:
      - name: Normalize self-hosted workspace (pre-checkout)
        shell: bash
        run: |
          set -euo pipefail
          workspace="${GITHUB_WORKSPACE:?}"
          uid="$(id -u)"
          gid="$(id -g)"
          stale_paths=(
            "$workspace/.runtime-cache"
            "$workspace/.venv"
            "$workspace/apps/web/node_modules"
          )
          if command -v sudo >/dev/null 2>&1; then
            if sudo find "$workspace" -mindepth 1 -uid 0 -print -quit | grep -q .; then
              echo "Detected root-owned residue under $workspace; normalizing ownership"
              sudo chown -R "$uid:$gid" "$workspace"
            fi
            for path in "${stale_paths[@]}"; do
              if sudo test -e "$path"; then
                echo "Removing stale workspace path: $path"
                sudo chmod -R u+w "$path" 2>/dev/null || true
                sudo rm -rf "$path" || true
              fi
            done
            generated_web_files=(
              "$workspace/apps/web/next-env.d.ts"
              "$workspace/apps/web/tsconfig.json"
            )
            for path in "${generated_web_files[@]}"; do
              if sudo test -e "$path"; then
                echo "Restoring generated workspace file: $path"
                sudo git -C "$workspace" checkout -- "$path" || sudo rm -f "$path" || true
              fi
            done
          else
            for path in "${stale_paths[@]}"; do
              rm -rf "$path" || true
            done
            rm -f "$workspace/apps/web/next-env.d.ts" || true
            git -C "$workspace" checkout -- apps/web/tsconfig.json >/dev/null 2>&1 || true
          fi

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Enforce runner disk budget
        run: |
          bash scripts/runner_workspace_maintenance.sh --workspace "$GITHUB_WORKSPACE" --include-runner-diag 1
          python3 scripts/check_runner_baseline.py --profile ci-heavy --workspace "$GITHUB_WORKSPACE"

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install "uv==${UV_PIP_VERSION}"

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Sync Python deps (locked)
        run: uv sync --frozen --extra dev --extra e2e

      - name: Run mutation testing (mutmut)
        env:
          DATABASE_URL: "sqlite+pysqlite:///:memory:"
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/apps/worker
        run: |
          rm -rf mutants
          uv run --extra dev --with mutmut mutmut run
          uv run --extra dev --with mutmut mutmut export-cicd-stats

      - name: Validate mutation score and effective ratio
        env:
          MUTATION_MIN_SCORE: "0.64"
          MUTATION_MIN_EFFECTIVE_RATIO: "0.27"
          MUTATION_MAX_NO_TESTS_RATIO: "0.72"
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          stats_path = Path("mutants/mutmut-cicd-stats.json")
          if not stats_path.exists():
              raise SystemExit("mutation-testing failed: mutants/mutmut-cicd-stats.json not found")

          stats = json.loads(stats_path.read_text(encoding="utf-8"))
          killed = int(stats.get("killed", 0))
          survived = int(stats.get("survived", 0))
          suspicious = int(stats.get("suspicious", 0))
          timeout = int(stats.get("timeout", 0))
          no_tests = int(stats.get("no_tests", stats.get("skipped", 0)))
          total = int(stats.get("total", 0))

          effective = killed + survived
          score = killed / effective if effective > 0 else 0.0
          effective_ratio = effective / total if total > 0 else 0.0
          no_tests_ratio = no_tests / total if total > 0 else 0.0

          min_score = float(os.environ.get("MUTATION_MIN_SCORE", "0.64"))
          min_effective_ratio = float(os.environ.get("MUTATION_MIN_EFFECTIVE_RATIO", "0.27"))
          max_no_tests_ratio = float(os.environ.get("MUTATION_MAX_NO_TESTS_RATIO", "0.72"))

          print(
              f"mutation stats: killed={killed}, survived={survived}, suspicious={suspicious}, "
              f"timeout={timeout}, no_tests={no_tests}, total={total}"
          )
          print(
              f"mutation quality: score={score:.4f} (threshold={min_score:.4f}), "
              f"effective_ratio={effective_ratio:.4f} (threshold={min_effective_ratio:.4f}), "
              f"no_tests_ratio={no_tests_ratio:.4f} (ceiling={max_no_tests_ratio:.4f})"
          )

          if effective <= 0:
              raise SystemExit("mutation-testing failed: no effective mutants (killed+survived=0)")
          if score < min_score:
              raise SystemExit(
                  f"mutation-testing failed: score {score:.4f} < threshold {min_score:.4f}"
              )
          if effective_ratio < min_effective_ratio:
              raise SystemExit(
                  f"mutation-testing failed: effective_ratio {effective_ratio:.4f} < threshold {min_effective_ratio:.4f}"
              )
          if no_tests_ratio > max_no_tests_ratio:
              raise SystemExit(
                  f"mutation-testing failed: no_tests_ratio {no_tests_ratio:.4f} > ceiling {max_no_tests_ratio:.4f}"
              )

          print("mutation-testing: all gates passed")
          PY

      - name: Upload mutation stats artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mutmut-cicd-stats
          path: |
            mutants/mutmut-cicd-stats.json
          if-no-files-found: warn

