name: contract-diff

on:
  pull_request:

permissions:
  contents: read

jobs:
  required-ci-secrets:
    runs-on: e2-core
    timeout-minutes: 5
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      LIVE_SMOKE_API_BASE_URL: ${{ secrets.LIVE_SMOKE_API_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Enforce required CI secrets/env vars
        run: |
          python3 scripts/check_required_ci_secrets.py \
            --required GEMINI_API_KEY \
            --required RESEND_API_KEY \
            --required RESEND_FROM_EMAIL \
            --required YOUTUBE_API_KEY \
            --required LIVE_SMOKE_API_BASE_URL

  contract-diff-hosted:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [required-ci-secrets]
    steps:
      - name: Checkout (head)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Sync Python deps
        run: uv sync --frozen --extra dev --extra e2e

      - name: Export head contract
        run: |
          mkdir -p .runtime-cache
          uv run python scripts/export_api_contract.py \
            --repo-root . \
            --output .runtime-cache/contract-head.json

      - name: Prepare base worktree
        run: |
          mkdir -p .runtime-cache
          git worktree add --detach .runtime-cache/base-tree "${{ github.event.pull_request.base.sha }}"

      - name: Export base contract
        run: |
          uv run python scripts/export_api_contract.py \
            --repo-root .runtime-cache/base-tree \
            --output .runtime-cache/contract-base.json

      - name: Compare base/head contract
        id: compare
        run: |
          set +e
          uv run python scripts/check_contract_diff.py \
            --base .runtime-cache/contract-base.json \
            --head .runtime-cache/contract-head.json \
            --report .runtime-cache/contract-diff.md \
            --json-report .runtime-cache/contract-diff.json
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload contract diff artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: contract-diff-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: error
          path: |
            .runtime-cache/contract-base.json
            .runtime-cache/contract-head.json
            .runtime-cache/contract-diff.md
            .runtime-cache/contract-diff.json

      - name: Cleanup base worktree
        if: always()
        run: |
          git worktree remove --force .runtime-cache/base-tree || true

      - name: Fail on breaking changes
        if: steps.compare.outputs.exit_code != '0'
        run: |
          echo "Breaking API contract changes detected. See contract diff artifact." >&2
          exit 1

  contract-diff-fallback:
    runs-on: e2-core
    timeout-minutes: 30
    needs: [required-ci-secrets, contract-diff-hosted]
    if: ${{ always() && needs['contract-diff-hosted'].result != 'success' }}
    steps:
      - name: Checkout (head)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Sync Python deps
        run: uv sync --frozen --extra dev --extra e2e

      - name: Export head contract
        run: |
          mkdir -p .runtime-cache
          uv run python scripts/export_api_contract.py \
            --repo-root . \
            --output .runtime-cache/contract-head.json

      - name: Prepare base worktree
        run: |
          mkdir -p .runtime-cache
          git worktree add --detach .runtime-cache/base-tree "${{ github.event.pull_request.base.sha }}"

      - name: Export base contract
        run: |
          uv run python scripts/export_api_contract.py \
            --repo-root .runtime-cache/base-tree \
            --output .runtime-cache/contract-base.json

      - name: Compare base/head contract
        id: compare
        run: |
          set +e
          uv run python scripts/check_contract_diff.py \
            --base .runtime-cache/contract-base.json \
            --head .runtime-cache/contract-head.json \
            --report .runtime-cache/contract-diff.md \
            --json-report .runtime-cache/contract-diff.json
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload contract diff artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: contract-diff-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: error
          path: |
            .runtime-cache/contract-base.json
            .runtime-cache/contract-head.json
            .runtime-cache/contract-diff.md
            .runtime-cache/contract-diff.json

      - name: Cleanup base worktree
        if: always()
        run: |
          git worktree remove --force .runtime-cache/base-tree || true

      - name: Fail on breaking changes
        if: steps.compare.outputs.exit_code != '0'
        run: |
          echo "Breaking API contract changes detected. See contract diff artifact." >&2
          exit 1

  contract-diff:
    runs-on: e2-core
    timeout-minutes: 3
    needs: [contract-diff-hosted, contract-diff-fallback]
    if: ${{ always() && (needs['contract-diff-hosted'].result == 'success' || needs['contract-diff-fallback'].result == 'success') }}
    steps:
      - name: Select contract-diff source
        run: |
          if [[ "${{ needs['contract-diff-hosted'].result }}" == "success" ]]; then
            echo "contract-diff source: hosted"
          else
            echo "contract-diff source: e2-core fallback"
          fi
