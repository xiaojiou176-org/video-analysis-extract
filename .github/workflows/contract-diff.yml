name: contract-diff

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "apps/mcp/**"
      - "packages/shared-contracts/**"
      - "scripts/export_api_contract.py"
      - "scripts/check_contract_diff.py"
      - ".github/workflows/contract-diff.yml"
      - ".github/actions/**"

concurrency:
  group: contract-diff-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI_CACHE_ROOT: /tmp/ci-cache
  UV_PIP_VERSION: "0.10.7"
  UV_CACHE_DIR: /tmp/ci-cache/uv

jobs:
  contract-diff:
    runs-on: [self-hosted, video-analysis-extract]
    timeout-minutes: 25
    steps:
      - name: Normalize self-hosted workspace (pre-checkout)
        shell: bash
        run: |
          set -euo pipefail
          workspace="${GITHUB_WORKSPACE:?}"
          uid="$(id -u)"
          gid="$(id -g)"
          stale_paths=(
            "$workspace/.runtime-cache"
            "$workspace/.venv"
            "$workspace/apps/web/node_modules"
          )
          if command -v sudo >/dev/null 2>&1; then
            if sudo find "$workspace" -mindepth 1 -uid 0 -print -quit | grep -q .; then
              echo "Detected root-owned residue under $workspace; normalizing ownership"
              sudo chown -R "$uid:$gid" "$workspace"
            fi
            for path in "${stale_paths[@]}"; do
              if sudo test -e "$path"; then
                echo "Removing stale workspace path: $path"
                sudo rm -rf "$path"
              fi
            done
          else
            for path in "${stale_paths[@]}"; do
              rm -rf "$path" || true
            done
          fi

      - name: Checkout (head)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-uv
        with:
          uv-version: ${{ env.UV_PIP_VERSION }}
          uv-cache-dir: ${{ env.UV_CACHE_DIR }}
          sync-command: uv sync --frozen --extra dev --extra e2e

      - name: Export head contract
        run: |
          mkdir -p .runtime-cache
          uv run python scripts/export_api_contract.py \
            --repo-root . \
            --output .runtime-cache/contract-head.json

      - name: Prepare base worktree
        run: |
          mkdir -p .runtime-cache
          git worktree add --detach .runtime-cache/base-tree "${{ github.event.pull_request.base.sha }}"

      - name: Export base contract
        run: |
          uv run python scripts/export_api_contract.py \
            --repo-root .runtime-cache/base-tree \
            --output .runtime-cache/contract-base.json

      - name: Compare base/head contract
        id: compare
        run: |
          set +e
          uv run python scripts/check_contract_diff.py \
            --base .runtime-cache/contract-base.json \
            --head .runtime-cache/contract-head.json \
            --report .runtime-cache/contract-diff.md \
            --json-report .runtime-cache/contract-diff.json
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload contract diff artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: contract-diff-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: error
          path: |
            .runtime-cache/contract-base.json
            .runtime-cache/contract-head.json
            .runtime-cache/contract-diff.md
            .runtime-cache/contract-diff.json

      - name: Cleanup base worktree
        if: always()
        run: |
          git worktree remove --force .runtime-cache/base-tree || true

      - name: Fail on breaking changes
        if: steps.compare.outputs.exit_code != '0'
        run: |
          echo "Breaking API contract changes detected. See contract diff artifact." >&2
          exit 1
