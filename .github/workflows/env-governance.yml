name: env-governance

on:
  pull_request:
    paths:
      - ".env.example"
      - "ENVIRONMENT.md"
      - "infra/config/env.contract.json"
      - "infra/config/contract.runtime.json"
      - "infra/config/contract.core.json"
      - "apps/mcp/schemas/tools.json"
      - "contracts/generated/jsonschema/mcp-tools.schema.json"
      - "scripts/governance/check_env_contract.py"
      - "scripts/governance/check_open_source_audit_freshness.py"
      - "scripts/governance/probe_remote_platform_truth.py"
      - "scripts/governance/report_env_governance.py"
      - "bin/open-source-audit-refresh"
      - ".github/workflows/env-governance.yml"
      - ".github/actions/**"
  push:
    branches:
      - main
      - codex/**
    paths:
      - ".env.example"
      - "ENVIRONMENT.md"
      - "infra/config/env.contract.json"
      - "infra/config/contract.runtime.json"
      - "infra/config/contract.core.json"
      - "apps/mcp/schemas/tools.json"
      - "contracts/generated/jsonschema/mcp-tools.schema.json"
      - "scripts/governance/check_env_contract.py"
      - "scripts/governance/check_open_source_audit_freshness.py"
      - "scripts/governance/probe_remote_platform_truth.py"
      - "scripts/governance/report_env_governance.py"
      - "bin/open-source-audit-refresh"
      - ".github/workflows/env-governance.yml"
      - ".github/actions/**"

concurrency:
  group: env-governance-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  env-contract:
    runs-on: [self-hosted, video-analysis-extract]
    timeout-minutes: 20
    steps:
      - name: Normalize self-hosted workspace (pre-checkout)
        uses: ./.github/actions/normalize-self-hosted-workspace

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - uses: ./.github/actions/setup-python-uv
        with:
          uv-version: ${{ env.UV_PIP_VERSION || '0.10.7' }}
          uv-cache-dir: /tmp/ci-cache/uv

      - name: Validate env contract
        run: python scripts/governance/check_env_contract.py --strict --env-file .env.example

      - name: Generate env governance report
        run: |
          mkdir -p .runtime-cache/reports/governance
          python scripts/governance/report_env_governance.py \
            --json-out .runtime-cache/reports/governance/env-governance.json \
            --md-out .runtime-cache/reports/governance/env-governance.md

      - name: Upload env governance artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: env-governance-report
          path: |
            .runtime-cache/reports/governance/env-governance.json
            .runtime-cache/reports/governance/env-governance.md

      - name: Validate schema contract parity (apps/mcp vs contracts)
        run: |
          python - <<'PY'
          import difflib
          import json
          from pathlib import Path

          source_path = Path("apps/mcp/schemas/tools.json")
          shared_path = Path("contracts/generated/jsonschema/mcp-tools.schema.json")

          source = json.loads(source_path.read_text(encoding="utf-8"))
          shared = json.loads(shared_path.read_text(encoding="utf-8"))

          if source != shared:
              source_pretty = json.dumps(source, ensure_ascii=False, indent=2, sort_keys=True).splitlines()
              shared_pretty = json.dumps(shared, ensure_ascii=False, indent=2, sort_keys=True).splitlines()
              print("Schema parity check failed:")
              for line in difflib.unified_diff(
                  source_pretty,
                  shared_pretty,
                  fromfile=str(source_path),
                  tofile=str(shared_path),
                  lineterm="",
              ):
                  print(line)
              raise SystemExit(1)
          print("Schema parity check passed.")
          PY

  secret-scan:
    runs-on: [self-hosted, video-analysis-extract]
    timeout-minutes: 15
    steps:
      - name: Normalize self-hosted workspace (pre-checkout)
        uses: ./.github/actions/normalize-self-hosted-workspace

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          expected_sha256="fa0500f6b7e41d28791ebc680f5dd9899cd42b58629218a5f041efa899151a8e"
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz \
            -o /tmp/gitleaks_8.24.2_linux_x64.tar.gz
          echo "${expected_sha256}  /tmp/gitleaks_8.24.2_linux_x64.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks_8.24.2_linux_x64.tar.gz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Run gitleaks (prefer git-history + repo config)
        run: |
          config_args=()
          if [[ -f .gitleaks.toml ]]; then
            config_args+=(--config .gitleaks.toml)
          fi

          if git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
            gitleaks git "${config_args[@]}" --verbose --redact
          else
            gitleaks detect --source . "${config_args[@]}" --verbose --redact
          fi

      - name: Refresh open-source audit receipts
        run: ./bin/open-source-audit-refresh

      - name: Check open-source audit freshness
        run: python3 scripts/governance/check_open_source_audit_freshness.py

      - name: Probe remote platform truth
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/governance/probe_remote_platform_truth.py

      - name: Upload security proof artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: open-source-security-proof
          path: |
            .runtime-cache/reports/governance/remote-platform-truth.json
            .runtime-cache/reports/governance/open-source-audit-freshness.json
            .runtime-cache/reports/open-source-audit/gitleaks-history.json
            .runtime-cache/reports/open-source-audit/gitleaks-history.json.meta.json
            .runtime-cache/reports/open-source-audit/gitleaks-working-tree.json
            .runtime-cache/reports/open-source-audit/gitleaks-working-tree.json.meta.json
