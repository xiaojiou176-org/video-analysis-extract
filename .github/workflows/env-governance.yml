name: env-governance

on:
  pull_request:
  push:
    branches:
      - main
      - codex/**

permissions:
  contents: read

jobs:
  required-ci-secrets:
    runs-on: e2-core
    timeout-minutes: 5
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      LIVE_SMOKE_API_BASE_URL: ${{ secrets.LIVE_SMOKE_API_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Enforce required CI secrets/env vars
        run: |
          python3 scripts/check_required_ci_secrets.py \
            --required GEMINI_API_KEY \
            --required RESEND_API_KEY \
            --required RESEND_FROM_EMAIL \
            --required YOUTUBE_API_KEY \
            --required LIVE_SMOKE_API_BASE_URL

  env-contract-hosted:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [required-ci-secrets]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Validate env contract
        run: python scripts/check_env_contract.py --strict --env-file .env.example

      - name: Generate env governance report
        run: |
          mkdir -p .runtime-cache
          python scripts/report_env_governance.py \
            --json-out .runtime-cache/env-governance.json \
            --md-out .runtime-cache/env-governance.md

      - name: Upload env governance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: env-governance-report
          path: |
            .runtime-cache/env-governance.json
            .runtime-cache/env-governance.md

      - name: Validate schema contract parity (apps/mcp vs shared-contracts)
        run: |
          python - <<'PY'
          import difflib
          import json
          from pathlib import Path

          source_path = Path("apps/mcp/schemas/tools.json")
          shared_path = Path("packages/shared-contracts/jsonschema/mcp-tools.schema.json")

          source = json.loads(source_path.read_text(encoding="utf-8"))
          shared = json.loads(shared_path.read_text(encoding="utf-8"))

          if source != shared:
              source_pretty = json.dumps(source, ensure_ascii=False, indent=2, sort_keys=True).splitlines()
              shared_pretty = json.dumps(shared, ensure_ascii=False, indent=2, sort_keys=True).splitlines()
              print("Schema parity check failed:")
              for line in difflib.unified_diff(
                  source_pretty,
                  shared_pretty,
                  fromfile=str(source_path),
                  tofile=str(shared_path),
                  lineterm="",
              ):
                  print(line)
              raise SystemExit(1)
          print("Schema parity check passed.")
          PY

  env-contract-fallback:
    runs-on: e2-core
    timeout-minutes: 25
    needs: [required-ci-secrets, env-contract-hosted]
    if: ${{ always() && needs['env-contract-hosted'].result != 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Validate env contract
        run: python scripts/check_env_contract.py --strict --env-file .env.example

      - name: Generate env governance report
        run: |
          mkdir -p .runtime-cache
          python scripts/report_env_governance.py \
            --json-out .runtime-cache/env-governance.json \
            --md-out .runtime-cache/env-governance.md

      - name: Upload env governance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: env-governance-report
          path: |
            .runtime-cache/env-governance.json
            .runtime-cache/env-governance.md

      - name: Validate schema contract parity (apps/mcp vs shared-contracts)
        run: |
          python - <<'PY'
          import difflib
          import json
          from pathlib import Path

          source_path = Path("apps/mcp/schemas/tools.json")
          shared_path = Path("packages/shared-contracts/jsonschema/mcp-tools.schema.json")

          source = json.loads(source_path.read_text(encoding="utf-8"))
          shared = json.loads(shared_path.read_text(encoding="utf-8"))

          if source != shared:
              source_pretty = json.dumps(source, ensure_ascii=False, indent=2, sort_keys=True).splitlines()
              shared_pretty = json.dumps(shared, ensure_ascii=False, indent=2, sort_keys=True).splitlines()
              print("Schema parity check failed:")
              for line in difflib.unified_diff(
                  source_pretty,
                  shared_pretty,
                  fromfile=str(source_path),
                  tofile=str(shared_path),
                  lineterm="",
              ):
                  print(line)
              raise SystemExit(1)
          print("Schema parity check passed.")
          PY

  env-contract:
    runs-on: e2-core
    timeout-minutes: 3
    needs: [env-contract-hosted, env-contract-fallback]
    if: ${{ always() && (needs['env-contract-hosted'].result == 'success' || needs['env-contract-fallback'].result == 'success') }}
    steps:
      - name: Select env-contract source
        run: |
          if [[ "${{ needs['env-contract-hosted'].result }}" == "success" ]]; then
            echo "env-contract source: hosted"
          else
            echo "env-contract source: e2-core fallback"
          fi

  secret-scan-hosted:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [required-ci-secrets]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          expected_sha256="fa0500f6b7e41d28791ebc680f5dd9899cd42b58629218a5f041efa899151a8e"
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz \
            -o /tmp/gitleaks_8.24.2_linux_x64.tar.gz
          echo "${expected_sha256}  /tmp/gitleaks_8.24.2_linux_x64.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks_8.24.2_linux_x64.tar.gz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Run gitleaks (prefer git-history + repo config)
        run: |
          config_args=()
          if [[ -f .gitleaks.toml ]]; then
            config_args+=(--config .gitleaks.toml)
          fi

          if git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
            gitleaks git "${config_args[@]}" --verbose --redact
          else
            gitleaks detect --source . "${config_args[@]}" --verbose --redact
          fi

  secret-scan-fallback:
    runs-on: e2-core
    timeout-minutes: 20
    needs: [required-ci-secrets, secret-scan-hosted]
    if: ${{ always() && needs['secret-scan-hosted'].result != 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          expected_sha256="fa0500f6b7e41d28791ebc680f5dd9899cd42b58629218a5f041efa899151a8e"
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz \
            -o /tmp/gitleaks_8.24.2_linux_x64.tar.gz
          echo "${expected_sha256}  /tmp/gitleaks_8.24.2_linux_x64.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks_8.24.2_linux_x64.tar.gz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Run gitleaks (prefer git-history + repo config)
        run: |
          config_args=()
          if [[ -f .gitleaks.toml ]]; then
            config_args+=(--config .gitleaks.toml)
          fi

          if git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
            gitleaks git "${config_args[@]}" --verbose --redact
          else
            gitleaks detect --source . "${config_args[@]}" --verbose --redact
          fi

  secret-scan:
    runs-on: e2-core
    timeout-minutes: 3
    needs: [secret-scan-hosted, secret-scan-fallback]
    if: ${{ always() && (needs['secret-scan-hosted'].result == 'success' || needs['secret-scan-fallback'].result == 'success') }}
    steps:
      - name: Select secret-scan source
        run: |
          if [[ "${{ needs['secret-scan-hosted'].result }}" == "success" ]]; then
            echo "secret-scan source: hosted"
          else
            echo "secret-scan source: e2-core fallback"
          fi
