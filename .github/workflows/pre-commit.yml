name: pre-commit

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  required-ci-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      LIVE_SMOKE_API_BASE_URL: ${{ secrets.LIVE_SMOKE_API_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Enforce required CI secrets/env vars
        run: |
          python3 scripts/check_required_ci_secrets.py \
            --required GEMINI_API_KEY \
            --required RESEND_API_KEY \
            --required RESEND_FROM_EMAIL \
            --required YOUTUBE_API_KEY \
            --required LIVE_SMOKE_API_BASE_URL

  pre-commit-hosted:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [required-ci-secrets]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Cache pre-commit environments
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pre-commit
          key: >-
            ${{ runner.os }}-pre-commit-
            ${{ steps.setup-python.outputs.python-version }}-
            ${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pre-commit-${{ steps.setup-python.outputs.python-version }}-
            ${{ runner.os }}-pre-commit-

      - name: Install pre-commit
        run: python -m pip install pre-commit

      - name: Install gitleaks CLI
        shell: bash
        run: |
          set -euo pipefail
          version="8.30.0"
          archive="gitleaks_${version}_linux_x64.tar.gz"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${version}/${archive}"

          curl -fsSL "$url" -o "$archive"
          tar -xzf "$archive" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          rm -f "$archive" gitleaks

          gitleaks version

      - name: Run pre-commit (retry for flaky network installs)
        shell: bash
        run: |
          set -euo pipefail

          max_attempts=3
          attempt=1
          while true; do
            echo "[pre-commit-ci] attempt ${attempt}/${max_attempts}"
            if pre-commit run --all-files --show-diff-on-failure; then
              break
            fi

            if [[ "$attempt" -ge "$max_attempts" ]]; then
              echo "[pre-commit-ci] exhausted retries"
              exit 1
            fi

            sleep_seconds=$((attempt * 15))
            echo "[pre-commit-ci] retry in ${sleep_seconds}s"
            sleep "$sleep_seconds"
            attempt=$((attempt + 1))
          done

  pre-commit-fallback:
    runs-on: e2-core
    timeout-minutes: 25
    needs: [required-ci-secrets, pre-commit-hosted]
    if: ${{ always() && needs['pre-commit-hosted'].result != 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Cache pre-commit environments
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pre-commit
          key: >-
            ${{ runner.os }}-pre-commit-
            ${{ steps.setup-python.outputs.python-version }}-
            ${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pre-commit-${{ steps.setup-python.outputs.python-version }}-
            ${{ runner.os }}-pre-commit-

      - name: Install pre-commit
        run: python -m pip install pre-commit

      - name: Install gitleaks CLI
        shell: bash
        run: |
          set -euo pipefail
          version="8.30.0"
          archive="gitleaks_${version}_linux_x64.tar.gz"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${version}/${archive}"

          curl -fsSL "$url" -o "$archive"
          tar -xzf "$archive" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          rm -f "$archive" gitleaks

          gitleaks version

      - name: Run pre-commit (retry for flaky network installs)
        shell: bash
        run: |
          set -euo pipefail

          max_attempts=3
          attempt=1
          while true; do
            echo "[pre-commit-ci] attempt ${attempt}/${max_attempts}"
            if pre-commit run --all-files --show-diff-on-failure; then
              break
            fi

            if [[ "$attempt" -ge "$max_attempts" ]]; then
              echo "[pre-commit-ci] exhausted retries"
              exit 1
            fi

            sleep_seconds=$((attempt * 15))
            echo "[pre-commit-ci] retry in ${sleep_seconds}s"
            sleep "$sleep_seconds"
            attempt=$((attempt + 1))
          done

  pre-commit:
    runs-on: e2-core
    timeout-minutes: 3
    needs: [pre-commit-hosted, pre-commit-fallback]
    if: ${{ always() && (needs['pre-commit-hosted'].result == 'success' || needs['pre-commit-fallback'].result == 'success') }}
    steps:
      - name: Select pre-commit source
        run: |
          if [[ "${{ needs['pre-commit-hosted'].result }}" == "success" ]]; then
            echo "pre-commit source: hosted"
          else
            echo "pre-commit source: e2-core fallback"
          fi
