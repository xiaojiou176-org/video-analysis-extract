name: pre-commit

on:
  pull_request:
  push:

permissions:
  contents: read

env:
  PRE_COMMIT_PIP_VERSION: "4.3.0"

jobs:
  required-ci-secrets:
    runs-on: [self-hosted, shared-pool]
    timeout-minutes: 5
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Enforce required CI secrets/env vars
        run: |
          python3 scripts/check_required_ci_secrets.py \
            --required GEMINI_API_KEY \
            --required RESEND_API_KEY \
            --required RESEND_FROM_EMAIL \
            --required YOUTUBE_API_KEY

  pre-commit-hosted:
    runs-on: [self-hosted, shared-pool]
    continue-on-error: true
    timeout-minutes: 20
    needs: [required-ci-secrets]
    outputs:
      hosted_ok: ${{ steps.hosted_status.outputs.hosted_ok }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Cache pre-commit environments
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pre-commit
          key: >-
            ${{ runner.os }}-pre-commit-
            ${{ steps.setup-python.outputs.python-version }}-
            ${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pre-commit-${{ steps.setup-python.outputs.python-version }}-
            ${{ runner.os }}-pre-commit-

      - name: Install pre-commit
        run: python -m pip install "pre-commit==${PRE_COMMIT_PIP_VERSION}"

      - name: Install gitleaks CLI
        shell: bash
        run: |
          set -euo pipefail
          version="8.30.0"
          expected_sha256="79a3ab579b53f71efd634f3aaf7e04a0fa0cf206b7ed434638d1547a2470a66e"
          archive="gitleaks_${version}_linux_x64.tar.gz"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${version}/${archive}"

          curl -fsSL "$url" -o "$archive"
          echo "${expected_sha256}  ${archive}" | sha256sum -c -
          tar -xzf "$archive" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          rm -f "$archive" gitleaks

          gitleaks version

      - name: Run pre-commit (retry for flaky network installs)
        shell: bash
        run: |
          set +e

          max_attempts=3
          attempt=1
          result=1
          while true; do
            echo "[pre-commit-ci] attempt ${attempt}/${max_attempts}"
            pre-commit run --all-files --show-diff-on-failure
            result=$?
            if [[ "$result" -eq 0 ]]; then
              break
            fi

            if [[ "$attempt" -ge "$max_attempts" ]]; then
              echo "[pre-commit-ci] exhausted retries"
              break
            fi

            sleep_seconds=$((attempt * 15))
            echo "[pre-commit-ci] retry in ${sleep_seconds}s"
            sleep "$sleep_seconds"
            attempt=$((attempt + 1))
          done

          if [[ "$result" -ne 0 ]]; then
            echo "[pre-commit-ci] warning: hosted pre-commit remained non-zero after retries; fallback job will take over."
          fi
          exit 0

      - name: Record hosted pre-commit outcome
        if: ${{ always() }}
        id: hosted_status
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "hosted_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "hosted_ok=false" >> "$GITHUB_OUTPUT"
          fi

  pre-commit-fallback:
    runs-on: [self-hosted, shared-pool]
    timeout-minutes: 25
    needs: [required-ci-secrets, pre-commit-hosted]
    if: ${{ always() && (needs['pre-commit-hosted'].result != 'success' || needs['pre-commit-hosted'].outputs.hosted_ok != 'true') }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Cache pre-commit environments
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pre-commit
          key: >-
            ${{ runner.os }}-pre-commit-
            ${{ steps.setup-python.outputs.python-version }}-
            ${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pre-commit-${{ steps.setup-python.outputs.python-version }}-
            ${{ runner.os }}-pre-commit-

      - name: Install pre-commit
        run: python -m pip install "pre-commit==${PRE_COMMIT_PIP_VERSION}"

      - name: Install gitleaks CLI
        shell: bash
        run: |
          set -euo pipefail
          version="8.30.0"
          expected_sha256="79a3ab579b53f71efd634f3aaf7e04a0fa0cf206b7ed434638d1547a2470a66e"
          archive="gitleaks_${version}_linux_x64.tar.gz"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${version}/${archive}"

          curl -fsSL "$url" -o "$archive"
          echo "${expected_sha256}  ${archive}" | sha256sum -c -
          tar -xzf "$archive" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          rm -f "$archive" gitleaks

          gitleaks version

      - name: Run pre-commit (retry for flaky network installs)
        shell: bash
        run: |
          set -euo pipefail

          max_attempts=3
          attempt=1
          while true; do
            echo "[pre-commit-ci] attempt ${attempt}/${max_attempts}"
            if pre-commit run --all-files --show-diff-on-failure; then
              break
            fi

            if [[ "$attempt" -ge "$max_attempts" ]]; then
              echo "[pre-commit-ci] exhausted retries"
              exit 1
            fi

            sleep_seconds=$((attempt * 15))
            echo "[pre-commit-ci] retry in ${sleep_seconds}s"
            sleep "$sleep_seconds"
            attempt=$((attempt + 1))
          done

  pre-commit:
    runs-on: [self-hosted, shared-pool]
    timeout-minutes: 3
    needs: [pre-commit-hosted, pre-commit-fallback]
    if: ${{ always() && (needs['pre-commit-hosted'].result == 'success' || needs['pre-commit-fallback'].result == 'success') }}
    steps:
      - name: Select pre-commit source
        run: |
          if [[ "${{ needs['pre-commit-hosted'].result }}" == "success" ]]; then
            echo "pre-commit source: hosted"
          else
            echo "pre-commit source: shared-pool fallback"
          fi
