name: pre-commit

on:
  pull_request:
    paths:
      - ".githooks/**"
      - ".pre-commit-config.yaml"
      - "scripts/check_test_assertions.py"
      - "scripts/check_required_ci_secrets.py"
      - "scripts/check_ci_workflow_strictness.py"
      - ".github/workflows/pre-commit.yml"
      - ".github/actions/**"
  push:
    paths:
      - ".githooks/**"
      - ".pre-commit-config.yaml"
      - "scripts/check_test_assertions.py"
      - "scripts/check_required_ci_secrets.py"
      - "scripts/check_ci_workflow_strictness.py"
      - ".github/workflows/pre-commit.yml"
      - ".github/actions/**"

concurrency:
  group: pre-commit-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI_CACHE_ROOT: /tmp/ci-cache
  PRE_COMMIT_PIP_VERSION: "4.3.0"
  PRE_COMMIT_HOME: /tmp/ci-cache/pre-commit

jobs:
  pre-commit:
    runs-on: [self-hosted, video-analysis-extract]
    timeout-minutes: 20
    steps:
      - name: Normalize self-hosted workspace (pre-checkout)
        shell: bash
        run: |
          set -euo pipefail
          workspace="${GITHUB_WORKSPACE:?}"
          helper="$workspace/scripts/normalize_self_hosted_pre_checkout.sh"
          if [[ -x "$helper" ]]; then
            bash "$helper" --workspace "$workspace"
          else
            rm -rf "$workspace/.runtime-cache" "$workspace/.venv" "$workspace/apps/web/node_modules" || true
          fi

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true
          fetch-depth: 1

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Cache pre-commit environments
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.PRE_COMMIT_HOME }}
          key: >-
            ${{ runner.os }}-pre-commit-
            ${{ steps.setup-python.outputs.python-version }}-
            ${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pre-commit-${{ steps.setup-python.outputs.python-version }}-
            ${{ runner.os }}-pre-commit-

      - name: Install pre-commit
        run: python -m pip install "pre-commit==${PRE_COMMIT_PIP_VERSION}"

      - name: Install gitleaks CLI
        shell: bash
        run: |
          set -euo pipefail
          version="8.30.0"
          expected_sha256="79a3ab579b53f71efd634f3aaf7e04a0fa0cf206b7ed434638d1547a2470a66e"
          archive="gitleaks_${version}_linux_x64.tar.gz"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${version}/${archive}"

          curl --retry 5 --retry-all-errors --retry-delay 2 -fsSL "$url" -o "$archive"
          echo "${expected_sha256}  ${archive}" | sha256sum -c -
          tar -xzf "$archive" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          rm -f "$archive" gitleaks

          gitleaks version

      - name: Run pre-commit
        id: run_pre_commit
        shell: bash
        run: |
          pre-commit run --all-files --show-diff-on-failure
