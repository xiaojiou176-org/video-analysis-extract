name: vendor-governance

on:
  pull_request:
    paths:
      - "scripts/vendor/**"
      - "docs/reference/dependency-governance.md"
      - ".github/workflows/vendor-governance.yml"
      - ".github/actions/**"
  push:
    branches:
      - main
      - codex/**
    paths:
      - "scripts/vendor/**"
      - "docs/reference/dependency-governance.md"
      - ".github/workflows/vendor-governance.yml"
      - ".github/actions/**"

concurrency:
  group: vendor-governance-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  upstream-lock-validation:
    runs-on: [self-hosted, video-analysis-extract]
    timeout-minutes: 10
    steps:
      - name: Normalize self-hosted workspace (pre-checkout)
        shell: bash
        run: |
          set -euo pipefail
          workspace="${GITHUB_WORKSPACE:?}"
          uid="$(id -u)"
          gid="$(id -g)"
          stale_paths=(
            "$workspace/.runtime-cache"
            "$workspace/.venv"
            "$workspace/apps/web/node_modules"
          )
          if command -v sudo >/dev/null 2>&1; then
            if sudo find "$workspace" -mindepth 1 -uid 0 -print -quit | grep -q .; then
              echo "Detected root-owned residue under $workspace; normalizing ownership"
              sudo chown -R "$uid:$gid" "$workspace"
            fi
            for path in "${stale_paths[@]}"; do
              if sudo test -e "$path"; then
                echo "Removing stale workspace path: $path"
                sudo rm -rf "$path"
              fi
            done
          else
            for path in "${stale_paths[@]}"; do
              rm -rf "$path" || true
            done
          fi

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Bash syntax check
        run: |
          bash -n scripts/vendor/upstream_sync.sh
          bash -n scripts/vendor/validate_upstream_lock.sh

      - name: Validate UPSTREAM.lock files
        run: bash scripts/vendor/validate_upstream_lock.sh --root .
