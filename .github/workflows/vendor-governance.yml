name: vendor-governance

on:
  pull_request:
    paths:
      - "scripts/vendor/**"
      - "docs/reference/dependency-governance.md"
      - ".github/workflows/vendor-governance.yml"
      - ".github/actions/**"
  push:
    branches:
      - main
      - codex/**
    paths:
      - "scripts/vendor/**"
      - "docs/reference/dependency-governance.md"
      - ".github/workflows/vendor-governance.yml"
      - ".github/actions/**"

concurrency:
  group: vendor-governance-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  upstream-lock-validation:
    runs-on: [self-hosted, video-analysis-extract]
    timeout-minutes: 10
    steps:
      - name: Normalize self-hosted workspace (pre-checkout)
        shell: bash
        run: |
          set -euo pipefail
          workspace="${GITHUB_WORKSPACE:?}"
          helper="$workspace/scripts/normalize_self_hosted_pre_checkout.sh"
          if [[ -x "$helper" ]]; then
            bash "$helper" --workspace "$workspace"
          else
            rm -rf "$workspace/.runtime-cache" "$workspace/.venv" "$workspace/apps/web/node_modules" || true
          fi

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Bash syntax check
        run: |
          bash -n scripts/vendor/upstream_sync.sh
          bash -n scripts/vendor/validate_upstream_lock.sh

      - name: Validate UPSTREAM.lock files
        run: bash scripts/vendor/validate_upstream_lock.sh --root .
