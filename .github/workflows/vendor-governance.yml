name: vendor-governance

on:
  pull_request:
    paths:
      - "scripts/vendor/**"
      - "config/governance/active-upstreams.json"
      - "config/governance/upstream-registry.json"
      - "config/governance/upstream-templates.json"
      - "config/governance/upstream-compat-matrix.json"
      - "docs/reference/dependency-governance.md"
      - "docs/reference/upstream-governance.md"
      - ".github/workflows/vendor-governance.yml"
      - ".github/actions/**"
  push:
    branches:
      - main
      - codex/**
    paths:
      - "scripts/vendor/**"
      - "config/governance/active-upstreams.json"
      - "config/governance/upstream-registry.json"
      - "config/governance/upstream-templates.json"
      - "config/governance/upstream-compat-matrix.json"
      - "docs/reference/dependency-governance.md"
      - "docs/reference/upstream-governance.md"
      - ".github/workflows/vendor-governance.yml"
      - ".github/actions/**"

concurrency:
  group: vendor-governance-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  trusted-pr-boundary:
    uses: ./.github/workflows/_trusted-pr-boundary.yml

  upstream-lock-validation:
    runs-on: [self-hosted, video-analysis-extract]
    timeout-minutes: 10
    needs: [trusted-pr-boundary]
    if: ${{ always() && needs.trusted-pr-boundary.result == 'success' }}
    steps:
      - name: Normalize self-hosted workspace (pre-checkout)
        uses: ./.github/actions/normalize-self-hosted-workspace

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Bash syntax check
        run: |
          bash -n scripts/vendor/upstream_sync.sh
          bash -n scripts/vendor/validate_upstream_lock.sh

      - name: Validate active vendor locks
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d vendor ]]; then
            bash scripts/vendor/validate_upstream_lock.sh --root . --strict-no-files
          else
            echo "[vendor-governance] N/A: no active vendor surfaces"
          fi

      - name: Validate upstream governance inventory
        run: |
          ./bin/governance-audit --mode ci
          python3 scripts/governance/check_vendor_registry_integrity.py
